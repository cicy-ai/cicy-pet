<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>雪莉 · 设置</title>
<style>
  /* 雪莉唯一的设置页:手机 WebView 和桌面设置窗加载同一张(不搞两套 UI)。
     信息架构按"她是一个角色":状态卡(她在哪) → 形象 → 声音(音色/语速/特效/试听一站式)
     → 桌面窗口(桌面才显示) → 感官权限。改动即写共享真相(/control),全设备同步。 */
  :root { --bg:#05070f; --card:#0c1222; --card2:#111a30; --line:#1c2740; --txt:#dfeaff;
          --dim:#8aa6d4; --hot:#8cdcff; --sel:#3a6ac0; --ok:#6fdc8c; --warn:#ffb3c0; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; background:radial-gradient(ellipse 120% 60% at 50% -10%, #0d1736 0%, var(--bg) 60%);
              color:var(--txt); font-family:"PingFang SC",system-ui,sans-serif; }
  .wrap { max-width:560px; margin:0 auto; padding:14px 14px calc(40px + env(safe-area-inset-bottom)); }

  /* ── 顶部状态卡:她是谁、在哪 ── */
  .hero { display:flex; align-items:center; gap:14px; padding:18px 16px; border-radius:20px;
          background:linear-gradient(135deg, #142449, #0c1222); border:1px solid var(--line);
          margin-bottom:16px; }
  .ava { width:54px; height:54px; border-radius:50%; display:flex; align-items:center; justify-content:center;
         font-size:26px; background:radial-gradient(circle at 35% 30%, #2a4a8a, #16244a);
         border:1px solid rgba(140,180,255,.25); flex:0 0 54px; }
  .hname { font-size:18px; font-weight:600; letter-spacing:1px; }
  .hsub { font-size:13px; color:var(--dim); margin-top:4px; }
  .hsub .dot { color:var(--ok); }
  .hsub .off { color:var(--warn); }

  /* ── 分组面板 ── */
  .panel { background:var(--card); border:1px solid var(--line); border-radius:18px;
           padding:16px 14px; margin-bottom:14px; }
  .ptitle { display:flex; align-items:baseline; gap:8px; margin-bottom:4px; }
  .ptitle b { font-size:15px; letter-spacing:1px; }
  .ptitle span { font-size:12px; color:var(--dim); }
  .psub { font-size:12px; color:var(--dim); margin:0 0 12px; }

  /* 形象网格 */
  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .card { background:var(--card2); border:2px solid var(--line); border-radius:14px; padding:12px 6px;
          text-align:center; font-size:15px; cursor:pointer; }
  .card.sel { border-color:var(--hot); background:#1a2c52; }
  .card .tag { display:block; font-size:11px; color:var(--dim); margin-top:3px; }
  .card .lic { display:block; font-size:10px; color:#5a8; margin-top:2px; }

  /* 声音 */
  .vgrid { display:flex; flex-direction:column; gap:8px; }
  .vrow { background:var(--card2); border:2px solid var(--line); border-radius:12px; padding:10px 12px;
          font-size:14px; display:flex; align-items:center; gap:8px; }
  .vrow.sel { border-color:var(--hot); background:#1a2c52; }
  .vrow .vinfo { flex:1; min-width:0; }
  .vrow .eng { display:block; font-size:11px; color:var(--dim); margin-top:2px; }
  .vrow button { border-radius:10px; font-size:13px; padding:9px 12px; cursor:pointer; white-space:nowrap; }
  .vrow .pv { background:#16203a; border:1px solid var(--line); color:var(--hot); }
  .vrow .pick { background:#16305e; border:1px solid var(--sel); color:#eaf4ff; min-width:66px; }
  .vrow.sel .pick { background:linear-gradient(135deg,#2a6fd0,#16305e); border-color:var(--hot); }
  .vrow button:active { transform:scale(.95); }
  .subhead { font-size:12px; color:var(--dim); letter-spacing:1px; margin:16px 0 8px; }
  .rate { display:flex; align-items:center; gap:12px; }
  .rate input { flex:1; }
  .rate b { color:var(--hot); min-width:52px; text-align:right; font-size:15px; }
  .seg { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; }
  .seg .card { padding:12px 6px; }
  .test { display:flex; gap:8px; }
  .test input { flex:1; background:var(--card2); border:1px solid var(--line); color:var(--txt);
                border-radius:12px; padding:13px; font-size:15px; min-width:0; }
  .test button { flex:0 0 96px; background:linear-gradient(135deg,#2a5cb0,#16305e); border:1px solid var(--sel);
                 color:#f0f6ff; border-radius:12px; font-size:15px; cursor:pointer; }
  .test button:active { transform:scale(.97); }

  /* 桌面窗口 */
  .btnrow { display:flex; gap:8px; flex-wrap:wrap; }
  .deskBtn { background:var(--card2); border:1px solid var(--line); color:var(--txt);
             border-radius:12px; padding:12px 16px; font-size:14px; cursor:pointer; }
  .deskBtn:active { transform:scale(.96); }

  /* 权限行 */
  .permrow { display:flex; align-items:center; gap:10px; background:var(--card2);
             border:1px solid var(--line); border-radius:12px; padding:12px 12px; margin-bottom:8px; }
  .permrow .ic { font-size:18px; }
  .permrow .nm { flex:1; min-width:0; }
  .permrow .nm i { display:block; font-style:normal; color:var(--dim); font-size:12px; margin-top:2px; }
  .permrow .ok { color:var(--ok); font-size:13px; white-space:nowrap; }
  .permrow .na { color:#5a7099; font-size:13px; white-space:nowrap; }
  .permrow button { background:#3a2530; border:1px solid #6a3545; color:var(--warn);
                    border-radius:10px; padding:8px 12px; font-size:13px; white-space:nowrap; cursor:pointer; }

  #toast { position:fixed; left:50%; bottom:calc(22px + env(safe-area-inset-bottom)); transform:translateX(-50%);
           background:#16203a; border:1px solid var(--line); color:var(--hot); padding:8px 18px;
           border-radius:20px; font-size:13px; opacity:0; transition:opacity .25s; pointer-events:none; }
  .warnbar { color:var(--warn); font-size:12px; margin:0 0 10px; }
</style>
</head>
<body>
<div class="wrap">
  <div id="warn" class="warnbar" style="display:none">⚠️ 没有在线的雪莉页面,改动会保存但暂时看不到效果</div>

  <!-- 她是谁、在哪 -->
  <div class="hero">
    <div class="ava" id="heroAva">🐱</div>
    <div style="min-width:0">
      <div class="hname" id="heroName">雪莉</div>
      <div class="hsub" id="heroWhere">定位中……</div>
    </div>
  </div>

  <!-- 形象 -->
  <div class="panel">
    <div class="ptitle"><b>👗 形象</b><span>点谁换谁 · 全设备一起变</span></div>
    <p class="psub">带「不可商用/来源不明」标的形象自己玩没问题,发视频前留意授权。</p>
    <div class="grid" id="models"></div>
  </div>

  <!-- 声音:音色 / 语速 / 特效 / 试听 一站式 -->
  <div class="panel">
    <div class="ptitle"><b>🎙️ 声音</b><span>她开口的一切</span></div>
    <div class="subhead">音 色</div>
    <div class="vgrid" id="voices"></div>
    <div class="subhead">语 速</div>
    <div class="rate">
      <input type="range" id="rate" min="-30" max="30" step="2" value="18">
      <b id="rateVal">+18%</b>
    </div>
    <div class="subhead">特 效</div>
    <div class="seg" id="fxRow">
      <div class="card" data-fx="off">原声<span class="tag">她本来的声音</span></div>
      <div class="card" data-fx="jarvis">贾维斯<span class="tag">科幻 AI 电波感</span></div>
    </div>
    <div class="subhead">试 听</div>
    <div class="test">
      <input id="testText" placeholder="打一句让她念,留空用默认" autocomplete="off">
      <button id="testBtn">▶ 听听</button>
    </div>
  </div>

  <!-- 桌面窗口(只在桌面设置窗里出现) -->
  <div class="panel" id="deskPanel" style="display:none">
    <div class="ptitle"><b>🖥️ 桌面窗口</b><span>只影响这台电脑</span></div>
    <div class="subhead">大 小</div>
    <div class="rate">
      <input type="range" id="winSize" min="180" max="1080" step="10" value="340">
      <b id="winSizeVal">340px</b>
    </div>
    <div class="btnrow" style="margin-top:10px">
      <button class="deskBtn" data-size="240">小</button>
      <button class="deskBtn" data-size="340">标准</button>
      <button class="deskBtn" data-size="480">大</button>
      <button class="deskBtn" data-size="640">特大</button>
      <button class="deskBtn" id="dockBtn">↘ 回右下角</button>
      <button class="deskBtn" id="hidePetBtn">🫥 隐藏宠物</button>
    </div>
  </div>

  <!-- 感官权限 -->
  <div class="panel">
    <div class="ptitle"><b>🔐 她的感官</b><span>电脑上的系统权限</span></div>
    <div id="perms"><div style="color:var(--dim);font-size:13px">读取中……</div></div>
  </div>
</div>
<div id="toast"></div>
<script>
  const $ = (id) => document.getElementById(id);
  const toast = (t) => { const el = $("toast"); el.textContent = t; el.style.opacity = 1;
    clearTimeout(el._t); el._t = setTimeout(() => el.style.opacity = 0, 1400); };
  let cur = {};
  async function send(cmd, arg) {
    try {
      const r = await fetch("/control", { method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ cmd, arg }) });
      const j = await r.json();
      $("warn").style.display = j.listeners ? "none" : "block";
      return j.listeners;
    } catch { toast("发送失败"); return 0; }
  }

  // 顶部状态卡:她现在的形象名 + 在哪个设备(10s 对齐一次)
  let modelList = [];
  const DEV_META = { mac: "💻 电脑", phone: "📱 手机", windows: "🪟 Windows", linux: "🐧 Linux" };
  async function refreshHero() {
    try {
      const d = await (await fetch("/clients")).json();
      if (d.cfg) cur = { ...cur, ...d.cfg };
      const m = modelList.find((x) => x.url === cur.model);
      $("heroName").textContent = "雪莉" + (m ? " · " + m.name : "");
      const here = (d.clients || []).find((c) => c.present);
      $("heroWhere").innerHTML = here
        ? `<span class="dot">●</span> 她在 ${DEV_META[here.platform] || here.platform} · ${here.id}`
        : `<span class="off">○</span> 她暂时不在任何设备上`;
    } catch { $("heroWhere").innerHTML = '<span class="off">○</span> 连不上她的服务器'; }
  }

  (async () => {
    try { cur = await (await fetch("/petcfg")).json(); } catch {}
    // 形象
    modelList = await (await fetch("/models.json")).json();
    $("models").innerHTML = modelList.map((m) =>
      `<div class="card${cur.model === m.url ? " sel" : ""}" data-url="${m.url}">${m.name}` +
      `<span class="tag">${m.kind || ""}</span>` +
      (m.licenseLabel ? `<span class="lic">${m.licenseLabel}</span>` : "") + `</div>`).join("");
    document.querySelectorAll("#models .card").forEach((c) => c.onclick = async () => {
      document.querySelectorAll("#models .card").forEach((x) => x.classList.remove("sel"));
      c.classList.add("sel"); cur.model = c.dataset.url;
      if (await send("model", c.dataset.url)) toast("换形象中……");
      refreshHero();
    });
    // 音色:每行两颗按钮——「▶ 试听」页面就地用该音色播一句(不改配置);「选择」才真换。
    const voices = await (await fetch("/voices")).json();
    $("voices").innerHTML = voices.map((v) =>
      `<div class="vrow${cur.voice === v.id ? " sel" : ""}" data-id="${v.id}" data-eng="${v.engine}">` +
      `<span class="vinfo">${v.name}<span class="eng">${v.engine}</span></span>` +
      `<button class="pv">▶ 试听</button>` +
      `<button class="pick">${cur.voice === v.id ? "✓ 已选" : "选择"}</button></div>`).join("");
    let pvCtx = null, pvSrc = null;
    async function previewVoice(engine, id, btn) {
      btn.disabled = true; btn.textContent = "⋯";
      try {
        pvCtx = pvCtx || new (window.AudioContext || window.webkitAudioContext)();
        pvCtx.resume();
        if (pvSrc) { try { pvSrc.stop(); } catch {} pvSrc = null; }
        const url = `/tts?text=${encodeURIComponent("你好呀,我是雪莉,这是我的声音～")}` +
          `&engine=${encodeURIComponent(engine)}&voice=${encodeURIComponent(id)}&rate=${encodeURIComponent(cur.rate || "")}`;
        const buf = await pvCtx.decodeAudioData(await (await fetch(url)).arrayBuffer());
        pvSrc = pvCtx.createBufferSource(); pvSrc.buffer = buf;
        pvSrc.connect(pvCtx.destination); pvSrc.start();
      } catch { toast("这个音色试听失败(引擎可能不可用)"); }
      btn.disabled = false; btn.textContent = "▶ 试听";
    }
    document.querySelectorAll("#voices .vrow").forEach((r) => {
      r.querySelector(".pv").onclick = (e) => previewVoice(r.dataset.eng, r.dataset.id, e.target);
      r.querySelector(".pick").onclick = async () => {
        document.querySelectorAll("#voices .vrow").forEach((x) => {
          x.classList.remove("sel"); x.querySelector(".pick").textContent = "选择";
        });
        r.classList.add("sel"); r.querySelector(".pick").textContent = "✓ 已选";
        await send("voice", r.dataset.id); toast("已换音色,全设备生效");
      };
    });
    // 语速回显
    if (cur.rate) { const n = parseInt(cur.rate, 10);
      if (!isNaN(n)) { $("rate").value = n; $("rateVal").textContent = (n >= 0 ? "+" : "") + n + "%"; } }
    // 特效回显 + 切换
    document.querySelectorAll("#fxRow .card").forEach((c) => {
      if ((cur.fx || "off") === c.dataset.fx) c.classList.add("sel");
      c.onclick = async () => {
        document.querySelectorAll("#fxRow .card").forEach((x) => x.classList.remove("sel"));
        c.classList.add("sel");
        await send("fx", c.dataset.fx);
        toast(c.dataset.fx === "jarvis" ? "贾维斯已上线,听她说话试试" : "已切回原声");
      };
    });
    refreshHero();
    setInterval(refreshHero, 10000);
  })();

  const rate = $("rate");
  rate.oninput = () => { const n = +rate.value; $("rateVal").textContent = (n >= 0 ? "+" : "") + n + "%"; };
  rate.onchange = () => { const n = +rate.value; send("rate", (n >= 0 ? "+" : "") + n + "%"); toast("语速已同步全设备"); };
  $("testBtn").onclick = () => { send("testvoice", $("testText").value.trim()); toast("让她念念看～"); };

  // 桌面窗口:只在 Electron 设置窗里出现(手机 WebView 没有 electronAPI)
  (function deskInit() {
    const api = window.electronAPI;
    if (!api) return;
    $("deskPanel").style.display = "";
    const saved = JSON.parse(localStorage.getItem("pet_config") || "{}");
    const sz = $("winSize"), szv = $("winSizeVal");
    if (+saved.size) { sz.value = saved.size; szv.textContent = saved.size + "px"; }
    const applySize = (px) => {
      px = +px; sz.value = px; szv.textContent = px + "px";
      api.setWindowSize?.(px, Math.round(px * 1.25));
      try { const c = JSON.parse(localStorage.getItem("pet_config") || "{}"); c.size = px;
        localStorage.setItem("pet_config", JSON.stringify(c)); } catch {}
    };
    sz.oninput = () => applySize(sz.value);
    document.querySelectorAll(".deskBtn[data-size]").forEach((b) => b.onclick = () => applySize(b.dataset.size));
    $("dockBtn").onclick = async () => {
      const b = await api.getWindowBounds();
      api.setWindowPosition(screen.availWidth - b.width - 20, screen.availHeight - b.height - 40);
      // 她人在别处(比如手机)也一并召回桌面——「回右下角」=人回桌面,不只是挪窗
      try {
        const d = await (await fetch("/clients")).json();
        const desk = (d.clients || []).find((c) => c.platform !== "phone");
        if (desk && !desk.present) await send("goto", desk.id);
      } catch {}
      toast("已归位,雪莉回到桌面");
      setTimeout(refreshHero, 2500);
    };
    $("hidePetBtn").onclick = () => { api.closePetWindow?.(); toast("已隐藏,托盘可再显示"); };
  })();

  // 感官权限:每项标注用途+是否必需;必需未开→红色一键跳系统设置;只查一次不轮询
  async function renderPerms(open) {
    let p = null;
    try { p = await (await fetch("/perms" + (open ? "?open=" + open : ""))).json(); } catch {}
    const box = $("perms");
    if (!p) { box.innerHTML = '<div style="color:var(--dim);font-size:13px">读取失败(桌面 App 不在线?)</div>'; return; }
    const row = (icon, name, use, val, key, need) => {
      const ok = val === "granted";
      let right;
      if (ok) right = `<span class="ok">● 已授权</span>`;
      else if (need) right = `<button data-open="${key}">未授权 · 去开启</button>`;
      else right = `<span class="na">○ ${val === "not-determined" ? "从未询问" : val === "unused" ? "已停用" : "未授权"}(不需要)</span>`;
      return `<div class="permrow"><span class="ic">${icon}</span>` +
        `<span class="nm">${name}<i>${use}</i></span>${right}</div>`;
    };
    box.innerHTML =
      row("👀", "屏幕录制", "她的眼睛:回答「我在干嘛/桌面上有什么」", p.screen, "screen", true) +
      row("🎙️", "麦克风", "桌面收音(手机说话用手机自己的麦)", p.microphone, "microphone", true) +
      row("🖐️", "辅助功能", "旧观察系统用的,已停用,保持关闭", "unused", "accessibility", false) +
      row("📷", "摄像头", "完全没用到", p.camera, "camera", false);
    box.querySelectorAll("button[data-open]").forEach((b) => b.onclick = () => {
      renderPerms(b.dataset.open);
      toast("已在电脑上打开系统设置,勾上 CiCy Desktop/Electron");
    });
  }
  renderPerms();
</script>
</body>
</html>
