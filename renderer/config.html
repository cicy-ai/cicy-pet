<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>雪莉 · 设置</title>
<style>
  /* 手机上给桌面雪莉做全套配置:换形象 / 换音色 / 语速 / 试听。
     选完即经 /control 作用到桌面那只雪莉身上并持久化;/petcfg 回显当前选中。 */
  :root { --bg:#05070f; --card:#0d1322; --line:#1c2740; --txt:#cfe4ff; --dim:#86a8d8; --hot:#8cdcff; --sel:#2a4a80; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; background:var(--bg); color:var(--txt); font-family:"PingFang SC",system-ui,sans-serif; }
  .wrap { max-width:560px; margin:0 auto; padding:14px 14px 48px; }
  .sec { color:var(--dim); font-size:13px; letter-spacing:2px; margin:20px 0 10px; }
  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .card { background:var(--card); border:2px solid var(--line); border-radius:14px; padding:14px 6px;
          text-align:center; font-size:15px; }
  .card.sel { border-color:var(--hot); background:#16203a; }
  .card .tag { display:block; font-size:11px; color:var(--dim); margin-top:3px; }
  .card .lic { display:block; font-size:10px; color:#5a8; margin-top:2px; }
  .vlist { display:flex; flex-direction:column; gap:8px; }
  .vrow { background:var(--card); border:2px solid var(--line); border-radius:12px; padding:14px;
          font-size:15px; display:flex; justify-content:space-between; align-items:center; }
  .vrow.sel { border-color:var(--hot); background:#16203a; }
  .vrow .eng { font-size:11px; color:var(--dim); }
  .rate { display:flex; align-items:center; gap:12px; }
  .rate input { flex:1; }
  .rate b { color:var(--hot); min-width:52px; text-align:right; }
  .test { display:flex; gap:8px; margin-top:10px; }
  .test input { flex:1; background:var(--card); border:1px solid var(--line); color:var(--txt);
                border-radius:12px; padding:14px; font-size:15px; }
  .test button { flex:0 0 96px; background:linear-gradient(135deg,#12305e,#0d1322); border:1px solid var(--sel);
                 color:var(--txt); border-radius:12px; font-size:16px; }
  .test button:active { transform:scale(.97); }
  #toast { position:fixed; left:50%; bottom:22px; transform:translateX(-50%); background:#16203a;
           border:1px solid var(--line); color:var(--hot); padding:8px 18px; border-radius:20px;
           font-size:13px; opacity:0; transition:opacity .25s; }
  .warn { color:#e88; font-size:12px; margin:8px 0; }
</style>
</head>
<body>
<div class="wrap">
  <div id="warn" class="warn" style="display:none">⚠️ 桌面雪莉不在线,改动无法即时生效</div>

  <div class="sec">形 象</div>
  <div class="grid" id="models"></div>

  <div class="sec">音 色</div>
  <div class="vlist" id="voices"></div>

  <div class="sec">语 速</div>
  <div class="rate">
    <input type="range" id="rate" min="-30" max="30" step="2" value="8">
    <b id="rateVal">+8%</b>
  </div>

  <div class="sec">试 听</div>
  <div class="test">
    <input id="testText" placeholder="打一句让她念,留空用默认" autocomplete="off">
    <button id="testBtn">▶ 试听</button>
  </div>
</div>
<div id="toast"></div>
<script>
  const toast = (t) => { const el = document.getElementById("toast"); el.textContent = t; el.style.opacity = 1;
    clearTimeout(el._t); el._t = setTimeout(() => el.style.opacity = 0, 1300); };
  let cur = {};
  async function send(cmd, arg) {
    try { const r = await fetch("/control", { method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ cmd, arg }) }); const j = await r.json();
      document.getElementById("warn").style.display = j.listeners ? "none" : "block";
      return j.listeners; } catch { toast("发送失败"); return 0; }
  }
  (async () => {
    try { cur = await (await fetch("/petcfg")).json(); } catch {}
    // 形象
    const models = await (await fetch("/models.json")).json();
    document.getElementById("models").innerHTML = models.map((m) =>
      `<div class="card${cur.model === m.url ? " sel" : ""}" data-url="${m.url}">${m.name}` +
      `<span class="tag">${m.kind || ""}</span>` +
      (m.licenseLabel ? `<span class="lic">${m.licenseLabel}</span>` : "") + `</div>`).join("");
    document.querySelectorAll("#models .card").forEach((c) => c.onclick = async () => {
      document.querySelectorAll("#models .card").forEach((x) => x.classList.remove("sel"));
      c.classList.add("sel"); if (await send("model", c.dataset.url)) toast("换形象中……"); });
    // 音色
    const voices = await (await fetch("/voices")).json();
    document.getElementById("voices").innerHTML = voices.map((v) =>
      `<div class="vrow${cur.voice === v.id ? " sel" : ""}" data-id="${v.id}">` +
      `<span>${v.name}</span><span class="eng">${v.engine}</span></div>`).join("");
    document.querySelectorAll("#voices .vrow").forEach((r) => r.onclick = async () => {
      document.querySelectorAll("#voices .vrow").forEach((x) => x.classList.remove("sel"));
      r.classList.add("sel"); await send("voice", r.dataset.id); toast("已换音色,点试听听听"); });
    // 语速回显
    if (cur.rate) { const n = parseInt(cur.rate, 10); if (!isNaN(n)) { document.getElementById("rate").value = n;
      document.getElementById("rateVal").textContent = (n >= 0 ? "+" : "") + n + "%"; } }
  })();
  const rate = document.getElementById("rate");
  rate.oninput = () => { const n = +rate.value; document.getElementById("rateVal").textContent = (n >= 0 ? "+" : "") + n + "%"; };
  rate.onchange = () => { const n = +rate.value; send("rate", (n >= 0 ? "+" : "") + n + "%"); };
  document.getElementById("testBtn").onclick = () => {
    send("testvoice", document.getElementById("testText").value.trim()); toast("让她念念看～"); };
</script>
</body>
</html>
