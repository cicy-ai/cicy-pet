<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>雪莉的小本本</title>
<style>
  /* 手账小巧本:纸铺满整窗、不透明(不再是空花瓶)。四角小圆角 + 投影靠窗口 hasShadow。
     窗口高度由 JS 量好真实内容高再让主进程收窗——空则矮、厚则长,永远不留大片空白。 */
  html, body { margin:0; padding:0; height:100%; background:transparent; overflow:hidden;
               font-family:"Kaiti SC","STKaiti","PingFang SC",serif; }
  #paper { position:absolute; inset:0; border-radius:16px; overflow:hidden;
           background:linear-gradient(180deg,#fdf8ec,#f6ead0);
           background-image:repeating-linear-gradient(180deg, transparent 0 33px, rgba(160,130,70,.12) 33px 34px);
           border:1px solid #e2d5b0; box-sizing:border-box; padding:22px 24px 20px; }
  .tape { position:absolute; left:50%; top:-2px; transform:translateX(-50%) rotate(1.2deg);
          width:120px; height:22px; background:rgba(140,200,255,.55); border-radius:3px; z-index:2; }
  #close { position:absolute; right:14px; top:12px; width:30px; height:30px; line-height:28px;
           text-align:center; font-size:18px; color:#a8905e; cursor:pointer;
           border:1.5px solid #d8c79c; border-radius:50%; user-select:none; }
  #close:hover { background:#efe2c2; color:#7a5b22; }
  h1 { margin:2px 0 1px; font-size:27px; color:#7a5b22; letter-spacing:3px; }
  .sub { font-size:13px; color:#b09a6a; margin-bottom:6px; }
  .sec { margin:15px 0 5px; font-size:18px; color:#8a6a2a;
         border-bottom:2px dotted #d8c79c; padding-bottom:3px; }
  .it { margin:9px 0; line-height:1.4; }
  .it .t { font-size:17px; font-weight:700; color:#5d4a1e; }
  .it .stars { color:#e0a63c; font-size:13px; margin-left:7px; letter-spacing:1px; }
  .it .c { font-size:15px; color:#6f5c34; display:block; margin-top:2px; }
  .it .d { font-size:11px; color:#bda87a; display:block; margin-top:1px; }
  .empty { font-size:15px; color:#b09a6a; font-style:italic; margin:14px 0 6px; line-height:1.5; }
</style>
</head>
<body>
<div id="paper">
  <div class="tape"></div>
  <div id="close" title="收起">✕</div>
  <h1>雪莉的小本本</h1>
  <div class="sub">关于守门人，我每天记一点 ✨</div>
  <div id="body"></div>
</div>
<script>
  const SECTIONS = [
    { key: "preference", icon: "💛", label: "主人的喜好" },
    { key: "person",     icon: "🧍", label: "在乎的人" },
    { key: "fact",       icon: "📌", label: "习惯·小事" },
    { key: "constraint", icon: "🚫", label: "千万别踩" },
    { key: "knowledge",  icon: "🎓", label: "我学到的" },
  ];
  const TYPE_MAP = { preference:"preference", person:"person", fact:"fact",
                     constraint:"constraint", knowledge:"knowledge", procedure:"knowledge", lesson:"knowledge" };
  function reportHeight() {
    // 量真实内容高度(paper padding 已含在 scrollHeight 里),让主进程把窗口收到贴合
    const h = document.getElementById("paper").scrollHeight;
    if (window.nbHost && window.nbHost.reportHeight) window.nbHost.reportHeight(h);
  }
  (async () => {
    let entries = [];
    try { entries = (await (await fetch("/memories")).json()).entries || []; } catch {}
    const by = {};
    for (const e of entries) { const k = TYPE_MAP[e.type] || "fact"; (by[k] = by[k] || []).push(e); }
    document.getElementById("body").innerHTML = SECTIONS.map((s) => {
      const list = by[s.key] || [];
      if (!list.length) return "";
      const its = list.map((e) =>
        `<div class="it"><span class="t">${e.title || e.mem_id}</span>` +
        `<span class="stars">${"★".repeat(Math.max(1, Math.min(5, e.salience)))}</span>` +
        `<span class="c">${e.content}</span>` +
        `<span class="d">${(e.updated || "").slice(0, 10)}</span></div>`).join("");
      return `<div class="sec">${s.icon} ${s.label}</div>${its}`;
    }).join("") || `<div class="empty">还是空白的……<br>多陪我聊聊，我就会记下关于你的一切啦。</div>`;
    requestAnimationFrame(reportHeight);
  })();
  document.getElementById("close").addEventListener("click", () => window.close());
  document.addEventListener("keydown", (e) => { if (e.key === "Escape") window.close(); });
</script>
</body>
</html>
