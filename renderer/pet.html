<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <title>CiCy Pet</title>

  <script src="libs/live2dcubismcore.min.js"></script>
  <script src="libs/live2d.min.js"></script>
  <script src="libs/pixi.min.js"></script>
  <script src="libs/pixi-live2d-display.min.js"></script>

  <style>
    /* 桌宠窗口是 transparent + frameless 的，所以一切都必须真透明：
       body 不能有背景色，canvas 也不能。 */
    html, body {
      margin: 0;
      height: 100%;
      background: transparent;
      overflow: hidden;
      user-select: none;
      cursor: default;
    }
    #canvas { display: block; width: 100%; height: 100%; }

    /* 说话气泡：贴在角色头顶 */
    #bubble {
      position: fixed;
      left: 50%;
      top: 6px;
      transform: translateX(-50%);
      max-width: 90%;
      padding: 8px 12px;
      background: rgba(245, 247, 250, .96);
      color: #1b1d22;
      border-radius: 12px;
      font: 13px/1.45 -apple-system, "PingFang SC", system-ui, sans-serif;
      box-shadow: 0 4px 18px rgba(0, 0, 0, .28);
      pointer-events: none;
      opacity: 0;
      transition: opacity .18s ease;
    }
    #bubble.on { opacity: 1; }
  </style>
</head>

<body>
  <canvas id="canvas"></canvas>
  <div id="bubble"></div>

  <script>
    const api = window.electronAPI || null;   // Live2DPet 的 preload；没有就降级成普通网页
    const $ = (id) => document.getElementById(id);
    const bus = new BroadcastChannel("live2d-pet");   // 和 settings.html 同源 → 直接通

    // 配置：URL 参数 > localStorage > 默认。settings.html 写 localStorage + 广播，
    // 这边收到就实时应用（换角色不用重启）。
    const params = new URLSearchParams(location.search);
    const saved = JSON.parse(localStorage.getItem("pet_config") || "{}");
    const cfg = {
      model: params.get("model") || saved.model || "models/Hiyori/Hiyori.model3.json",
      engine: params.get("engine") || saved.engine || "edge",
      voice: params.get("voice") || saved.voice || "zh-CN-XiaoyiNeural",
      // 调皮参数：晓伊 + 提速 8% + 提调 20Hz（用户 A/B 选的「二号」），只对 edge 生效
      rate: params.get("rate") || saved.rate || "+8%",
      pitch: params.get("pitch") || saved.pitch || "+20Hz",
    };

    // 记住的形象大小：设置页把 size 存进 pet_config，这里启动时直接应用——
    // 否则每次启动都回到 createPetWindow 写死的 340x420，调过的大小白调了。
    if (api && +saved.size) api.setWindowSize?.(+saved.size, Math.round(+saved.size * 1.25));

    // 性能：桌宠是「一直在跑」的 WebGL，默认 60fps + Retina 2x 像素（=4 倍工作量）+
    // 透明置顶窗口的合成开销，弱机器会明显卡。两刀砍一半：
    //   ① resolution 锁 1x（不按 Retina 2x 渲，肉眼几乎无差）
    //   ② 帧率封到 30fps（Live2D 呼吸/眨眼/口型 30 帧完全够）
    // 可用 URL 参数覆盖：?fps=60 或 ?dpr=2（想更清晰、机器够强时）。
    const app = new PIXI.Application({
      view: $("canvas"),
      resizeTo: window,
      backgroundAlpha: 0,        // 全透明，才能贴在桌面上
      autoStart: true,
      antialias: false,          // 关抗锯齿，省一截 GPU
      resolution: Math.min(+params.get("dpr") || 1, window.devicePixelRatio || 1),
      autoDensity: true,
    });
    app.ticker.maxFPS = Math.max(15, +params.get("fps") || 30);

    let model = null;
    const lip = { active: false, value: 0 };

    // 说话相关的状态必须声明在这里 —— loadModel() 在模块初始化时就会跑，它开头会调
    // stopSpeaking()，如果这些 let 放在文件后面，就会撞进 TDZ 直接抛
    // "Cannot access 'rafId' before initialization"，模型压根加不到舞台上。
    const HOP = 0.025;                 // 口型包络的步长（秒）
    let audioCtx = null, srcNode = null, rafId = 0;

    const dance = { on: false, bpm: 110, t0: 0 };

    // ---------- 参数解析 ----------
    // 模型自带的动作只有 Idle / TapBody，没有舞蹈，所以舞是「编」出来的：按拍子直接
    // 驱动身体和头部的参数。麻烦在于**各模型的参数命名不统一**：
    //   Hiyori → ParamBodyAngleX      Wanko → PARAM_BODY_ANGLE_X
    //   tororo（Cubism 2）→ 连参数表都不暴露，只能按名字试探
    // 所以按「语义角色」去认，每个角色给一串候选名，谁在就用谁。
    const ROLES = {
      headX: ["ParamAngleX", "PARAM_ANGLE_X"],
      headY: ["ParamAngleY", "PARAM_ANGLE_Y"],
      headZ: ["ParamAngleZ", "PARAM_ANGLE_Z"],
      bodyX: ["ParamBodyAngleX", "PARAM_BODY_ANGLE_X"],
      bodyY: ["ParamBodyAngleY", "PARAM_BODY_ANGLE_Y"],
      bodyZ: ["ParamBodyAngleZ", "PARAM_BODY_ANGLE_Z"],
      armL: ["ParamArmLA", "ParamArmL", "PARAM_ARM_L", "ParamHandL", "PARAM_HAND_L"],
      armR: ["ParamArmRA", "ParamArmR", "PARAM_ARM_R", "ParamHandR", "PARAM_HAND_R"],
      eyeX: ["ParamEyeBallX", "PARAM_EYE_BALL_X"],
      earL: ["PARAM_EAR_L", "ParamEarL"],
      earR: ["PARAM_EAR_R", "ParamEarR"],
      hair: ["ParamHairAhoge", "ParamHairFront"],
    };

    // Cubism 2 拿不到 min/max，按 Live2D 标准参数的常规量程兜底
    const FALLBACK_RANGE = {
      headX: [-30, 30], headY: [-30, 30], headZ: [-30, 30],
      bodyX: [-10, 10], bodyY: [-10, 10], bodyZ: [-10, 10],
      armL: [-1, 1], armR: [-1, 1], eyeX: [-1, 1],
      earL: [-1, 1], earR: [-1, 1], hair: [-1, 1],
    };

    let slots = {};   // role -> {set(v), min, max, def}

    function resolveParams(core) {
      slots = {};
      const raw = core._model && core._model.parameters;
      const ids = raw ? Array.from(raw.ids) : null;

      for (const [role, names] of Object.entries(ROLES)) {
        for (const name of names) {
          if (ids) {                                  // Cubism 4：有完整参数表
            const i = ids.indexOf(name);
            if (i < 0) continue;
            slots[role] = {
              min: raw.minimumValues[i], max: raw.maximumValues[i], def: raw.defaultValues[i],
              set: (v) => core.setParameterValueByIndex(i, v),
            };
          } else {                                    // Cubism 2：只能按名字探
            if (typeof core.getParamIndex !== "function" || core.getParamIndex(name) < 0) continue;
            const [min, max] = FALLBACK_RANGE[role];
            slots[role] = { min, max, def: 0, set: (v) => core.setParamFloat(name, v) };
          }
          break;
        }
      }
    }

    // n ∈ [-1,1] → 实际参数值。默认值不一定在量程中点（手臂尤其），所以两侧分别按
    // 「默认到端点」的距离缩放，避免把手臂甩出画面。
    function put(role, n) {
      const s = slots[role];
      if (!s) return;
      const k = Math.max(-1, Math.min(1, n));
      const v = s.def + k * (k >= 0 ? (s.max - s.def) : (s.def - s.min));
      s.set(v);
    }

    // ---------- 动作库 ----------
    // 参数只能驱动「模型内部」的骨骼（头、身、臂）。像转圈、跳跃、绕圈走这种整体位移
    // 和旋转，参数是做不到的 —— 那要动 pixi 的 transform（position / scale / rotation）。
    // 所以一个「动作」= 参数动画 + transform 动画，两条腿一起走。
    //
    // 关于转圈：Live2D 是 2D 的，模型没有背面，硬转 360° 会露馅。这里用 2D 精灵伪造
    // Y 轴旋转的经典手法 —— 横向缩放走 cos 曲线（1 → 0 → -1 → 0 → 1），过零点时人被
    // 压成一条线，然后镜像出来。看着就像转了一圈，代价是「背面」其实是镜像的正面。
    let baseScale = 1, basePos = { x: 0, y: 0 };
    const move = { name: null, t0: 0, dur: 0 };

    // 过冲回弹缓动：飞入时冲过头再弹回定住，制造「吓一跳」的惊人感
    const easeOutBack = (t) => { const c1 = 2.2, c3 = c1 + 1; return 1 + c3 * (t - 1) ** 3 + c1 * (t - 1) ** 2; };
    const easeOutCubic = (t) => 1 - (1 - t) ** 3;

    const MOVES = {
      // 入场特效：从窗口顶外掉下来，落地压扁再弹两下定住。
      // 注意窗口只有 ~340×420，模型飞出画布就直接被裁掉看不见，
      // 所以全程动作必须留在窗口内——「跳水式落地」在小画布里最显眼。
      flyin: {
        label: "飞入", dur: 1600,
        tf: (p) => {
          const H = window.innerHeight;
          if (p < 0.5) {
            // 前半：自由落体（加速掉落），带一点左右飘和倾斜
            const f = p / 0.5, e = f * f;
            return {
              dx: 26 * Math.sin(3 * Math.PI * f) * (1 - f),
              dy: (1 - e) * -H,           // 从顶外一路掉到基准位
              sx: 1, sy: 1,
              rot: 0.14 * Math.sin(2 * Math.PI * f),
            };
          }
          // 后半：落地——压扁横向鼓起，指数回弹，同时小跳两下
          const q = (p - 0.5) / 0.5;
          const sq = Math.exp(-6 * q) * 0.22;
          const hop = Math.abs(Math.sin(q * Math.PI * 2)) * (1 - q) * H * 0.05;
          return { dx: 0, dy: -hop, sx: 1 + sq, sy: 1 - sq, rot: 0 };
        },
        param: (p, put) => { put("headZ", (1 - p) * 0.5); put("bodyZ", (1 - p) * 0.3); },
        sfx: flyinSfx,
      },
      // superfly 的模型姿势段：窗口横穿桌面时她保持「超人横飞」，落地瞬间立正+压扁。
      // 时长要和 windowFlight 的 FLY_MS+BOUNCE_MS 完全对齐（窗口动画和姿势共用进度）。
      superfly: {
        label: "螺旋飞入", dur: 3100,
        // 三段：螺旋接近(0~0.77，对齐 SPIRAL_MS=2400)由小变大、随轨道左右压弯；
        // 到位瞬间弹性放大「啵」地定格；尾段晕头转向左右摇。
        tf: (p) => {
          const P1 = 0.77;
          if (p < P1) {
            const f = p / P1;
            const s = 0.15 + 0.85 * f * f * (3 - 2 * f);   // smoothstep 由小变大
            const bank = 0.15 * Math.sin(SPIRAL_TURNS * 2 * Math.PI * f) * (1 - f);
            return { dx: 0, dy: 0, sx: s, sy: s, rot: bank };
          }
          if (p < 0.85) {
            const q = (p - P1) / 0.08;
            const pop = 0.12 * Math.sin(Math.PI * q) * Math.exp(-2 * q);
            return { dx: 0, dy: 0, sx: 1 + pop, sy: 1 + pop, rot: 0 };
          }
          const w = (p - 0.85) / 0.15;
          return { dx: 0, dy: 0, sx: 1, sy: 1, rot: 0.09 * Math.sin(3 * Math.PI * w) * (1 - w) };
        },
        param: (p, put) => {
          if (p < 0.77) { put("headZ", 0.4); }
          else { const w = (p - 0.77) / 0.23; put("headX", 0.8 * Math.sin(3 * Math.PI * w) * (1 - w)); }
        },
        sfx: superflySfx,
      },
      // 被甩飞时的翻滚（跟着窗口一起飞出屏幕）
      tumble: {
        label: "翻滚", dur: 900,
        tf: (p) => ({ dx: 0, dy: 0, sx: 1, sy: 1, rot: p * 12 }),
        param: (p, put) => { put("headZ", 0.8); },
      },
      spin: {
        label: "转圈", dur: 1400,
        tf: (p) => ({
          sx: Math.cos(2 * Math.PI * p),                 // 横向压扁再翻面 = 伪 3D 旋转
          dy: -18 * Math.sin(Math.PI * p),              // 顺便轻轻跃起，不然像在原地扭
          rot: 0.05 * Math.sin(2 * Math.PI * p),
        }),
        param: (p, put) => {
          put("bodyZ", 0.5 * Math.sin(2 * Math.PI * p));
          put("headZ", -0.4 * Math.sin(2 * Math.PI * p));
        },
      },
      turn: {
        label: "转身", dur: 700,
        tf: (p) => ({ sx: Math.cos(Math.PI * p) }),      // 只转半圈，停在镜像面
        param: (p, put) => put("headX", 0.6 * Math.sin(Math.PI * p)),
      },
      jump: {
        label: "跳一下", dur: 620,
        tf: (p) => {
          const h = Math.sin(Math.PI * p);
          return {
            dy: -70 * h,
            sy: 1 + 0.12 * h - 0.10 * Math.max(0, Math.cos(Math.PI * p) * (p < 0.08 || p > 0.92 ? 1 : 0)),
            sxAbs: 1 - 0.06 * h,                         // 起跳时略微拉长（squash & stretch）
          };
        },
        param: (p, put) => {
          put("bodyY", 0.8 * Math.sin(Math.PI * p));
          put("headY", 0.5 * Math.sin(Math.PI * p));
        },
      },
      wave: {
        label: "挥手", dur: 1600,
        param: (p, put) => {
          put("armR", 0.9);                              // 举起来
          put("armL", -0.1);
          put("headZ", 0.25 * Math.sin(6 * Math.PI * p));
          put("bodyZ", 0.15 * Math.sin(6 * Math.PI * p));
        },
      },
      nod: {
        label: "点头", dur: 900,
        param: (p, put) => put("headY", -0.85 * Math.abs(Math.sin(2 * Math.PI * p))),
      },
      shake: {
        label: "摇头", dur: 900,
        param: (p, put) => {
          put("headX", 0.8 * Math.sin(4 * Math.PI * p));
          put("headZ", 0.25 * Math.sin(4 * Math.PI * p));
        },
      },
      orbit: {
        label: "绕圈走", dur: 3000,
        tf: (p) => {
          const a = 2 * Math.PI * p;
          return {
            dx: 55 * Math.sin(a),
            dy: -14 * Math.abs(Math.sin(2 * Math.PI * p)),   // 走路的上下颠
            sx: Math.cos(a) >= 0 ? 1 : -1,                    // 走到背面就翻个面
          };
        },
        param: (p, put) => {
          put("bodyX", 0.4 * Math.sin(2 * Math.PI * p));
          put("headX", 0.5 * Math.sin(2 * Math.PI * p));
        },
      },
    };

    function playMove(name) {
      if (!MOVES[name] || !model) return;
      move.name = name;
      move.dur = MOVES[name].dur;
      move.t0 = performance.now();
      if (MOVES[name].sfx) { try { MOVES[name].sfx(); } catch {} }
      bus.postMessage({ type: "moveState", name, label: MOVES[name].label });
    }

    // 飞入音效：WebAudio 现场合成，不依赖素材文件（也就没有素材版权问题）。
    // 卡通「piu~~」下落哨声（音高从高滑到低，对准前半 0.8s 的下落），
    // 落地一声闷响 + 弹簧 boing（音高上下晃两下衰减），对准压扁回弹。
    function flyinSfx() {
      audioCtx = audioCtx || new AudioContext();
      audioCtx.resume();
      const t0 = audioCtx.currentTime, out = audioCtx.destination;

      const whistle = audioCtx.createOscillator();
      whistle.type = "sine";
      whistle.frequency.setValueAtTime(1250, t0);
      whistle.frequency.exponentialRampToValueAtTime(380, t0 + 0.8);
      const wg = audioCtx.createGain();
      wg.gain.setValueAtTime(0.0001, t0);
      wg.gain.exponentialRampToValueAtTime(0.4, t0 + 0.1);
      wg.gain.setValueAtTime(0.4, t0 + 0.7);
      wg.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.82);
      whistle.connect(wg).connect(out);
      whistle.start(t0); whistle.stop(t0 + 0.85);

      const tl = t0 + 0.8;    // 落地时刻 = dur 1600ms 的中点
      const thump = audioCtx.createOscillator();
      thump.type = "sine";
      thump.frequency.setValueAtTime(200, tl);
      thump.frequency.exponentialRampToValueAtTime(65, tl + 0.1);
      const tg = audioCtx.createGain();
      tg.gain.setValueAtTime(0.0001, tl);
      tg.gain.exponentialRampToValueAtTime(0.6, tl + 0.015);
      tg.gain.exponentialRampToValueAtTime(0.0001, tl + 0.18);
      thump.connect(tg).connect(out);
      thump.start(tl); thump.stop(tl + 0.2);

      const boing = audioCtx.createOscillator();
      boing.type = "triangle";
      boing.frequency.setValueAtTime(420, tl);
      boing.frequency.exponentialRampToValueAtTime(150, tl + 0.07);
      boing.frequency.exponentialRampToValueAtTime(280, tl + 0.16);
      boing.frequency.exponentialRampToValueAtTime(120, tl + 0.34);
      const bg = audioCtx.createGain();
      bg.gain.setValueAtTime(0.0001, tl);
      bg.gain.exponentialRampToValueAtTime(0.35, tl + 0.02);
      bg.gain.exponentialRampToValueAtTime(0.0001, tl + 0.42);
      boing.connect(bg).connect(out);
      boing.start(tl); boing.stop(tl + 0.45);
    }

    // ---------- 破窗入场：整个窗口横穿真实桌面 ----------
    // 代入感的来源：无边框透明窗口本身从屏幕右缘外冲进来，看起来就是
    // Mao 本人横着飞过桌面，砸回原位弹两下，落定后开口吐槽。
    const SPIRAL_MS = 2400, SPIRAL_TURNS = 3, R_MAX = 170;  // 螺旋时长/圈数/最大圈半径
    const ENTRANCE_LINES = [
      "哇……转晕了转晕了……嘿嘿，我来啦！",
      "嘿嘿，吓到你了吧？",
      "呼……绕了好大一圈才找到你！",
      "咦？这是谁的电脑？算了，以后就是我的啦！",
    ];
    async function windowFlight(line) {
      if (!api || !model) { playMove("flyin"); return; }  // 浏览器里没有窗口控制，退回画布内版本
      const b = await api.getWindowBounds();
      const sw = ((window.screen && window.screen.width) || 1680);
      const sh = ((window.screen && window.screen.height) || 1050);
      // 起点：屏幕右下角；终点：屏幕中心。螺旋圈半径由小变大，最后 1/5 收拢落进中心。
      const from = { x: sw - b.width / 2 - 30, y: sh - b.height / 2 - 40 };
      const to = { x: sw / 2, y: sh / 2 - 30 };
      playMove("superfly");
      const t0 = performance.now();
      await new Promise((done) => {
        (function step() {
          const t = performance.now() - t0;
          if (t < SPIRAL_MS) {
            const f = t / SPIRAL_MS;
            const ease = f * f * (3 - 2 * f);          // 螺旋中心从右下角滑向屏幕中心
            const cx = from.x + (to.x - from.x) * ease;
            const cy = from.y + (to.y - from.y) * ease;
            const r = R_MAX * (f < 0.8 ? f / 0.8 : (1 - f) / 0.2);   // 圈由小变大，末段收拢
            const th = SPIRAL_TURNS * 2 * Math.PI * f;
            const x = cx + r * Math.cos(th) - b.width / 2;
            const y = Math.max(28, Math.min(sh - 140, cy + r * 0.8 * Math.sin(th) - b.height / 2));
            api.setWindowPosition(Math.round(x), Math.round(y));
          } else {
            api.setWindowPosition(Math.round(to.x - b.width / 2), Math.round(to.y - b.height / 2));
            done(); return;
          }
          requestAnimationFrame(step);
        })();
      });
      try { speak(line || ENTRANCE_LINES[Math.floor(Math.random() * ENTRANCE_LINES.length)]); } catch {}
    }

    // ---------- 拍摄剧本模式 ----------
    // 拍抖音用：Mao 的台词按顺序排好，主进程注册的全局快捷键每按一次
    // 就 next() 一步（说下一句+做动作），镜头外的人负责接话。
    // 流程：藏起来 → 螺旋入场“哈喽” → 自我介绍 → 会什么 → 报今天天气。
    const SCRIPT = [
      { move: "entrance", text: "哈喽——！" },
      { text: "我叫 CiCy！住在你电脑里的小精灵哦～你天天敲键盘，吵得我睡不着，今天特地出来认识一下！" },
      { text: "我会的可多啦！会聊天、会卖萌、会陪你写代码，还会帮你数 bug——昨天你写了二十七个哦！" },
      { move: "spin", text: "查到啦！今天上海大晴天，现在三十二度，最高三十六度——热死喵了！建议你哪儿也别去，在家陪我吹空调！" },
    ];
    let scriptIdx = 0;
    window.petScript = {
      // 开拍准备：Mao 溜到屏幕外藏好（桌面干干净净，等入场）
      async reset() {
        scriptIdx = 0;
        stopSpeaking();
        if (api) {
          const sw = (window.screen && window.screen.width) || 1680;
          await api.setWindowPosition(sw + 80, Math.round(((window.screen && window.screen.height) || 1050) / 2));
        }
        return "ready";
      },
      async next() {
        if (maoGone) {           // 被甩飞后按一下 = 叫回来（螺旋入场，不消耗剧本台词）
          maoGone = false;
          await windowFlight("哼！刚才是谁把人家甩出去的！");
          return "back";
        }
        const s = SCRIPT[scriptIdx];
        if (!s) return "end";
        scriptIdx++;
        if (s.move === "entrance") await windowFlight(s.text);
        else { if (s.move) playMove(s.move); speak(s.text); }
        return scriptIdx + "/" + SCRIPT.length;
      },
    };

    // ---------- 语音对话 ----------
    // Alt+Space：按一下开始录音，再按一下（或静音 1.5 秒）自动结束 →
    // 本地 whisper 转文字 → AI 大脑（设置里配的 key）→ CiCy 开口回答。
    const CHAT_PERSONA =
      "你是CiCy（读作 say say），住在用户电脑里的调皮小精灵桌宠。" +
      "用中文口语回答，简短（一两句话，30字以内），活泼调皮爱开玩笑，偶尔用语气词（嘿嘿/哇/诶）。" +
      "不要用 markdown、列表或表情符号。";
    const chatHistory = [];
    let rec = null;

    // 录音 = 本地留一份（whisper 兜底）+ 同时流式推给 /asr（火山）→ 字幕边说边长。
    async function voiceBegin() {
      if (rec) return;
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const ctx = new AudioContext({ sampleRate: 16000 });
        const src = ctx.createMediaStreamSource(stream);
        const proc = ctx.createScriptProcessor(4096, 1, 1);
        const bufs = [];
        const segs = new Map();   // seg → {text, definite}，火山按段累积更新
        let ws = null;
        try {
          ws = new WebSocket(`ws://127.0.0.1:13004/asr`);
          ws.binaryType = "arraybuffer";
          ws.onmessage = (ev) => {
            if (!rec) return;
            try {
              const m = JSON.parse(ev.data);
              if (m.type === "transcript") {
                segs.set(m.seg, { text: m.text, definite: m.definite });
                const live = [...segs.values()].map((s) => s.text).join("");
                if (live) bubble("🎤 " + live, true);   // 边说边出字幕
              }
            } catch {}
          };
        } catch {}
        rec = { ctx, stream, proc, bufs, segs, ws };
        proc.onaudioprocess = (e) => {
          if (!rec) return;
          const d = e.inputBuffer.getChannelData(0);
          bufs.push(new Float32Array(d));
          if (ws && ws.readyState === 1) {   // Float32 → PCM16 流出去
            const p = new Int16Array(d.length);
            for (let i = 0; i < d.length; i++) p[i] = Math.max(-1, Math.min(1, d[i])) * 32767;
            ws.send(p.buffer);
          }
        };
        src.connect(proc);
        proc.connect(ctx.destination);
        bubble("🎤 在听……", true);
      } catch (e) {
        rec = null;
        bubble("麦克风打不开：" + (e.message || e), true);
        setTimeout(() => bubble("", false), 3000);
      }
    }

    async function voiceFinish() {
      if (!rec) return;
      const { ctx, stream, proc, bufs, segs, ws } = rec;
      rec = null;
      try { proc.disconnect(); stream.getTracks().forEach((t) => t.stop()); ctx.close(); } catch {}
      const n = bufs.reduce((s, b) => s + b.length, 0);
      if (n < 16000 * 0.35) {   // 太短当误触
        try { ws?.close(); } catch {}
        bubble("", false); return;
      }
      // 催火山出定稿，最多等 1.2s 收尾帧
      let text = "";
      if (ws && ws.readyState === 1) {
        try { ws.send(JSON.stringify({ type: "flush" })); } catch {}
        await new Promise((done) => {
          const t = setTimeout(done, 1200);
          ws.onmessage = (ev) => {
            try {
              const m = JSON.parse(ev.data);
              if (m.type === "transcript") {
                segs.set(m.seg, { text: m.text, definite: m.definite });
                if (m.definite) { clearTimeout(t); done(); }
              }
            } catch {}
          };
          ws.onclose = () => { clearTimeout(t); done(); };
        });
        text = [...segs.values()].map((s) => s.text).join("").trim();
      }
      try { ws?.close(); } catch {}
      // 流式没出结果（没配 key/断网/被拒）→ 本地 whisper 兜底
      if (!text) {
        bubble("🧠 听懂中……", true);
        try {
          const res = await fetch("/stt", { method: "POST", body: encodeWav(bufs, n, 16000) });
          if (res.ok) text = ((await res.json()).text || "").replace(/\[.*?\]|\(.*?\)/g, "").trim();
        } catch {}
      }
      if (!text) { bubble("没听清，再说一遍？", true); setTimeout(() => bubble("", false), 2500); return; }
      dataChirp();   // 「收到指令」数据雨——填掉 AI 思考的空档
      bubble("你：" + text, true);
      await chatReply(text);
    }

    // 兼容旧入口（快捷键 Alt+Space/Alt+V 还是可用的）：按一下开始，再按一下结束
    async function voiceToggle() { return rec ? voiceFinish() : voiceBegin(); }

    function encodeWav(bufs, n, sr) {
      const w = new DataView(new ArrayBuffer(44 + n * 2));
      const str = (o, s) => { for (let i = 0; i < s.length; i++) w.setUint8(o + i, s.charCodeAt(i)); };
      str(0, "RIFF"); w.setUint32(4, 36 + n * 2, true); str(8, "WAVEfmt ");
      w.setUint32(16, 16, true); w.setUint16(20, 1, true); w.setUint16(22, 1, true);
      w.setUint32(24, sr, true); w.setUint32(28, sr * 2, true); w.setUint16(32, 2, true); w.setUint16(34, 16, true);
      str(36, "data"); w.setUint32(40, n * 2, true);
      let o = 44;
      for (const b of bufs) for (let i = 0; i < b.length; i++, o += 2)
        w.setInt16(o, Math.max(-1, Math.min(1, b[i])) * 32767, true);
      return new Blob([w.buffer], { type: "audio/wav" });
    }

    // 黑客帝国「字幕浮现」声：玻璃质感的数据雨——一片高频正弦小水滴
    // （音高各异、前密后疏、每滴微微下滑），全部送进反馈延迟做空间回声尾巴，
    // 底下垫一层从高往低扫的窄带气声（字幕浮现的「嘘——」）。全合成，零素材。
    function dataChirp() {
      audioCtx = audioCtx || new AudioContext();
      audioCtx.resume();
      const t0 = audioCtx.currentTime, out = audioCtx.destination;

      // 空间感：90ms 反馈延迟 + 环内低通（回声越来越闷，像大空间）
      const bus = audioCtx.createGain(); bus.gain.value = 1;
      const dly = audioCtx.createDelay(); dly.delayTime.value = 0.09;
      const fb = audioCtx.createGain(); fb.gain.value = 0.4;
      const lp = audioCtx.createBiquadFilter(); lp.type = "lowpass"; lp.frequency.value = 5500;
      const wet = audioCtx.createGain(); wet.gain.value = 0.5;
      bus.connect(out);
      bus.connect(dly); dly.connect(lp); lp.connect(fb); fb.connect(dly);
      dly.connect(wet); wet.connect(out);

      // 玻璃雨滴 ×26
      const N = 26;
      for (let i = 0; i < N; i++) {
        const when = t0 + Math.pow(i / N, 1.35) * 0.72;   // 前密后疏
        const f0 = 3200 + Math.random() * 4800;
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = "sine";
        o.frequency.setValueAtTime(f0, when);
        o.frequency.exponentialRampToValueAtTime(f0 * 0.72, when + 0.09);
        g.gain.setValueAtTime(0.0001, when);
        g.gain.exponentialRampToValueAtTime(0.045 + Math.random() * 0.055, when + 0.006);
        g.gain.exponentialRampToValueAtTime(0.0001, when + 0.1);
        o.connect(g).connect(bus);
        o.start(when); o.stop(when + 0.12);
      }

      // 底衬气声：8.5k → 2.8k 往下扫
      const len = Math.floor(audioCtx.sampleRate * 0.7);
      const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
      const n = audioCtx.createBufferSource(); n.buffer = buf;
      const bp = audioCtx.createBiquadFilter();
      bp.type = "bandpass"; bp.Q.value = 2.2;
      bp.frequency.setValueAtTime(8500, t0);
      bp.frequency.exponentialRampToValueAtTime(2800, t0 + 0.68);
      const ng = audioCtx.createGain();
      ng.gain.setValueAtTime(0.03, t0);
      ng.gain.exponentialRampToValueAtTime(0.08, t0 + 0.18);
      ng.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.7);
      n.connect(bp).connect(ng).connect(bus);
      n.start(t0); n.stop(t0 + 0.72);
    }

    async function chatReply(userText) {
      let conf = {};
      try { conf = (api && api.loadConfig) ? (await api.loadConfig()) || {} : {}; } catch {}
      if (!conf.apiKey) {
        speak("我的大脑还没插钥匙，去设置里把 API key 填上，我就能陪你聊天啦！");
        return;
      }
      chatHistory.push({ role: "user", content: userText });
      while (chatHistory.length > 12) chatHistory.shift();
      try {
        const r = await fetch((conf.baseURL || "https://openrouter.ai/api/v1") + "/chat/completions", {
          method: "POST",
          headers: { "Content-Type": "application/json", Authorization: "Bearer " + conf.apiKey },
          body: JSON.stringify({
            model: conf.modelName || "x-ai/grok-4.1-fast",
            max_tokens: 200,
            messages: [{ role: "system", content: CHAT_PERSONA }, ...chatHistory],
          }),
        });
        const j = await r.json();
        const reply = ((j.choices && j.choices[0].message.content) || "").trim();
        if (!reply) throw new Error((j.error && j.error.message) || "空回复");
        chatHistory.push({ role: "assistant", content: reply });
        speak(reply);
      } catch (e) {
        speak("呜，大脑短路了。");
        console.error("[chat]", e);
      }
    }

    window.petVoice = { toggle: voiceToggle, say: chatReply };

    // superfly 音效：飞行段长哨声，落地闷响+弹簧，第二跳补一声小闷响
    function superflySfx() {
      audioCtx = audioCtx || new AudioContext();
      audioCtx.resume();
      const t0 = audioCtx.currentTime, out = audioCtx.destination;
      const tone = (type, freqs, gains) => {   // freqs/gains: [[t,v],...] 相对 t0
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = type;
        freqs.forEach(([t, v], i) => i ? o.frequency.exponentialRampToValueAtTime(v, t0 + t)
                                       : o.frequency.setValueAtTime(v, t0 + t));
        gains.forEach(([t, v], i) => i ? g.gain.exponentialRampToValueAtTime(v, t0 + t)
                                       : g.gain.setValueAtTime(v, t0 + t));
        o.connect(g).connect(out);
        const last = gains[gains.length - 1][0];
        o.start(t0 + freqs[0][0]); o.stop(t0 + last + 0.05);
      };
      // 螺旋接近：音高盘旋上升 + 颤音，音量由远及近渐大（对齐 SPIRAL_MS=2.4s）
      const swirl = audioCtx.createOscillator();
      swirl.type = "sine";
      const N = 80, curve = new Float32Array(N);
      for (let i = 0; i < N; i++) {
        const t = i / (N - 1);
        curve[i] = 300 * Math.pow(3.8, t) * (1 + 0.1 * Math.sin(2 * Math.PI * 5 * t * 2.4));
      }
      swirl.frequency.setValueCurveAtTime(curve, t0, 2.4);
      const sg = audioCtx.createGain();
      sg.gain.setValueAtTime(0.07, t0);
      sg.gain.exponentialRampToValueAtTime(0.5, t0 + 2.2);
      sg.gain.exponentialRampToValueAtTime(0.0001, t0 + 2.45);
      swirl.connect(sg).connect(out);
      swirl.start(t0); swirl.stop(t0 + 2.5);
      // 到位「啵」+ 轻弹簧
      tone("sine", [[2.4, 260], [2.5, 80]], [[2.4, 0.0001], [2.42, 0.7], [2.58, 0.0001]]);
      tone("triangle", [[2.4, 430], [2.48, 150], [2.58, 280], [2.78, 110]],
                       [[2.4, 0.0001], [2.43, 0.4], [2.82, 0.0001]]);
    }

    // transform 动画每帧重算（参数动画走 beforeModelUpdate，见 loadModel）
    function applyMoveTransform(now) {
      if (!model) return;
      if (!move.name) {
        model.scale.set(baseScale);
        model.position.set(basePos.x, basePos.y);
        model.rotation = 0;
        return;
      }
      const p = (now - move.t0) / move.dur;
      if (p >= 1) {                       // 结束 → 复位
        move.name = null;
        model.scale.set(baseScale);
        model.position.set(basePos.x, basePos.y);
        model.rotation = 0;
        bus.postMessage({ type: "moveState", name: null });
        return;
      }
      const tf = MOVES[move.name].tf ? MOVES[move.name].tf(p) : {};
      const sx = tf.sx !== undefined ? tf.sx : 1;
      model.scale.x = baseScale * sx * (tf.sxAbs ?? 1);
      model.scale.y = baseScale * (tf.sy ?? 1);
      model.position.set(basePos.x + (tf.dx ?? 0), basePos.y + (tf.dy ?? 0));
      model.rotation = tf.rot ?? 0;
    }

    app.ticker.add(() => applyMoveTransform(performance.now()));

    // 编舞：一小节两拍左右摇 + 上下点头，头和身体反相（这样才像在扭，而不是整体平移）
    function choreograph(now) {
      const beat = ((now - dance.t0) / 1000) * (dance.bpm / 60);
      const sway = Math.sin(Math.PI * beat);          // 一拍一次左右
      const bob = Math.sin(2 * Math.PI * beat);       // 一拍两次上下

      put("bodyX", 0.75 * sway);
      put("bodyZ", 0.55 * sway);
      put("bodyY", 0.30 * Math.abs(bob));
      put("headZ", -0.50 * sway);                     // 反相 → 脖子有「甩」的感觉
      put("headX", 0.40 * sway);
      put("headY", 0.25 * Math.abs(bob) - 0.10);
      put("eyeX", 0.60 * sway);
      put("hair", 0.60 * sway);
      put("armL", 0.55 * Math.sin(Math.PI * beat + 0.7));
      put("armR", -0.55 * Math.sin(Math.PI * beat + 0.7));
      put("earL", 0.7 * bob);
      put("earR", -0.7 * bob);
    }

    // 加载是异步的（中间有 await），必须防并发。快速连点两个角色时会这样翻车：
    //   点 A → 销毁旧模型、model=null、await from(A)
    //   点 B → 此时 model 已是 null，没东西可销毁 → await from(B)
    //   B 先回来 → addChild(B)，model=B
    //   A 后回来 → addChild(A)，model=A   ← B 还在台上！两个模型重合，
    //                                       而且 model 只指向 A，B 永远清不掉。
    // 解法：发号（loadSeq）。await 回来后发现号过期了，就把刚加载好的那个直接销毁。
    // 另外舞台用 removeChildren() 硬清，不依赖 model 变量 —— 竞态下它可能已经指不到
    // 台上那个了。
    let loadSeq = 0;

    async function loadModel(url) {
      const seq = ++loadSeq;
      stopSpeaking();
      setDance(false);
      move.name = null;

      if (model) {
        model.destroy({ children: true });
        model = null;
      }
      app.stage.removeChildren();     // 兜底：不管 model 指向谁，台上一律清空
      slots = {};

      const loaded = await PIXI.live2d.Live2DModel.from(url);

      if (seq !== loadSeq) {          // 被后来的切换超车了 → 这个已经没人要了
        loaded.destroy({ children: true });
        return;
      }

      model = loaded;
      app.stage.addChild(model);
      model.anchor.set(0.5, 0.5);
      fit();

      // 点击身体触发动作、点头切表情
      model.on("hit", (areas) => {
        const has = (n) => areas.some((a) => a.toLowerCase().includes(n));
        if (has("head")) model.expression();
        else randomMotion();
      });

      const core = model.internalModel.coreModel;
      resolveParams(core);
      reportCaps();   // 换了模型 → 把新的表情/动作能力报给设置页（情绪系统据此重配）

      // 口型参数因模型而异：优先用模型 model3.json 里自己声明的 LipSync 组
      // （Mao 是 ParamA，Hiyori 是 ParamMouthOpenY）——写死一个名字就会有模型不动嘴。
      let lipIds = ["ParamMouthOpenY"];
      try {
        const st = model.internalModel.settings;
        const groups = (st && (st.groups || (st.json && st.json.Groups))) || [];
        const lg = groups.find((x) => (x.Name || x.name) === "LipSync");
        const ids = lg && (lg.Ids || lg.ids);
        if (ids && ids.length) lipIds = ids;
      } catch {}

      // 手动参数写在管线最末，压过动作和物理。挂 afterMotionUpdate 是不行的：动作
      // 之后还有 eyeBlink / focus / breath / physics / pose 会继续写参数，把我们
      // 写的值冲掉。顺序：先舞蹈（管身体），再口型（管嘴）—— 嘴归说话独占。
      model.internalModel.on("beforeModelUpdate", () => {
        if (!model) return;

        if (dance.on) choreograph(performance.now());

        // 动作的参数部分（transform 部分在 app.ticker 里）。放在舞蹈之后 → 动作期间
        // 由动作说了算，跳完自动交还给舞蹈。
        if (move.name) {
          const p = (performance.now() - move.t0) / move.dur;
          if (p < 1 && MOVES[move.name].param) MOVES[move.name].param(p, put);
        }

        if (lip.active) {
          const raw = core._model && core._model.parameters;
          if (raw) {
            for (const id of lipIds) {
              const i = Array.prototype.indexOf.call(raw.ids, id);
              if (i >= 0) {
                const v = raw.minimumValues[i] + (raw.maximumValues[i] - raw.minimumValues[i]) * lip.value;
                core.setParameterValueByIndex(i, v);
              }
            }
          } else if (typeof core.setParamFloat === "function") {
            for (const id of lipIds) core.setParamFloat(id, lip.value);
          }
        }
      });
    }

    window.addEventListener("resize", fit);

    loadModel(cfg.model).then(() => {
      bus.postMessage({ type: "ready" });
      // ?entrance=1 → 一加载就自动飞入（拍视频时开着它，打开=Mao 冲进来）
      if (params.get("entrance")) setTimeout(() => windowFlight(), 500);
    });

    // 设置页发来的指令
    bus.addEventListener("message", async (e) => {
      const m = e.data || {};
      if (m.type === "config") {
        const next = m.cfg || {};
        cfg.engine = next.engine ?? cfg.engine;
        cfg.voice = next.voice ?? cfg.voice;
        if (next.model && next.model !== cfg.model) {
          cfg.model = next.model;
          await loadModel(cfg.model);   // 换角色，实时
        }
      } else if (m.type === "speak") {
        speak(m.text);
      } else if (m.type === "stop") {
        stopSpeaking();
      } else if (m.type === "motion") {
        randomMotion();
      } else if (m.type === "expression") {
        model?.expression();
      } else if (m.type === "dance") {
        setDance(m.on, m.bpm);
      } else if (m.type === "move") {
        playMove(m.name);
      } else if (m.type === "listMoves") {
        bus.postMessage({
          type: "moves",
          list: Object.entries(MOVES).map(([k, v]) => ({ id: k, label: v.label })),
        });
        reportCaps();   // 设置页问动作时，顺带把表情/动作能力也补报一次
      } else if (m.type === "effect") {
        // 设置页「拍摄特效」按钮（和全局快捷键 Alt+R/M/X 走同一套逻辑）
        const say = (text) => bus.postMessage({ type: "scriptState", text });
        if (m.name === "flyin") windowFlight();
        else if (m.name === "fling") flingOut(2300, -450);
        else if (m.name === "hide") window.petScript.reset().then(() => say("已藏好，等入场（▶ 或 Alt+M）"));
        else if (m.name === "reset") window.petScript.reset().then(() => say("剧本已重来，已藏好"));
        else if (m.name === "next") window.petScript.next().then((r) => {
          say(r === "end" ? "剧本演完了（↩ 重来）" : r === "back" ? "叫回来了" : "台词 " + r);
        });
      }
    });

    // ---------- 接 Live2DPet 的「大脑」 ----------
    // 大脑跑在设置窗口里，通过主进程 IPC 把结果推过来。我们的宠物窗口挂着人家的
    // preload，所以这些回调白拿 —— 气泡、表情、动作、情绪全是它们原来就有的能力。
    if (api) {
      api.onShowChatMessage?.((text) => { if (text) bubble(text, true); });
      api.onChatBubbleMessage?.((text) => { if (text) bubble(text, true); });
      // 情绪系统选中的表情/动作，经主进程 triggerExpression / triggerMotion 推来
      api.onPlayExpression?.((name) => { try { model?.expression(name); } catch {} });
      api.onRevertExpression?.(() => revertExpr());
      api.onPlayMotion?.((group, index) => {
        // group 可能是「我们自编的动作」(spin/jump…)，也可能是模型自带的动作组
        try {
          if (MOVES[group]) playMove(group);
          else model?.motion(group, index || 0);
        } catch {}
      });
      api.onTalkingStateChanged?.((talking) => { if (!talking) bubble("", false); });

      // 情绪值：鼠标悬停时半速加成（原作者的设定）。互动也上报给大脑做上下文。
      window.addEventListener("pointerenter", () => api.reportHoverState?.(true));
      window.addEventListener("pointerleave", () => api.reportHoverState?.(false));
    }

    // 点身体 = 一次互动，报给大脑（它会在 prompt 里说「你刚才戳了我 N 次」）
    window.addEventListener("mousedown", (e) => {
      if (e.button === 0) api?.reportHit?.({ type: "click", area: "body" });
    });

    // 把当前模型「能做什么表情、有哪些动作」报给设置页 —— 情绪系统要靠这个才知道
    // 该让 AI 从哪些情绪里挑。每个模型不一样（Haru 有 8 个表情，Hiyori 一个没有，
    // 只能拿动作凑），所以每次换模型都要重报。
    function reportCaps() {
      if (!model) return;
      let expressions = [], motions = {};
      try {
        const s = model.internalModel.settings || {};
        // Cubism 4：settings.expressions = [{Name, File}]；Cubism 2 一般没有
        const exps = s.expressions || s.Expressions || [];
        expressions = exps.map((e) => e.Name || e.name).filter(Boolean);
        // 动作组：{group: [..]}，我们只需要组名和条数
        const mm = model.internalModel.motionManager;
        const defs = mm?.definitions || s.motions || s.Motions || {};
        for (const g of Object.keys(defs)) motions[g] = (defs[g] || []).length || 1;
      } catch {}
      // 再把我们自编的动作库（转圈/跳/挥手…）也作为「动作情绪」提供 —— 这样即使模型
      // 没有任何表情，AI 也能靠动作把情绪演出来。
      const custom = Object.entries(MOVES).map(([id, v]) => ({ id, label: v.label }));
      bus.postMessage({ type: "caps", model: cfg.model, expressions, motions, custom });
    }

    function revertExpr() {
      try {
        const em = model?.internalModel?.motionManager?.expressionManager;
        if (em?.resetExpression) em.resetExpression();
      } catch {}
    }

    function setDance(on, bpm) {
      if (bpm) dance.bpm = bpm;
      if (on && !dance.on) dance.t0 = performance.now();
      dance.on = !!on;
      // 停下来时把身体归位，不然会僵在最后一个姿势上
      if (!on && model) {
        for (const s of Object.values(slots)) s.set(s.def);
      }
      bus.postMessage({ type: "danceState", on: dance.on, bpm: dance.bpm, roles: Object.keys(slots) });
    }

    function fit() {
      if (!model) return;
      // 留 12% 余量：转圈/跳跃会把模型甩出去一点，贴边会被窗口裁掉
      baseScale = Math.min(window.innerWidth / model.internalModel.width,
                           window.innerHeight / model.internalModel.height) * 0.88;
      basePos = { x: window.innerWidth / 2, y: window.innerHeight / 2 + 10 };
      model.scale.set(baseScale);
      model.position.set(basePos.x, basePos.y);
    }

    function randomMotion() {
      const mm = model.internalModel.motionManager;
      const groups = Object.keys(mm.definitions || {});
      if (!groups.length) return;
      const tap = groups.find((g) => /tap|body/i.test(g)) || groups[0];
      model.motion(tap);
    }

    // ---------- 拖动整个窗口 ----------
    // 窗口是 frameless 的，没有标题栏可拖。用 Live2DPet preload 暴露的
    // getCursorPosition / getWindowBounds / setWindowPosition 自己实现：
    // 按下时记住「光标 - 窗口左上角」的偏移，移动时保持这个偏移。
    // 手势三分：按下后 → 动了(>8px)=拖动；按住不动 0.4s=按住说话；快速松开=普通点按。
    let dragging = false, offX = 0, offY = 0;
    let trail = [];   // 拖动轨迹（判定「甩出去」用的速度采样）
    let pressArmed = false, pressX = 0, pressY = 0, pttTimer = 0, pttHolding = false;

    window.addEventListener("mousedown", async (e) => {
      if (e.button !== 0 || !api) return;
      const [cur, b] = await Promise.all([api.getCursorPosition(), api.getWindowBounds()]);
      offX = cur.x - b.x;
      offY = cur.y - b.y;
      pressX = cur.x; pressY = cur.y;
      trail = [];
      pressArmed = true;      // 先按兵不动，看是拖还是长按
      clearTimeout(pttTimer);
      pttTimer = setTimeout(() => {
        if (!pressArmed || dragging) return;
        pressArmed = false;
        pttHolding = true;    // 长按成立 → 按住说话
        voiceBegin();
      }, 400);
    });

    window.addEventListener("mouseup", () => {
      clearTimeout(pttTimer);
      pressArmed = false;
      if (pttHolding) {       // 松手 = 说完，立即定稿发送
        pttHolding = false;
        voiceFinish();
        return;
      }
      dragging = false;
      // 甩出判定：取最近 ~120ms 的轨迹算速度，够快就顺着方向飞出屏幕
      const now = performance.now();
      const seg = trail.filter((s) => now - s.t < 120);
      if (seg.length >= 2) {
        const a = seg[0], z = seg[seg.length - 1], dt = (z.t - a.t) / 1000;
        if (dt > 0) {
          const vx = (z.x - a.x) / dt, vy = (z.y - a.y) / dt;
          if (Math.hypot(vx, vy) > 1300) flingOut(vx, vy);
        }
      }
      trail = [];
    });

    // 用 rAF 拉，而不是监听 mousemove —— 鼠标一旦跑出窗口（拖快了就会），
    // 渲染进程就收不到 mousemove 了，窗口会「掉队」。轮询光标位置没这个问题。
    (function pump() {
      if ((dragging || pressArmed) && api) {
        api.getCursorPosition().then((cur) => {
          if (pressArmed && Math.hypot(cur.x - pressX, cur.y - pressY) > 8) {
            pressArmed = false;          // 动了 → 是拖动，不是长按
            clearTimeout(pttTimer);
            dragging = true;
          }
          if (!dragging) return;
          api.setWindowPosition(Math.round(cur.x - offX), Math.round(cur.y - offY));
          trail.push({ t: performance.now(), x: cur.x, y: cur.y });
          if (trail.length > 12) trail.shift();
        });
      }
      requestAnimationFrame(pump);
    })();

    // 甩出屏幕：惯性延续松手时的速度，Mao 边惨叫边翻滚着飞出去。
    // 想叫回来按 Option+M（下一次会走螺旋入场，不消耗剧本台词）。
    let maoGone = false;
    async function flingOut(vx, vy) {
      if (!api) return;
      const b = await api.getWindowBounds();
      const sw = (window.screen && window.screen.width) || 1680;
      const sh = (window.screen && window.screen.height) || 1050;
      const speed = Math.hypot(vx, vy), k = Math.min(2.2, Math.max(1, 2000 / speed));
      vx *= k; vy *= k;                         // 保底出场速度，甩轻了也送到底
      maoGone = true;   // 一开甩就立标记——飞行途中按「叫回」也要能生效
      playMove("tumble");
      flingSfx();
      try { speak("哇啊啊啊——！"); } catch {}
      let x = b.x, y = b.y;
      const t0 = performance.now(); let last = t0;
      await new Promise((done) => {
        (function step() {
          const now = performance.now(), dt = (now - last) / 1000; last = now;
          x += vx * dt; y += vy * dt;
          api.setWindowPosition(Math.round(x), Math.round(y));
          const out = x > sw + 30 || x + b.width < -30 || y > sh + 30 || y + b.height < -30;
          if (out || now - t0 > 1200) { done(); return; }
          requestAnimationFrame(step);
        })();
      });
    }

    // 甩飞时的呼啸声：短促的噪声嗖 + 音高快速下坠的「哇」
    function flingSfx() {
      audioCtx = audioCtx || new AudioContext();
      audioCtx.resume();
      const t0 = audioCtx.currentTime, out = audioCtx.destination;
      const len = Math.floor(audioCtx.sampleRate * 0.5);
      const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
      const noise = audioCtx.createBufferSource();
      noise.buffer = buf;
      const bp = audioCtx.createBiquadFilter();
      bp.type = "bandpass"; bp.Q.value = 1;
      bp.frequency.setValueAtTime(2400, t0);
      bp.frequency.exponentialRampToValueAtTime(500, t0 + 0.5);
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.55, t0);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.5);
      noise.connect(bp).connect(g).connect(out);
      noise.start(t0); noise.stop(t0 + 0.55);
    }

    // 右键菜单交给宿主（退出/设置都在里面）
    window.addEventListener("contextmenu", (e) => {
      e.preventDefault();
      api?.showPetContextMenu?.();
    });

    // ---------- 说话 ----------（状态在文件开头声明，见那里的注释）

    // 读音订正表：文字照原样写，送 TTS 前替换成正确读音。
    // CiCy 要读 seisei（英文 say say），直接给 TTS 会被拼成字母。
    const PRONOUNCE = [[/CiCy/gi, "say say"]];

    async function speak(text) {
      stopSpeaking();
      if (!text || !text.trim()) return;

      audioCtx = audioCtx || new AudioContext();
      await audioCtx.resume();

      const spoken = PRONOUNCE.reduce((t, [re, to]) => t.replace(re, to), text);
      const reqAt = performance.now();
      let buffer, cache = "miss";
      try {
        const url = `/tts?text=${encodeURIComponent(spoken)}`
          + `&engine=${encodeURIComponent(cfg.engine)}`
          + `&voice=${encodeURIComponent(cfg.voice)}`
          + `&rate=${encodeURIComponent(cfg.rate || "")}`
          + `&pitch=${encodeURIComponent(cfg.pitch || "")}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(await res.text() || res.status);
        cache = res.headers.get("X-TTS-Cache") || "miss";
        buffer = await audioCtx.decodeAudioData(await res.arrayBuffer());
      } catch (e) {
        bus.postMessage({ type: "spoke", ok: false, error: String(e.message || e) });
        return;
      }
      bus.postMessage({ type: "spoke", ok: true, cache, ms: Math.round(performance.now() - reqAt) });

      const env = envelope(buffer);
      srcNode = audioCtx.createBufferSource();
      srcNode.buffer = buffer;
      srcNode.connect(audioCtx.destination);
      srcNode.onended = stopSpeaking;

      const t0 = audioCtx.currentTime;
      srcNode.start();
      lip.active = true;
      bubble(text, true);

      const tick = () => {
        const i = Math.floor((audioCtx.currentTime - t0) / HOP);
        const target = i >= 0 && i < env.length ? env[i] : 0;
        lip.value += (target - lip.value) * 0.5;
        rafId = requestAnimationFrame(tick);
      };
      tick();
    }

    function envelope(buf) {
      const d = buf.getChannelData(0);
      const step = Math.max(1, Math.floor(buf.sampleRate * HOP));
      const env = [];
      for (let i = 0; i < d.length; i += step) {
        let s = 0;
        const end = Math.min(i + step, d.length);
        for (let j = i; j < end; j++) s += d[j] * d[j];
        env.push(Math.sqrt(s / (end - i)));
      }
      const peak = Math.max(...env) || 1;
      return env.map((v) => Math.min(1, (v / peak) * 1.4));
    }

    function stopSpeaking() {
      cancelAnimationFrame(rafId);
      if (srcNode) {
        srcNode.onended = null;
        try { srcNode.stop(); } catch {}
        try { srcNode.disconnect(); } catch {}
        srcNode = null;
      }
      lip.active = false;
      lip.value = 0;
      bubble("", false);
    }

    // 气泡优先走宿主的独立气泡窗口（Live2DPet 原作者做的 pet-chat-bubble.html）——
    // 它是一个单独的透明窗口，浮在宠物上方，**不会被宠物窗口 340x420 的边界裁掉**。
    // 我们自己画在窗口里的那个气泡，长句子会被切。没有 preload 时（纯浏览器）才回落。
    function bubble(text, on) {
      if (api?.showPetChat) {
        if (on && text) api.showPetChat(text, 8000);
        else api.closeChatBubble?.();
        return;
      }
      const b = $("bubble");
      if (on) b.textContent = text;
      b.classList.toggle("on", !!on);
    }

    // 外部驱动用：pet.speak("…") / pet.motion()
    window.pet = { speak, motion: () => randomMotion(), stop: stopSpeaking, flyIn: () => windowFlight(),
                   flingOut: () => flingOut(2300, -450), chirp: () => dataChirp(), get model() { return model; } };
  </script>
</body>
