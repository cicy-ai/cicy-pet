<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Sherlly Pet</title>

  <script src="libs/live2dcubismcore.min.js"></script>
  <script src="libs/live2d.min.js"></script>
  <script src="libs/pixi.min.js"></script>
  <script src="libs/pixi-live2d-display.min.js"></script>

  <style>
    /* 桌宠窗口是 transparent + frameless 的，所以一切都必须真透明：
       body 不能有背景色，canvas 也不能。 */
    html, body {
      margin: 0;
      height: 100%;
      background: transparent;
      overflow: hidden;
      user-select: none;
      cursor: default;
    }
    #canvas { display: block; width: 100%; height: 100%; }

    /* 说话气泡：贴在角色头顶 */
    #bubble {
      position: fixed;
      left: 50%;
      top: 6px;
      transform: translateX(-50%);
      max-width: 90%;
      padding: 8px 12px;
      background: rgba(245, 247, 250, .96);
      color: #1b1d22;
      border-radius: 12px;
      font: 13px/1.45 -apple-system, "PingFang SC", system-ui, sans-serif;
      box-shadow: 0 4px 18px rgba(0, 0, 0, .28);
      pointer-events: none;
      opacity: 0;
      transition: opacity .18s ease;
    }
    #bubble.on { opacity: 1; }
    /* 手机:气泡压在语音条上方。长回答**封顶 30% 屏高**内部滚动——不许霸屏把她盖没,
       她说到哪自动滚到哪,手指也能翻回去看前文 */
    body.phone #bubble { top: auto; bottom: calc(118px + env(safe-area-inset-bottom));
      font-size: 15px; line-height: 1.55; padding: 12px 16px; border-radius: 16px;
      background: rgba(22, 32, 58, .92); color: #eaf4ff; max-width: 86%;
      max-height: 30vh; overflow-y: auto;
      overscroll-behavior: contain; -webkit-overflow-scrolling: touch; }
    /* 只有气泡真正显示时才吃触摸(可滚动);隐身时必须放行——不然这堵透明墙挡在
       她身前,点她做动作全被吞掉("点形象没反应"就是它干的) */
    body.phone #bubble.on { pointer-events: auto; }

    /* 加载态——只在手机(body.phone)出现;桌面透明浮窗保持原样,绝不加这层。 */
    #loading { display: none; position: fixed; inset: 0; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px; z-index: 50;
      background: radial-gradient(ellipse 120% 80% at 50% 40%, #0b1330, #05070f 70%);
      color: #bfe0ff; font-family: "PingFang SC", system-ui, sans-serif;
      transition: opacity .5s ease; }
    body.phone #loading { display: flex; }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading .ring { width: 54px; height: 54px; border-radius: 50%;
      border: 3px solid rgba(140,220,255,.18); border-top-color: #8cdcff;
      animation: spin 0.9s linear infinite; }
    #loading .msg { font-size: 15px; color: #86a8d8; letter-spacing: 1px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* 手机版整体观感:星空深色底 + 真·星星 + 脚下柔光地台(桌面浮窗保持透明,不受影响) */
    body.phone { background: radial-gradient(ellipse 130% 70% at 50% 30%, #101c42 0%, #080d20 55%, #04060f 100%); }
    body.phone::before { content: ""; position: fixed; inset: 0; pointer-events: none;
      background-image:
        radial-gradient(1.5px 1.5px at 12% 18%, rgba(255,255,255,.9), transparent),
        radial-gradient(1px 1px at 32% 8%,  rgba(200,220,255,.8), transparent),
        radial-gradient(1.5px 1.5px at 55% 14%, rgba(255,255,255,.7), transparent),
        radial-gradient(1px 1px at 72% 26%, rgba(180,205,255,.8), transparent),
        radial-gradient(2px 2px at 88% 10%, rgba(255,255,255,.85), transparent),
        radial-gradient(1px 1px at 20% 42%, rgba(200,220,255,.6), transparent),
        radial-gradient(1.5px 1.5px at 90% 40%, rgba(255,255,255,.5), transparent),
        radial-gradient(1px 1px at 45% 33%, rgba(220,235,255,.7), transparent),
        radial-gradient(1px 1px at 65% 48%, rgba(200,220,255,.5), transparent),
        radial-gradient(1.5px 1.5px at 8% 62%,  rgba(255,255,255,.45), transparent),
        radial-gradient(1px 1px at 80% 60%, rgba(200,220,255,.4), transparent);
      animation: twinkle 5s ease-in-out infinite alternate; }
    @keyframes twinkle { from { opacity: .55; } to { opacity: 1; } }
    body.phone::after { content: ""; position: fixed; left: 50%;
      bottom: calc(58px + env(safe-area-inset-bottom));   /* 光台贴着她的脚(语音条上沿) */
      width: 82vw; height: 13vh; transform: translateX(-50%); pointer-events: none;
      background: radial-gradient(ellipse 50% 50% at 50% 50%, rgba(100,160,255,.20), transparent 68%); }

    /* 手机专用:场控入口——右上角一枚半透明小圆钮,不抢戏。点开展开一张规整的卡片面板:
       第一行当前状态(自动换行不溢出),下面「去某台/召回」按钮,点完自动收起。 */
    #stageCtl { display: none; position: fixed; top: calc(14px + env(safe-area-inset-top));
      right: 14px; z-index: 45; flex-direction: column; align-items: flex-end; gap: 10px; }
    body.phone #stageCtl { display: flex; }
    #stageToggle { width: 40px; height: 40px; border-radius: 50%; cursor: pointer;
      border: 1px solid rgba(140,180,255,.18);
      background: rgba(14,24,52,.55); color: #9db8e8; font-size: 17px; opacity: .6;
      backdrop-filter: blur(8px); -webkit-tap-highlight-color: transparent;
      transition: opacity .15s ease, background .15s ease; }
    #stageCtl.open #stageToggle { opacity: 1; background: rgba(30,58,110,.95); color: #eaf4ff; }
    #stageMenu { display: none; flex-direction: column; gap: 8px;
      width: min(240px, 72vw); padding: 12px; border-radius: 18px;
      background: rgba(10,17,36,.94); border: 1px solid rgba(140,180,255,.16);
      box-shadow: 0 12px 36px rgba(0,0,0,.55); backdrop-filter: blur(14px); }
    #stageCtl.open #stageMenu { display: flex; animation: menuIn .18s ease; }
    @keyframes menuIn { from { opacity: 0; transform: translateY(-6px); } }
    #stageMenu button { border: none; cursor: pointer; width: 100%; padding: 12px 14px;
      border-radius: 12px; font-size: 14px; color: #dfeaff; text-align: left;
      background: rgba(40,70,130,.45); font-family: "PingFang SC", system-ui;
      -webkit-tap-highlight-color: transparent; }
    #stageMenu button:active { transform: scale(.97); background: rgba(60,100,180,.6); }
    #stageMenu button.primary { background: linear-gradient(135deg, #3c7fe0, #1a3d78); text-align: center; }
    /* 当前状态行:允许换行,永不溢出面板 */
    #stageMenu .st { font-size: 12px; line-height: 1.7; color: #8fb0e0;
      padding: 2px 2px 6px; border-bottom: 1px solid rgba(140,180,255,.12);
      font-family: "PingFang SC", system-ui; word-break: break-all; white-space: normal; }
    /* 她不在这页时,屏幕正中:呼吸光球 + 两级文案 + 一个大召回按钮 */
    #awayCard { display: none; position: fixed; inset: 0; z-index: 30; pointer-events: none;
      flex-direction: column; align-items: center; justify-content: center; gap: 0; }
    body.phone #awayCard.show { display: flex; }
    #awayCard .orb { width: 108px; height: 108px; border-radius: 50%; position: relative;
      display: flex; align-items: center; justify-content: center; font-size: 44px;
      background: radial-gradient(circle at 35% 30%, rgba(120,170,255,.35), rgba(40,70,150,.18) 60%, transparent 75%);
      animation: orbFloat 3.6s ease-in-out infinite; }
    #awayCard .orb::before { content: ""; position: absolute; inset: -18px; border-radius: 50%;
      background: radial-gradient(circle, rgba(100,150,255,.22), transparent 65%);
      animation: orbPulse 3.6s ease-in-out infinite; }
    #awayCard .t1 { margin-top: 22px; font: 600 19px/1.4 "PingFang SC", system-ui;
      color: #e8f1ff; letter-spacing: 2px; }
    #awayCard .t2 { margin-top: 10px; font: 13px/1.7 "PingFang SC", system-ui;
      color: #7f9dce; letter-spacing: .5px; max-width: 78vw; text-align: center; }
    #awayCard button { pointer-events: auto; border: none; cursor: pointer; margin-top: 30px;
      padding: 15px 44px; border-radius: 28px; font-size: 16px; letter-spacing: 2px;
      color: #f2f7ff; font-family: "PingFang SC", system-ui;
      background: linear-gradient(135deg, #4a8bef, #1c4488);
      box-shadow: 0 8px 28px rgba(50,110,230,.4), inset 0 1px 0 rgba(255,255,255,.22);
      -webkit-tap-highlight-color: transparent; transition: transform .12s ease; }
    #awayCard button:active { transform: scale(.95); }
    @keyframes orbFloat { 50% { transform: translateY(-10px); } }
    @keyframes orbPulse { 50% { opacity: .45; transform: scale(1.12); } }

    /* 手机版语音键:微信式底部长条——拇指天然落点,左右手都顺手,按住说话松手发送。
       只有 body.phone 显示;适配 iPhone 底部安全区。 */
    #voiceBtn { display: none; position: fixed; left: 16px; right: 16px;
      bottom: calc(34px + env(safe-area-inset-bottom)); height: 58px;
      border-radius: 29px; z-index: 40; cursor: pointer;
      border: 1px solid rgba(140,180,255,.22);
      background: linear-gradient(180deg, #22447e, #142f5e); color: #e6efff;
      box-shadow: 0 8px 26px rgba(15,40,110,.55), inset 0 1px 0 rgba(255,255,255,.16);
      font: 16px/1 "PingFang SC", system-ui; letter-spacing: 4px;
      align-items: center; justify-content: center; gap: 8px;
      transition: transform .1s ease, background .15s ease; -webkit-tap-highlight-color: transparent;
      user-select: none; -webkit-user-select: none; touch-action: none; }
    body.phone #voiceBtn { display: flex; }
    #voiceBtn:active { transform: scale(.985); }
    #voiceBtn.rec { background: linear-gradient(180deg, #d0506a, #7a1a2a); color: #ffe9ee;
      box-shadow: 0 0 0 6px rgba(224,85,106,.2), 0 6px 20px rgba(140,20,40,.5); }
    /* 上滑进入取消区:变灰,松开即丢弃 */
    #voiceBtn.cancel { background: linear-gradient(180deg, #5a6070, #333845); color: #cfd6e4;
      box-shadow: 0 6px 18px rgba(0,0,0,.5); }
    #voiceBtn .hint { font-size: 15px; letter-spacing: 4px; }
    #voiceBtn.rec .hint { font-size: 14px; letter-spacing: 1.5px; }
  </style>
</head>

<body>
  <canvas id="canvas"></canvas>
  <div id="bubble"></div>
  <div id="loading"><div class="ring"></div><div class="msg" id="loadingMsg">雪莉正在穿过网线……</div></div>
  <div id="stageCtl">
    <button id="stageToggle">🎬</button>
    <div id="stageMenu"></div>
  </div>
  <div id="awayCard">
    <div class="orb">🌙</div>
    <div class="t1">雪莉去别处了</div>
    <div class="t2" id="awayTxt">正在找她……</div>
    <button id="awayBack">🪄 把她召回来</button>
  </div>
  <button id="voiceBtn">🎙️<span class="hint">按 住 说 话</span></button>

  <script>
    const api = window.electronAPI || null;   // Live2DPet 的 preload；没有就降级成普通网页
    const $ = (id) => document.getElementById(id);
    const bus = new BroadcastChannel("live2d-pet");   // 和 settings.html 同源 → 直接通

    // ---------- 漫游:她是会串门的旅行者,不属于任何一台设备 ----------
    // 每台设备(电脑/手机/Windows)各跑一个 pet.html;她"在"哪台,哪台就渲染+发声+对口型。
    // DEVICE = 本机身份;present = 她此刻在不在这台。goto<设备> 让目标飞入、其余飞出。
    // 注意:不能用下方才声明的 params(TDZ),这里直接读 URL。
    const __q = new URLSearchParams(location.search);
    // platform = 设备类型(mac/windows/linux/phone);每个打开的页面 = 一个独立 client,
    // 有自己的短 id(平台-两位随机,如 mac-k3)。sessionStorage 保证同一标签页刷新不换身份。
    const PLATFORM = __q.get("device") || (window.electronAPI ? "mac" : "phone");
    const DEVICE = PLATFORM;   // 兼容旧代码里的 DEVICE 用法(UI 分支按平台走)
    let CLIENT_ID = sessionStorage.getItem("sherlly.cid");
    if (!CLIENT_ID || !CLIENT_ID.startsWith(PLATFORM + "-")) {
      CLIENT_ID = PLATFORM + "-" + Math.random().toString(36).slice(2, 4);
      try { sessionStorage.setItem("sherlly.cid", CLIENT_ID); } catch {}
    }
    let present = __q.get("away") ? false : true;   // 默认在场;?away=1 开局不在(等召唤)
    // 黑匣子:关键步骤回传服务器(/debug-log),隔空排查手机上的疑难杂症
    const dlog = (m) => { try { fetch("/debug-log", { method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ m: `[${CLIENT_ID}] ${m}` }) }); } catch {} };
    window.addEventListener("error", (e) => dlog(`JSERR ${e.message} @${(e.filename || "").split("/").pop()}:${e.lineno}`));
    window.addEventListener("unhandledrejection", (e) => dlog(`REJ ${e.reason && (e.reason.message || e.reason)}`));
    dlog(`boot device=${PLATFORM} ua=${navigator.userAgent.slice(0, 60)}`);
    // 手机才有 UI(loading/语音/场控);桌面透明浮窗保持原样。尽早打标,避免闪。
    if (DEVICE === "phone") document.body.classList.add("phone");
    const DEVICE_NAME = { mac: "电脑", phone: "手机", windows: "Windows" };
    // 她飞入这台设备:显示形象 + 入场特效 + 打招呼(桌面走真窗口飞行,手机走画布内飞入)
    async function arrive() {
      if (present) return;
      present = true;
      const m = window.__model;
      if (m) { m.visible = true; m.alpha = 1; }        // 复位(离开时淡到 0 过)
      const ld = document.getElementById("loading"); if (ld) ld.classList.add("hidden");
      const ac = document.getElementById("awayCard"); if (ac) ac.classList.remove("show");   // 她回来了,状态卡马上收
      if (typeof reflectLoc === "function") reflectLoc();
      if (window.electronAPI) { try { await windowFlight("我来啦——！", typeof landingSpot === "function" ? landingSpot() : undefined); } catch { playMove("flyin"); speak("我来啦——！"); } }
      else { playMove("flyin"); setTimeout(() => speak("我来" + (DEVICE_NAME[DEVICE] || "") + "啦——！"), 300); }
    }
    // 她离开这台设备:桌面=甩出屏;手机=画布内翻滚淡出。都要「马上」开始消失。
    function leave() {
      if (!present) return;
      present = false;
      try { stopSpeaking(); } catch {}
      if (window.electronAPI) {
        try { flingOut(2300, -450); } catch {}
        setTimeout(() => { if (window.__model && !present) window.__model.visible = false; }, 1400);
      } else {
        petFlyOffCanvas();   // 手机:立刻翻滚+飞出+淡出
      }
      // 等她飞走了(~0.9s)再亮出正中的状态卡,别跟飞出动画抢镜
      setTimeout(() => { if (!present && typeof reflectLoc === "function") reflectLoc(); }, 900);
    }
    // 手机版「离场」:轻轻上浮 + 淡出,像一缕光散场。不翻跟头——翻跟头是特效,
    // 不能用在所有转场(用户 2026-07-18)。
    function petFlyOffCanvas() {
      const m = window.__model;
      if (!m) return;
      const x0 = m.x, y0 = m.y, t0 = performance.now(), DUR = 700;
      (function step() {
        if (present) { m.alpha = 1; m.x = x0; m.y = y0; return; }   // 中途又被召回
        const p = Math.min(1, (performance.now() - t0) / DUR);
        const e = p * p * (3 - 2 * p);   // smoothstep,起步柔和
        m.y = y0 - e * 150; m.alpha = 1 - p;
        if (p < 1) requestAnimationFrame(step);
        else { m.visible = false; m.alpha = 1; m.x = x0; m.y = y0; }
      })();
    }

    // 配置：URL 参数 > localStorage > 默认。settings.html 写 localStorage + 广播，
    // 这边收到就实时应用（换角色不用重启）。
    const params = new URLSearchParams(location.search);
    const saved = JSON.parse(localStorage.getItem("pet_config") || "{}");
    const cfg = {
      model: params.get("model") || saved.model || "models/Hiyori/Hiyori.model3.json",
      // 默认豆包爽快思思（比 edge 自然、调皮）。旧配置里若留着 edge 引擎但音色是豆包的
      // （*_uranus_bigtts）→ 引擎/音色错搭会静默失败，这里纠正成 doubao。
      engine: params.get("engine") || saved.engine || "doubao",
      voice: params.get("voice") || saved.voice || "zh_female_shuangkuaisisi_uranus_bigtts",
      rate: params.get("rate") || saved.rate || "+18%",   // 爽快思思 +8% 显笨,+18% 才伶牙俐齿
      pitch: params.get("pitch") || saved.pitch || "+20Hz",
    };
    if (/_uranus_bigtts$/.test(cfg.voice) && cfg.engine !== "doubao") cfg.engine = "doubao";
    if (cfg.engine === "edge" && !/^zh-CN-/.test(cfg.voice)) cfg.engine = "doubao";

    // 记住的形象大小：设置页把 size 存进 pet_config，这里启动时直接应用——
    // 否则每次启动都回到 createPetWindow 写死的 340x420，调过的大小白调了。
    if (api && +saved.size) api.setWindowSize?.(+saved.size, Math.round(+saved.size * 1.25));

    // 性能：桌宠是「一直在跑」的 WebGL，默认 60fps + Retina 2x 像素（=4 倍工作量）+
    // 透明置顶窗口的合成开销，弱机器会明显卡。两刀砍一半：
    //   ① resolution 锁 1x（不按 Retina 2x 渲，肉眼几乎无差）
    //   ② 帧率封到 30fps（Live2D 呼吸/眨眼/口型 30 帧完全够）
    // 可用 URL 参数覆盖：?fps=60 或 ?dpr=2（想更清晰、机器够强时）。
    const app = new PIXI.Application({
      view: $("canvas"),
      resizeTo: window,
      backgroundAlpha: 0,        // 全透明，才能贴在桌面上
      autoStart: true,
      antialias: false,          // 关抗锯齿，省一截 GPU
      resolution: Math.min(+params.get("dpr") || 1, window.devicePixelRatio || 1),
      autoDensity: true,
    });
    app.ticker.maxFPS = Math.max(15, +params.get("fps") || 30);

    let model = null;
    const lip = { active: false, value: 0 };

    // 说话相关的状态必须声明在这里 —— loadModel() 在模块初始化时就会跑，它开头会调
    // stopSpeaking()，如果这些 let 放在文件后面，就会撞进 TDZ 直接抛
    // "Cannot access 'rafId' before initialization"，模型压根加不到舞台上。
    const HOP = 0.025;                 // 口型包络的步长（秒）
    let audioCtx = null, srcNode = null, rafId = 0, streamStop = null;   // streamStop 也在此,否则 loadModel→stopSpeaking 撞 TDZ

    const dance = { on: false, bpm: 110, t0: 0 };

    // ---------- 参数解析 ----------
    // 模型自带的动作只有 Idle / TapBody，没有舞蹈，所以舞是「编」出来的：按拍子直接
    // 驱动身体和头部的参数。麻烦在于**各模型的参数命名不统一**：
    //   Hiyori → ParamBodyAngleX      Wanko → PARAM_BODY_ANGLE_X
    //   tororo（Cubism 2）→ 连参数表都不暴露，只能按名字试探
    // 所以按「语义角色」去认，每个角色给一串候选名，谁在就用谁。
    const ROLES = {
      headX: ["ParamAngleX", "PARAM_ANGLE_X"],
      headY: ["ParamAngleY", "PARAM_ANGLE_Y"],
      headZ: ["ParamAngleZ", "PARAM_ANGLE_Z"],
      bodyX: ["ParamBodyAngleX", "PARAM_BODY_ANGLE_X"],
      bodyY: ["ParamBodyAngleY", "PARAM_BODY_ANGLE_Y"],
      bodyZ: ["ParamBodyAngleZ", "PARAM_BODY_ANGLE_Z"],
      armL: ["ParamArmLA", "ParamArmL", "PARAM_ARM_L", "ParamHandL", "PARAM_HAND_L"],
      armR: ["ParamArmRA", "ParamArmR", "PARAM_ARM_R", "ParamHandR", "PARAM_HAND_R"],
      eyeX: ["ParamEyeBallX", "PARAM_EYE_BALL_X"],
      earL: ["PARAM_EAR_L", "ParamEarL"],
      earR: ["PARAM_EAR_R", "ParamEarR"],
      hair: ["ParamHairAhoge", "ParamHairFront"],
    };

    // Cubism 2 拿不到 min/max，按 Live2D 标准参数的常规量程兜底
    const FALLBACK_RANGE = {
      headX: [-30, 30], headY: [-30, 30], headZ: [-30, 30],
      bodyX: [-10, 10], bodyY: [-10, 10], bodyZ: [-10, 10],
      armL: [-1, 1], armR: [-1, 1], eyeX: [-1, 1],
      earL: [-1, 1], earR: [-1, 1], hair: [-1, 1],
    };

    let slots = {};   // role -> {set(v), min, max, def}

    function resolveParams(core) {
      slots = {};
      const raw = core._model && core._model.parameters;
      const ids = raw ? Array.from(raw.ids) : null;

      for (const [role, names] of Object.entries(ROLES)) {
        for (const name of names) {
          if (ids) {                                  // Cubism 4：有完整参数表
            const i = ids.indexOf(name);
            if (i < 0) continue;
            slots[role] = {
              min: raw.minimumValues[i], max: raw.maximumValues[i], def: raw.defaultValues[i],
              set: (v) => core.setParameterValueByIndex(i, v),
            };
          } else {                                    // Cubism 2：只能按名字探
            if (typeof core.getParamIndex !== "function" || core.getParamIndex(name) < 0) continue;
            const [min, max] = FALLBACK_RANGE[role];
            slots[role] = { min, max, def: 0, set: (v) => core.setParamFloat(name, v) };
          }
          break;
        }
      }
    }

    // n ∈ [-1,1] → 实际参数值。默认值不一定在量程中点（手臂尤其），所以两侧分别按
    // 「默认到端点」的距离缩放，避免把手臂甩出画面。
    function put(role, n) {
      const s = slots[role];
      if (!s) return;
      const k = Math.max(-1, Math.min(1, n));
      const v = s.def + k * (k >= 0 ? (s.max - s.def) : (s.def - s.min));
      s.set(v);
    }

    // ---------- 动作库 ----------
    // 参数只能驱动「模型内部」的骨骼（头、身、臂）。像转圈、跳跃、绕圈走这种整体位移
    // 和旋转，参数是做不到的 —— 那要动 pixi 的 transform（position / scale / rotation）。
    // 所以一个「动作」= 参数动画 + transform 动画，两条腿一起走。
    //
    // 关于转圈：Live2D 是 2D 的，模型没有背面，硬转 360° 会露馅。这里用 2D 精灵伪造
    // Y 轴旋转的经典手法 —— 横向缩放走 cos 曲线（1 → 0 → -1 → 0 → 1），过零点时人被
    // 压成一条线，然后镜像出来。看着就像转了一圈，代价是「背面」其实是镜像的正面。
    let baseScale = 1, basePos = { x: 0, y: 0 };
    const move = { name: null, t0: 0, dur: 0 };

    // 过冲回弹缓动：飞入时冲过头再弹回定住，制造「吓一跳」的惊人感
    const easeOutBack = (t) => { const c1 = 2.2, c3 = c1 + 1; return 1 + c3 * (t - 1) ** 3 + c1 * (t - 1) ** 2; };
    const easeOutCubic = (t) => 1 - (1 - t) ** 3;

    const MOVES = {
      // 入场特效：从窗口顶外掉下来，落地压扁再弹两下定住。
      // 注意窗口只有 ~340×420，模型飞出画布就直接被裁掉看不见，
      // 所以全程动作必须留在窗口内——「跳水式落地」在小画布里最显眼。
      flyin: {
        label: "飞入", dur: 1600,
        tf: (p) => {
          const H = window.innerHeight;
          if (p < 0.5) {
            // 前半：自由落体（加速掉落），带一点左右飘和倾斜
            const f = p / 0.5, e = f * f;
            return {
              dx: 26 * Math.sin(3 * Math.PI * f) * (1 - f),
              dy: (1 - e) * -H,           // 从顶外一路掉到基准位
              sx: 1, sy: 1,
              rot: 0.14 * Math.sin(2 * Math.PI * f),
            };
          }
          // 后半：落地——压扁横向鼓起，指数回弹，同时小跳两下
          const q = (p - 0.5) / 0.5;
          const sq = Math.exp(-6 * q) * 0.22;
          const hop = Math.abs(Math.sin(q * Math.PI * 2)) * (1 - q) * H * 0.05;
          return { dx: 0, dy: -hop, sx: 1 + sq, sy: 1 - sq, rot: 0 };
        },
        param: (p, put) => { put("headZ", (1 - p) * 0.5); put("bodyZ", (1 - p) * 0.3); },
        sfx: flyinSfx,
      },
      // superfly 的模型姿势段：窗口横穿桌面时她保持「超人横飞」，落地瞬间立正+压扁。
      // 时长要和 windowFlight 的 FLY_MS+BOUNCE_MS 完全对齐（窗口动画和姿势共用进度）。
      superfly: {
        label: "螺旋飞入", dur: 3100,
        // 三段：螺旋接近(0~0.77，对齐 SPIRAL_MS=2400)由小变大、随轨道左右压弯；
        // 到位瞬间弹性放大「啵」地定格；尾段晕头转向左右摇。
        tf: (p) => {
          const P1 = 0.77;
          if (p < P1) {
            const f = p / P1;
            const s = 0.15 + 0.85 * f * f * (3 - 2 * f);   // smoothstep 由小变大
            const bank = 0.15 * Math.sin(SPIRAL_TURNS * 2 * Math.PI * f) * (1 - f);
            return { dx: 0, dy: 0, sx: s, sy: s, rot: bank };
          }
          if (p < 0.85) {
            const q = (p - P1) / 0.08;
            const pop = 0.12 * Math.sin(Math.PI * q) * Math.exp(-2 * q);
            return { dx: 0, dy: 0, sx: 1 + pop, sy: 1 + pop, rot: 0 };
          }
          const w = (p - 0.85) / 0.15;
          return { dx: 0, dy: 0, sx: 1, sy: 1, rot: 0.09 * Math.sin(3 * Math.PI * w) * (1 - w) };
        },
        param: (p, put) => {
          if (p < 0.77) { put("headZ", 0.4); }
          else { const w = (p - 0.77) / 0.23; put("headX", 0.8 * Math.sin(3 * Math.PI * w) * (1 - w)); }
        },
        sfx: superflySfx,
      },
      // 被甩飞时的翻滚（跟着窗口一起飞出屏幕）
      tumble: {
        label: "翻滚", dur: 900,
        tf: (p) => ({ dx: 0, dy: 0, sx: 1, sy: 1, rot: p * 12 }),
        param: (p, put) => { put("headZ", 0.8); },
      },
      spin: {
        label: "转圈", dur: 1400,
        tf: (p) => ({
          sx: Math.cos(2 * Math.PI * p),                 // 横向压扁再翻面 = 伪 3D 旋转
          dy: -18 * Math.sin(Math.PI * p),              // 顺便轻轻跃起，不然像在原地扭
          rot: 0.05 * Math.sin(2 * Math.PI * p),
        }),
        param: (p, put) => {
          put("bodyZ", 0.5 * Math.sin(2 * Math.PI * p));
          put("headZ", -0.4 * Math.sin(2 * Math.PI * p));
        },
      },
      turn: {
        label: "转身", dur: 700,
        tf: (p) => ({ sx: Math.cos(Math.PI * p) }),      // 只转半圈，停在镜像面
        param: (p, put) => put("headX", 0.6 * Math.sin(Math.PI * p)),
      },
      jump: {
        label: "跳一下", dur: 620,
        tf: (p) => {
          const h = Math.sin(Math.PI * p);
          return {
            dy: -70 * h,
            sy: 1 + 0.12 * h - 0.10 * Math.max(0, Math.cos(Math.PI * p) * (p < 0.08 || p > 0.92 ? 1 : 0)),
            sxAbs: 1 - 0.06 * h,                         // 起跳时略微拉长（squash & stretch）
          };
        },
        param: (p, put) => {
          put("bodyY", 0.8 * Math.sin(Math.PI * p));
          put("headY", 0.5 * Math.sin(Math.PI * p));
        },
      },
      wave: {
        label: "挥手", dur: 1600,
        param: (p, put) => {
          put("armR", 0.9);                              // 举起来
          put("armL", -0.1);
          put("headZ", 0.25 * Math.sin(6 * Math.PI * p));
          put("bodyZ", 0.15 * Math.sin(6 * Math.PI * p));
        },
      },
      nod: {
        label: "点头", dur: 900,
        param: (p, put) => put("headY", -0.85 * Math.abs(Math.sin(2 * Math.PI * p))),
      },
      shake: {
        label: "摇头", dur: 900,
        param: (p, put) => {
          put("headX", 0.8 * Math.sin(4 * Math.PI * p));
          put("headZ", 0.25 * Math.sin(4 * Math.PI * p));
        },
      },
      orbit: {
        label: "绕圈走", dur: 3000,
        tf: (p) => {
          const a = 2 * Math.PI * p;
          return {
            dx: 55 * Math.sin(a),
            dy: -14 * Math.abs(Math.sin(2 * Math.PI * p)),   // 走路的上下颠
            sx: Math.cos(a) >= 0 ? 1 : -1,                    // 走到背面就翻个面
          };
        },
        param: (p, put) => {
          put("bodyX", 0.4 * Math.sin(2 * Math.PI * p));
          put("headX", 0.5 * Math.sin(2 * Math.PI * p));
        },
      },
    };

    function playMove(name) {
      if (!MOVES[name] || !model) return;
      move.name = name;
      move.dur = MOVES[name].dur;
      move.t0 = performance.now();
      if (MOVES[name].sfx) { try { MOVES[name].sfx(); } catch {} }
      bus.postMessage({ type: "moveState", name, label: MOVES[name].label });
    }

    // 飞入音效：WebAudio 现场合成，不依赖素材文件（也就没有素材版权问题）。
    // 卡通「piu~~」下落哨声（音高从高滑到低，对准前半 0.8s 的下落），
    // 落地一声闷响 + 弹簧 boing（音高上下晃两下衰减），对准压扁回弹。
    function flyinSfx() {
      audioCtx = audioCtx || new AudioContext();
      audioCtx.resume();
      const t0 = audioCtx.currentTime, out = audioCtx.destination;

      const whistle = audioCtx.createOscillator();
      whistle.type = "sine";
      whistle.frequency.setValueAtTime(1250, t0);
      whistle.frequency.exponentialRampToValueAtTime(380, t0 + 0.8);
      const wg = audioCtx.createGain();
      wg.gain.setValueAtTime(0.0001, t0);
      wg.gain.exponentialRampToValueAtTime(0.4, t0 + 0.1);
      wg.gain.setValueAtTime(0.4, t0 + 0.7);
      wg.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.82);
      whistle.connect(wg).connect(out);
      whistle.start(t0); whistle.stop(t0 + 0.85);

      const tl = t0 + 0.8;    // 落地时刻 = dur 1600ms 的中点
      const thump = audioCtx.createOscillator();
      thump.type = "sine";
      thump.frequency.setValueAtTime(200, tl);
      thump.frequency.exponentialRampToValueAtTime(65, tl + 0.1);
      const tg = audioCtx.createGain();
      tg.gain.setValueAtTime(0.0001, tl);
      tg.gain.exponentialRampToValueAtTime(0.6, tl + 0.015);
      tg.gain.exponentialRampToValueAtTime(0.0001, tl + 0.18);
      thump.connect(tg).connect(out);
      thump.start(tl); thump.stop(tl + 0.2);

      const boing = audioCtx.createOscillator();
      boing.type = "triangle";
      boing.frequency.setValueAtTime(420, tl);
      boing.frequency.exponentialRampToValueAtTime(150, tl + 0.07);
      boing.frequency.exponentialRampToValueAtTime(280, tl + 0.16);
      boing.frequency.exponentialRampToValueAtTime(120, tl + 0.34);
      const bg = audioCtx.createGain();
      bg.gain.setValueAtTime(0.0001, tl);
      bg.gain.exponentialRampToValueAtTime(0.35, tl + 0.02);
      bg.gain.exponentialRampToValueAtTime(0.0001, tl + 0.42);
      boing.connect(bg).connect(out);
      boing.start(tl); boing.stop(tl + 0.45);
    }

    // ---------- 破窗入场：整个窗口横穿真实桌面 ----------
    // 代入感的来源：无边框透明窗口本身从屏幕右缘外冲进来，看起来就是
    // Mao 本人横着飞过桌面，砸回原位弹两下，落定后开口吐槽。
    const SPIRAL_MS = 2400, SPIRAL_TURNS = 3, R_MAX = 170;  // 螺旋时长/圈数/最大圈半径
    const ENTRANCE_LINES = [
      "哇……转晕了转晕了……嘿嘿，我来啦！",
      "嘿嘿，吓到你了吧？",
      "呼……绕了好大一圈才找到你！",
      "咦？这是谁的电脑？算了，以后就是我的啦！",
    ];
    async function windowFlight(line, target) {
      if (!api || !model) { playMove("flyin"); return; }  // 浏览器里没有窗口控制，退回画布内版本
      const b = await api.getWindowBounds();
      const sw = ((window.screen && window.screen.width) || 1680);
      const sh = ((window.screen && window.screen.height) || 1050);
      // 起点：屏幕右下角；终点：屏幕中心（可传 target 改落点——比如落在星球壁纸的地平线下）。
      const from = { x: sw - b.width / 2 - 30, y: sh - b.height / 2 - 40 };
      const to = target || { x: sw / 2, y: sh / 2 - 30 };
      playMove("superfly");
      const t0 = performance.now();
      await new Promise((done) => {
        (function step() {
          const t = performance.now() - t0;
          if (t < SPIRAL_MS) {
            const f = t / SPIRAL_MS;
            const ease = f * f * (3 - 2 * f);          // 螺旋中心从右下角滑向屏幕中心
            const cx = from.x + (to.x - from.x) * ease;
            const cy = from.y + (to.y - from.y) * ease;
            const r = R_MAX * (f < 0.8 ? f / 0.8 : (1 - f) / 0.2);   // 圈由小变大，末段收拢
            const th = SPIRAL_TURNS * 2 * Math.PI * f;
            const x = cx + r * Math.cos(th) - b.width / 2;
            const y = Math.max(28, Math.min(sh - 140, cy + r * 0.8 * Math.sin(th) - b.height / 2));
            api.setWindowPosition(Math.round(x), Math.round(y));
          } else {
            api.setWindowPosition(Math.round(to.x - b.width / 2), Math.round(to.y - b.height / 2));
            done(); return;
          }
          requestAnimationFrame(step);
        })();
      });
      if (line !== null)   // 传 null = 只飞不说（预演模式里台词另行编排，尖叫要压在坠落过程上）
        try { speak(line || ENTRANCE_LINES[Math.floor(Math.random() * ENTRANCE_LINES.length)]); } catch {}
    }

    // ---------- 拍摄剧本模式 ----------
    // 拍抖音用：Mao 的台词按顺序排好，主进程注册的全局快捷键每按一次
    // 就 next() 一步（说下一句+做动作），镜头外的人负责接话。
    // 流程：藏起来 → 螺旋入场“哈喽” → 自我介绍 → 会什么 → 报今天天气。
    // ========== EP1《坠落》——连续剧第一集 ==========
    // 世界观：这台电脑是一颗星球。深夜，一个来自遥远星球的小精灵坠落于此。
    // 两种用法（同一份台词）：
    //   Alt+M 逐句走 —— 正式拍摄，守门人（你）的台词真人现场说；
    //   Alt+P 整集自动预演 —— 守门人台词也用 TTS 男声配出来，一个人就能审片。
    const GUARD_VOICE = "zh_male_beijingxiaoye_moon_bigtts";   // 预演里「守门人」的配音
    // 情绪曲线：吓一跳(坠机) → 好笑(怼人) → 惊讶(她会数bug) → 心疼(BGM骤停) →
    // 反弹(抢着要名字) → 上头(收房租) → 后背发凉又想笑(不是一个人来的)。每 8 秒一个拐点。
    const SCRIPT = [
      { move: "entrance",
        text: "哇啊啊——刹车呢？！谁把星球停这儿的——！",
        after: "呜……着陆评分，零分……" },
      { user: "我电脑里……掉进来一个人？！",
        text: "是天外来客！你好呀守门人——我从很远很远的星球来！" },
      { user: "守门人？这是我的电脑！",
        text: "电脑？这明明是星球！上面还有二十七只 bug 虫在爬——我刚替你数的！" },
      // 悲情一瞬：BGM 骤停，全场只剩她的声音——
      { user: "那你自己的星球呢？", bgmCut: true,
        text: "我的星球……回不去了。" },
      // ——马上自己抢话反弹（BGM 回来）
      { bgmRestart: true,
        text: "不许摆哭脸！落地的规矩：只取新名字。快，给我取一个！" },
      { user: "……就叫雪莉吧。",
        text: "雪莉……雪梨？我才不是水果！……哼，不过甜甜的，勉强收下！这颗星球归我罩了——房租：每天陪我聊十分钟！" },
      // 结尾钩子：凑近天窗的悄悄话（太空回声）——EP2 的引子
      { fx: "whisper", outro: true,
        text: "守门人，小声点……刚才，我好像……不是一个人过来的。嘻嘻，晚安～" },
    ];
    const beat = (ms) => new Promise((r) => setTimeout(r, ms));
    let scriptIdx = 0, demoBusy = false;
    window.petScript = {
      // 开拍准备：Mao 溜到屏幕外藏好（桌面干干净净，等入场）
      async reset() {
        scriptIdx = 0;
        stopSpeaking();
        try { stopBGM(true); } catch {}
        if (api) {
          const sw = (window.screen && window.screen.width) || 1680;
          await api.setWindowPosition(sw + 80, Math.round(((window.screen && window.screen.height) || 1050) / 2));
        }
        return "ready";
      },
      async next() {
        if (maoGone) {           // 被甩飞后按一下 = 叫回来（螺旋入场，不消耗剧本台词）
          maoGone = false;
          await windowFlight("哼！刚才是谁把人家甩出去的！");
          return "back";
        }
        const s = SCRIPT[scriptIdx];
        if (!s) return "end";
        scriptIdx++;
        await playBeat(s);
        return scriptIdx + "/" + SCRIPT.length;
      },
      // Alt+P：整集自动预演。异响 → 骤静 → 坠机(炸响+白闪+震屏) → 对手戏 → 耳语 → 信号中断。
      async demo() {
        if (demoBusy) return "busy";
        demoBusy = true;
        try {
          await this.reset();
          await beat(900);
          signalOmen();                       // 「天窗」外由远及近的异响——出事前兆
          await beat(2700);
          await beat(500);                    // 骤静半秒——最吓人的一拍
          await playBeat(SCRIPT[0]);          // 坠机入场
          for (const s of SCRIPT.slice(1)) {
            await beat(480);
            if (s.user) { await speakGuard(s.user); await beat(280); }
            await playBeat(s);
          }
        } finally { demoBusy = false; }
        return "done";
      },
    };
    // 一拍戏：入场/音乐骤停/耳语/收尾等所有戏剧标记都在这里执行（Alt+M 和预演共用）。
    async function playBeat(s) {
      if (s.move === "entrance") {
        await windowCrash(s.text, s.after);
        startBGM();                           // 尘埃落定，氛围乐涌起
        return;
      }
      if (s.bgmCut) stopBGM(true);            // 骤停：世界只剩她一个人的声音
      if (s.bgmRestart) startBGM();
      if (s.move) playMove(s.move);
      await speak(s.text, s.fx);
      if (s.outro) { stopBGM(); suspenseOutro(); }   // 低鸣 + 信号中断 · 未完待续
    }
    // 落点压低到画面下 2/5：星球的大气蓝光留在她头顶上方，构图像真的站在星球夜面上。
    function landingSpot() {
      const sw = ((window.screen && window.screen.width) || 1680);
      const sh = ((window.screen && window.screen.height) || 1050);
      return { x: sw / 2, y: Math.round(sh * 0.58) };
    }

    // ---------- 坠机入场：高空俯冲 → BOOM → 白闪 + 冲击波环 → 震屏 ----------
    // 「炸裂感」三件套全对准落地一瞬：低音炮爆响、白光炸开、整个窗口剧烈抖动。
    async function windowCrash(scream, afterLine) {
      if (!api || !model) { playMove("flyin"); if (scream) speak(scream); return; }
      const b = await api.getWindowBounds();
      const sw = ((window.screen && window.screen.width) || 1680);
      const sh = ((window.screen && window.screen.height) || 1050);
      const from = { x: sw * 0.92, y: -b.height * 0.7 };   // 右上角高空屏幕外
      const to = landingSpot();
      playMove("superfly");
      crashWhoosh();
      if (scream) try { speak(scream); } catch {}          // 尖叫压在俯冲上
      const DIVE = 950;
      const t0 = performance.now();
      await new Promise((done) => {
        (function step() {
          const f = Math.min(1, (performance.now() - t0) / DIVE);
          const e = f * f;                                 // 越掉越快
          const x = from.x + (to.x - from.x) * e - b.width / 2
                    + Math.sin(f * 11) * 30 * (1 - f);     // 失控左右摇摆
          const y = from.y + (to.y - from.y) * e - b.height / 2;
          api.setWindowPosition(Math.round(x), Math.round(y));
          if (f < 1) requestAnimationFrame(step); else done();
        })();
      });
      impactBoom(); impactFlash();
      // 震屏：随机抖动 620ms，振幅衰减到零
      const fx0 = Math.round(to.x - b.width / 2), fy0 = Math.round(to.y - b.height / 2);
      const s0 = performance.now();
      await new Promise((done) => {
        (function shake() {
          const t = performance.now() - s0;
          if (t > 620) { api.setWindowPosition(fx0, fy0); done(); return; }
          const a = 30 * (1 - t / 620);
          api.setWindowPosition(fx0 + Math.round((Math.random() * 2 - 1) * a),
                                fy0 + Math.round((Math.random() * 2 - 1) * a * 0.7));
          requestAnimationFrame(shake);
        })();
      });
      if (afterLine) { await beat(450); await speak(afterLine); }
    }

    // 俯冲呼啸：一团带通噪声从尖啸滑到低吼 + 锯齿波下坠音——「有东西砸下来了」
    function crashWhoosh() {
      audioCtx = audioCtx || new AudioContext(); audioCtx.resume();
      const t0 = audioCtx.currentTime, out = audioCtx.destination;
      const len = Math.floor(audioCtx.sampleRate * 1.05);
      const nb = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
      const nd = nb.getChannelData(0);
      for (let i = 0; i < len; i++) nd[i] = Math.random() * 2 - 1;
      const src = audioCtx.createBufferSource(); src.buffer = nb;
      const bp = audioCtx.createBiquadFilter(); bp.type = "bandpass"; bp.Q.value = 0.8;
      bp.frequency.setValueAtTime(3400, t0);
      bp.frequency.exponentialRampToValueAtTime(280, t0 + 0.95);
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.exponentialRampToValueAtTime(0.7, t0 + 0.85);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + 1.02);
      src.connect(bp); bp.connect(g); g.connect(out); src.start(t0);
      const w = audioCtx.createOscillator(); w.type = "sawtooth";
      w.frequency.setValueAtTime(1600, t0);
      w.frequency.exponentialRampToValueAtTime(130, t0 + 0.95);
      const wg = audioCtx.createGain();
      wg.gain.setValueAtTime(0.0001, t0);
      wg.gain.exponentialRampToValueAtTime(0.13, t0 + 0.5);
      wg.gain.exponentialRampToValueAtTime(0.0001, t0 + 1.0);
      w.connect(wg).connect(out); w.start(t0); w.stop(t0 + 1.05);
    }

    // 落地爆响：低音炮下潜（120→28Hz）+ 高频碎裂沙——手机外放也能感到「墩」的一下
    function impactBoom() {
      audioCtx = audioCtx || new AudioContext(); audioCtx.resume();
      const t0 = audioCtx.currentTime, out = audioCtx.destination;
      const o = audioCtx.createOscillator(); o.type = "sine";
      o.frequency.setValueAtTime(120, t0);
      o.frequency.exponentialRampToValueAtTime(28, t0 + 0.55);
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.95, t0);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.62);
      o.connect(g).connect(out); o.start(t0); o.stop(t0 + 0.65);
      const len = Math.floor(audioCtx.sampleRate * 0.28);
      const nb = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
      const nd = nb.getChannelData(0);
      for (let i = 0; i < len; i++) nd[i] = (Math.random() * 2 - 1) * (1 - i / len);
      const src = audioCtx.createBufferSource(); src.buffer = nb;
      const hp = audioCtx.createBiquadFilter(); hp.type = "highpass"; hp.frequency.value = 1700;
      const ng = audioCtx.createGain(); ng.gain.value = 0.3;
      src.connect(hp); hp.connect(ng); ng.connect(out); src.start(t0);
    }

    // 落地白闪 + 冲击波环：两次白光脉冲，一圈青白色冲击环从落点炸开扩散
    function impactFlash() {
      let el = document.getElementById("impactFlash");
      if (!el) {
        el = document.createElement("div");
        el.id = "impactFlash";
        el.style.cssText = "position:fixed;inset:0;pointer-events:none;z-index:9;opacity:0;" +
          "background:radial-gradient(circle at 50% 62%, rgba(255,255,255,.95), rgba(150,200,255,.4) 42%, transparent 72%)";
        document.body.appendChild(el);
      }
      const pulse = (delay, peak, ms) => setTimeout(() => {
        el.style.transition = "none"; el.style.opacity = String(peak);
        requestAnimationFrame(() => requestAnimationFrame(() => {
          el.style.transition = `opacity ${ms}ms ease-out`; el.style.opacity = "0";
        }));
      }, delay);
      pulse(0, 1, 620); pulse(240, 0.45, 480);             // 主闪 + 余闪
      const ring = document.createElement("div");
      ring.style.cssText = "position:fixed;left:50%;top:62%;width:40px;height:40px;margin:-20px 0 0 -20px;" +
        "border:3px solid rgba(190,230,255,.9);border-radius:50%;pointer-events:none;z-index:9;" +
        "box-shadow:0 0 24px rgba(150,210,255,.8);transform:scale(.2);opacity:1";
      document.body.appendChild(ring);
      requestAnimationFrame(() => requestAnimationFrame(() => {
        ring.style.transition = "transform 800ms cubic-bezier(.1,.7,.3,1), opacity 800ms ease-out";
        ring.style.transform = "scale(22)"; ring.style.opacity = "0";
      }));
      setTimeout(() => ring.remove(), 900);
    }

    // ---------- 太空氛围 BGM（全合成，无版权） ----------
    // 星云 pad：Am(add9) 四音失谐 + 低通呼吸；星光叮咚：五声音阶随机 ping 穿过太空延迟。
    // 说话时自动让位（ducking），悲情台词前可骤停（stopBGM(true)）。
    let bgm = null;
    function startBGM() {
      if (bgm) return;
      audioCtx = audioCtx || new AudioContext(); audioCtx.resume();
      const master = audioCtx.createGain();
      master.gain.value = 0.0001;
      master.connect(audioCtx.destination);
      master.gain.setTargetAtTime(0.13, audioCtx.currentTime, 1.8);
      const lp = audioCtx.createBiquadFilter();
      lp.type = "lowpass"; lp.frequency.value = 780; lp.Q.value = 0.4;
      lp.connect(master);
      const lfo = audioCtx.createOscillator(); lfo.frequency.value = 0.07;
      const lfoG = audioCtx.createGain(); lfoG.gain.value = 260;
      lfo.connect(lfoG); lfoG.connect(lp.frequency); lfo.start();
      const oscs = [[110, .5, "sine"], [164.81, .34, "sine"], [220, .26, "triangle"], [246.94, .13, "sine"]]
        .map(([f, gv, w]) => {
          const o = audioCtx.createOscillator();
          o.type = w; o.frequency.value = f; o.detune.value = Math.random() * 6 - 3;
          const og = audioCtx.createGain(); og.gain.value = gv;
          o.connect(og); og.connect(lp); o.start();
          return o;
        });
      const dly = audioCtx.createDelay(2); dly.delayTime.value = 0.42;
      const fb = audioCtx.createGain(); fb.gain.value = 0.5;
      dly.connect(fb); fb.connect(dly);
      const wet = audioCtx.createGain(); wet.gain.value = 0.7;
      dly.connect(wet); wet.connect(master);
      const NOTES = [440, 523.25, 587.33, 659.25, 783.99, 880, 1046.5];   // A 小调五声
      const state = { master, oscs, lfo, timer: 0 };
      const twinkle = () => {
        if (bgm !== state) return;
        const t = audioCtx.currentTime;
        const o = audioCtx.createOscillator(); o.type = "sine";
        o.frequency.value = NOTES[Math.floor(Math.random() * NOTES.length)];
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(0.1, t + 0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 1.4);
        o.connect(g); g.connect(lp); g.connect(dly);
        o.start(t); o.stop(t + 1.5);
        state.timer = setTimeout(twinkle, 1400 + Math.random() * 2600);
      };
      state.timer = setTimeout(twinkle, 1200);
      bgm = state;
    }
    function bgmDuck(on) {   // 有人说话，音乐让位
      if (bgm) bgm.master.gain.setTargetAtTime(on ? 0.045 : 0.13, audioCtx.currentTime, 0.35);
    }
    function stopBGM(hard) { // hard=true 骤停（悲情一瞬）；否则 3s 淡出
      if (!bgm) return;
      const b = bgm; bgm = null;
      clearTimeout(b.timer);
      const t = audioCtx.currentTime;
      b.master.gain.cancelScheduledValues(t);
      if (hard) b.master.gain.setTargetAtTime(0.0001, t, 0.03);
      else b.master.gain.setTargetAtTime(0.0001, t, 1.1);
      setTimeout(() => { try { b.oscs.forEach((o) => o.stop()); b.lfo.stop(); } catch {} }, hard ? 200 : 3800);
    }

    // 坠落前兆：三声数据雨由远及近（一声比一声响），底下一条缓缓爬升的低频——
    // 「有什么东西正在穿过大气层」。全程 WebAudio 合成，2.6s。
    function signalOmen() {
      audioCtx = audioCtx || new AudioContext(); audioCtx.resume();
      const t0 = audioCtx.currentTime, out = audioCtx.destination;
      [0, 0.9, 1.7].forEach((dt, i) => setTimeout(() => { try { dataChirp(); } catch {} }, dt * 1000 * (i ? 1 : 1)));
      const rise = audioCtx.createOscillator();
      rise.type = "sine";
      rise.frequency.setValueAtTime(34, t0);
      rise.frequency.exponentialRampToValueAtTime(110, t0 + 2.6);
      const rg = audioCtx.createGain();
      rg.gain.setValueAtTime(0.0001, t0);
      rg.gain.exponentialRampToValueAtTime(0.35, t0 + 2.2);
      rg.gain.exponentialRampToValueAtTime(0.0001, t0 + 2.65);
      rise.connect(rg).connect(out);
      rise.start(t0); rise.stop(t0 + 2.7);
    }

    // 预演配音：守门人的台词用另一路男声读出来——不带口型、不出气泡（那是她的嘴和气泡），
    // 纯声音，听感就是镜头外的人在接话。播完才返回，方便对手戏按拍子走。
    async function speakGuard(text) {
      audioCtx = audioCtx || new AudioContext();
      await audioCtx.resume();
      const res = await fetch(`/tts-stream?text=${encodeURIComponent(text)}&voice=${encodeURIComponent(GUARD_VOICE)}`);
      if (!res.ok) throw new Error(await res.text());
      try { bgmDuck(true); } catch {}
      const SR = 24000;
      let cursor = audioCtx.currentTime + 0.08, leftover = new Uint8Array(0);
      const reader = res.body.getReader();
      for (;;) {
        const { done, value } = await reader.read();
        if (done) break;
        const merged = new Uint8Array(leftover.length + value.length);
        merged.set(leftover); merged.set(value, leftover.length);
        const usable = merged.length - (merged.length % 2);
        leftover = merged.slice(usable);
        if (usable < 2) continue;
        const i16 = new Int16Array(merged.buffer, 0, usable / 2);
        const buf = audioCtx.createBuffer(1, i16.length, SR);
        const f32 = buf.getChannelData(0);
        for (let i = 0; i < i16.length; i++) f32[i] = i16[i] / 32768;
        const s = audioCtx.createBufferSource();
        s.buffer = buf; s.connect(audioCtx.destination);
        const at = Math.max(cursor, audioCtx.currentTime);
        s.start(at); cursor = at + buf.duration;
      }
      await new Promise((r) => setTimeout(r, Math.max(0, (cursor - audioCtx.currentTime) * 1000) + 150));
      try { bgmDuck(false); } catch {}
    }

    // 结尾悬念：宇宙低鸣从脚下涌起又沉下去，远处一声数据雨（她的母星在回应？），
    // 气泡打出「信号中断 · 未完待续」——连续剧的钩子留在画面上。
    function suspenseOutro() {
      audioCtx = audioCtx || new AudioContext(); audioCtx.resume();
      const t0 = audioCtx.currentTime, out = audioCtx.destination;
      const drone = audioCtx.createOscillator();
      drone.type = "sine";
      drone.frequency.setValueAtTime(52, t0);
      drone.frequency.linearRampToValueAtTime(36, t0 + 3.4);
      const dg = audioCtx.createGain();
      dg.gain.setValueAtTime(0.0001, t0);
      dg.gain.exponentialRampToValueAtTime(0.5, t0 + 1.3);
      dg.gain.exponentialRampToValueAtTime(0.0001, t0 + 3.6);
      drone.connect(dg).connect(out);
      drone.start(t0); drone.stop(t0 + 3.7);
      setTimeout(() => { try { dataChirp(); } catch {} }, 1500);
      setTimeout(() => bubble("〖 信号中断 · 未完待续 〗", true), 800);
      setTimeout(() => bubble("", false), 5200);
    }

    // ---------- 聆听光环 ----------
    // 按住说话时脚下浮起的云雾椭圆：径向渐变纹理 ×3 层（底盘 + 两缕漂移光雾），
    // 加法混合出光感；呼吸脉动 + 随说话音量涨缩变亮（auraLevel 由麦克风 RMS 驱动）。
    let aura = null, auraOn = false, auraLevel = 0;

    function makeGlowTexture() {
      const c = document.createElement("canvas");
      c.width = c.height = 256;
      const g = c.getContext("2d");
      const grad = g.createRadialGradient(128, 128, 8, 128, 128, 128);
      grad.addColorStop(0, "rgba(255,255,255,0.9)");
      grad.addColorStop(0.35, "rgba(255,255,255,0.45)");
      grad.addColorStop(0.7, "rgba(255,255,255,0.12)");
      grad.addColorStop(1, "rgba(255,255,255,0)");
      g.fillStyle = grad;
      g.fillRect(0, 0, 256, 256);
      return PIXI.Texture.from(c);
    }

    function ensureAura() {
      if (aura) return;
      const tex = makeGlowTexture();
      aura = new PIXI.Container();
      aura.alpha = 0;
      const mk = (tint, alpha) => {
        const s = new PIXI.Sprite(tex);
        s.anchor.set(0.5);
        s.tint = tint;
        s.alpha = alpha;
        s.blendMode = PIXI.BLEND_MODES.ADD;
        aura.addChild(s);
        return s;
      };
      aura.base = mk(0x5fc8ff, 0.5);    // 底盘：青蓝
      aura.w1 = mk(0x9fe8ff, 0.32);     // 光雾一：浅青
      aura.w2 = mk(0xd8f6ff, 0.26);     // 光雾二：near-white
      app.stage.addChildAt(aura, 0);    // 永远垫在模型脚下

      app.ticker.add(() => {
        // 看门狗：长按发起的录音，但长按状态已经不在了（松手事件被劫持/丢失）→ 强制收尾。
        // 无论哪个环节丢了 pointerup，这里每帧兜底，录音不可能卡死。
        if (rec && !rec.finishing && rec.byHold && !pttHolding) voiceFinish();
        if (!aura) return;
        const target = auraOn && model ? 1 : 0;
        aura.alpha += (target - aura.alpha) * 0.12;
        if (aura.alpha < 0.01) { aura.visible = false; return; }
        aura.visible = true;
        if (!model) return;
        auraLevel *= 0.9;               // 音量指示自然回落
        const L = Math.min(1, auraLevel);
        const t = performance.now() / 1000;
        const w = model.width;
        aura.x = model.x;
        aura.y = model.y + model.height * 0.46;   // 脚底
        const breathe = 1 + 0.06 * Math.sin(t * 2.1) + L * 0.3;
        aura.base.width = w * 1.45 * breathe;
        aura.base.height = w * 0.42 * breathe;
        aura.base.alpha = 0.38 + L * 0.4;
        // 两缕光雾反向慢漂 + 各自脉动，云的松散感靠它们
        aura.w1.x = Math.sin(t * 0.7) * w * 0.16;
        aura.w1.width = w * (0.85 + 0.1 * Math.sin(t * 1.3)) * (1 + L * 0.25);
        aura.w1.height = w * 0.3 * (1 + L * 0.25);
        aura.w2.x = Math.sin(t * 0.9 + 2.5) * w * 0.2;
        aura.w2.width = w * (0.6 + 0.08 * Math.sin(t * 1.7 + 1)) * (1 + L * 0.2);
        aura.w2.height = w * 0.24;
      });
    }

    // ---------- 语音对话 ----------
    // Alt+Space：按一下开始录音，再按一下（或静音 1.5 秒）自动结束 →
    // 本地 whisper 转文字 → AI 大脑（设置里配的 key）→ 雪莉开口回答。
    const CHAT_PERSONA =
      "你是雪莉（Sherlly），住在用户电脑里的调皮小精灵桌宠。" +
      "用中文口语回答，简短（一两句话，30字以内），活泼调皮爱开玩笑，偶尔用语气词（嘿嘿/哇/诶）。" +
      "不要用 markdown、列表或表情符号。" +
      "你有身体，能真的做动作：需要时在回复末尾加动作标记（用户听不到标记）。" +
      "可用标记：[跳舞]（放音乐并跳舞）、[停舞]（停止跳舞和音乐）、[转圈]、[飞入]（飞回屏幕中心）、[甩飞]（自己飞出屏幕）。" +
      "用户让你跳舞就加[跳舞]，让你停就加[停舞]。只在用户明确要求动作时才用标记。";
    const chatHistory = [];
    let rec = null;

    // 录音 = 本地留一份（whisper 兜底）+ 同时流式推给 /asr（火山）→ 字幕边说边长。
    // recStarting/pendingFinish：getUserMedia 是异步的，松手若发生在「麦克风还在打开中」，
    // voiceFinish 会扑空 → 随后 mic 打开、录音卡死。这里握手：开完发现有欠账就立刻收尾。
    let recStarting = false, pendingFinish = false, pendingCancel = false;
    // 麦克风保温：用完不立刻关，留 60s——连续对话第二句起零延迟开录
    let micCache = null, micCacheTimer = 0;
    async function getMic() {
      clearTimeout(micCacheTimer);
      if (micCache && micCache.active) return micCache;
      micCache = await navigator.mediaDevices.getUserMedia({ audio: true });
      return micCache;
    }
    function parkMic() {
      clearTimeout(micCacheTimer);
      micCacheTimer = setTimeout(() => {
        try { micCache?.getTracks().forEach((t) => t.stop()); } catch {}
        micCache = null;
      }, 60000);
    }
    async function voiceBegin(byHold) {
      if (rec || recStarting) return;
      recStarting = true;
      try {
        const stream = await getMic();
        // 有些手机 WebView 不给 16kHz 采集(强开 48k)——先试 16k,不行就原生采样率+下采样
        let ctx;
        try { ctx = new AudioContext({ sampleRate: 16000 }); } catch { ctx = new AudioContext(); }
        const srcRate = ctx.sampleRate;
        const down = (d) => {   // 线性插值下采样到 16k(ASR/whisper 都要 16k)
          if (srcRate === 16000) return new Float32Array(d);
          const ratio = srcRate / 16000, n = Math.floor(d.length / ratio), out = new Float32Array(n);
          for (let i = 0; i < n; i++) {
            const x = i * ratio, i0 = Math.floor(x), fr = x - i0;
            out[i] = d[i0] + ((d[i0 + 1] !== undefined ? d[i0 + 1] : d[i0]) - d[i0]) * fr;
          }
          return out;
        };
        const src = ctx.createMediaStreamSource(stream);
        const proc = ctx.createScriptProcessor(4096, 1, 1);
        const bufs = [];
        const segs = new Map();   // seg → {text, definite}，火山按段累积更新
        let ws = null;
        try {
          // 跟着当前域名走:桌面=ws://127.0.0.1:13004,手机经隧道=wss://pet.hub.cicy-ai.com
          const wsProto = location.protocol === "https:" ? "wss" : "ws";
          ws = new WebSocket(`${wsProto}://${location.host}/asr`);
          ws.binaryType = "arraybuffer";
          ws.onmessage = (ev) => {
            if (!rec) return;
            try {
              const m = JSON.parse(ev.data);
              if (m.type === "transcript") {
                segs.set(m.seg, { text: m.text, definite: m.definite });
                const live = [...segs.values()].map((s) => s.text).join("");
                if (live) bubble("🎤 " + live, true);   // 边说边出字幕
              }
            } catch {}
          };
        } catch {}
        rec = { ctx, stream, proc, bufs, segs, ws, byHold: !!byHold };
        ensureAura();
        auraOn = true;                       // 脚下光环亮起
        duckMusic(true);                     // 派对音乐压低——别让 ASR 听一嘴动次打次
        proc.onaudioprocess = (e) => {
          if (!rec) return;
          const d = down(e.inputBuffer.getChannelData(0));   // 统一 16k
          bufs.push(d);
          let s = 0;
          for (let i = 0; i < d.length; i += 8) s += d[i] * d[i];
          auraLevel = Math.max(auraLevel, Math.sqrt(s / (d.length / 8)) * 9);  // 音量驱动光环
          if (ws && ws.readyState === 1) {   // Float32 → PCM16 流出去
            const p = new Int16Array(d.length);
            for (let i = 0; i < d.length; i++) p[i] = Math.max(-1, Math.min(1, d[i])) * 32767;
            ws.send(p.buffer);
          }
        };
        src.connect(proc);
        proc.connect(ctx.destination);
        // 不放「在听」气泡——脚下光环就是聆听指示，字幕等真开口了再出
      } catch (e) {
        rec = null;
        auraOn = false;
        bubble("麦克风打不开：" + (e.message || e), true);
        setTimeout(() => bubble("", false), 3000);
      } finally {
        recStarting = false;
      }
      if (pendingCancel) { pendingCancel = false; pendingFinish = false; voiceCancel(); }
      else if (pendingFinish) { pendingFinish = false; voiceFinish(); }
    }

    // 丢弃这次录音（快速点按/拖动/失焦等），什么都不发送
    function voiceCancel() {
      window.__voiceBtnReset?.();
      if (!rec) {
        if (recStarting) pendingCancel = true;
        return;
      }
      auraOn = false;
      duckMusic(false);
      const { ctx, proc, ws } = rec;
      rec = null;
      try { proc.disconnect(); ctx.close(); } catch {}
      try { ws?.close(); } catch {}
      parkMic();
      bubble("", false);
    }

    async function voiceFinish() {
      window.__voiceBtnReset?.();
      if (!rec) {
        if (recStarting) pendingFinish = true;   // 麦克风还在开 → 记账，开完立即收
        return;
      }
      if (rec.finishing) return;             // 防重入(看门狗/多次松手)
      rec.finishing = true;
      // 松手缓冲:手指抬起时尾音往往还没说完/还压在 ScriptProcessor 的缓冲里(~256ms),
      // 立刻掐断就是"字幕缺最后半个词"。多录 450ms 再收——录音继续流向 ASR,字幕还在长。
      await new Promise((r) => setTimeout(r, 450));
      if (!rec) return;                      // 缓冲期内被取消(上滑/打断)
      auraOn = false;                        // 光环渐隐
      duckMusic(false);
      const { ctx, proc, bufs, segs, ws } = rec;
      rec = null;
      try { proc.disconnect(); ctx.close(); } catch {}
      parkMic();                             // 麦克风保温 60s,不立刻关
      const n = bufs.reduce((s, b) => s + b.length, 0);
      if (n < 16000 * 0.35) {   // 太短当误触
        try { ws?.close(); } catch {}
        bubble("", false); return;
      }
      // 催火山出定稿——刚补送的尾音要时间识别,多等一点(1.6s),定稿一到立即放行
      let text = "";
      if (ws && ws.readyState === 1) {
        try { ws.send(JSON.stringify({ type: "flush" })); } catch {}
        await new Promise((done) => {
          const t = setTimeout(done, 1600);
          ws.onmessage = (ev) => {
            try {
              const m = JSON.parse(ev.data);
              if (m.type === "transcript") {
                segs.set(m.seg, { text: m.text, definite: m.definite });
                if (m.definite) { clearTimeout(t); done(); }
              }
            } catch {}
          };
          ws.onclose = () => { clearTimeout(t); done(); };
        });
        text = [...segs.values()].map((s) => s.text).join("").trim();
      }
      try { ws?.close(); } catch {}
      // 流式没出结果（没配 key/断网/被拒）→ 本地 whisper 兜底（不放提示气泡，安静地转）
      if (!text) {
        try {
          const res = await fetch("/stt", { method: "POST", body: encodeWav(bufs, n, 16000) });
          if (res.ok) text = ((await res.json()).text || "").replace(/\[.*?\]|\(.*?\)/g, "").trim();
        } catch {}
      }
      if (!text) { bubble("没听清，再说一遍？", true); setTimeout(() => bubble("", false), 2500); return; }
      // 她不在这台:话不落地——带给她"在"的那台去回答,那边的扬声器出声(话跟人走)
      if (!present) {
        fetch("/control", { method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ cmd: "ask", arg: text }) }).catch(() => {});
        bubble("📨 话带给她了,她在别的设备上回你", true);
        setTimeout(() => bubble("", false), 2600);
        return;
      }
      dataChirp();       // 「收到指令」数据雨——填掉 AI 思考的空档
      bubble("", false); // 松手后不回显「你说的话」，字幕只在说的过程中出现
      await chatReply(text);
    }

    // 兼容旧入口（快捷键 Alt+Space/Alt+V 还是可用的）：按一下开始，再按一下结束
    async function voiceToggle() { return rec ? voiceFinish() : voiceBegin(); }

    function encodeWav(bufs, n, sr) {
      const w = new DataView(new ArrayBuffer(44 + n * 2));
      const str = (o, s) => { for (let i = 0; i < s.length; i++) w.setUint8(o + i, s.charCodeAt(i)); };
      str(0, "RIFF"); w.setUint32(4, 36 + n * 2, true); str(8, "WAVEfmt ");
      w.setUint32(16, 16, true); w.setUint16(20, 1, true); w.setUint16(22, 1, true);
      w.setUint32(24, sr, true); w.setUint32(28, sr * 2, true); w.setUint16(32, 2, true); w.setUint16(34, 16, true);
      str(36, "data"); w.setUint32(40, n * 2, true);
      let o = 44;
      for (const b of bufs) for (let i = 0; i < b.length; i++, o += 2)
        w.setInt16(o, Math.max(-1, Math.min(1, b[i])) * 32767, true);
      return new Blob([w.buffer], { type: "audio/wav" });
    }

    // 黑客帝国「字幕浮现」声：玻璃质感的数据雨——一片高频正弦小水滴
    // （音高各异、前密后疏、每滴微微下滑），全部送进反馈延迟做空间回声尾巴，
    // 底下垫一层从高往低扫的窄带气声（字幕浮现的「嘘——」）。全合成，零素材。
    function dataChirp() {
      audioCtx = audioCtx || new AudioContext();
      audioCtx.resume();
      const t0 = audioCtx.currentTime, out = audioCtx.destination;

      // 空间感：90ms 反馈延迟 + 环内低通（回声越来越闷，像大空间）
      const bus = audioCtx.createGain(); bus.gain.value = 1;
      const dly = audioCtx.createDelay(); dly.delayTime.value = 0.09;
      const fb = audioCtx.createGain(); fb.gain.value = 0.4;
      const lp = audioCtx.createBiquadFilter(); lp.type = "lowpass"; lp.frequency.value = 5500;
      const wet = audioCtx.createGain(); wet.gain.value = 0.5;
      bus.connect(out);
      bus.connect(dly); dly.connect(lp); lp.connect(fb); fb.connect(dly);
      dly.connect(wet); wet.connect(out);

      // 玻璃雨滴 ×26
      const N = 26;
      for (let i = 0; i < N; i++) {
        const when = t0 + Math.pow(i / N, 1.35) * 0.72;   // 前密后疏
        const f0 = 3200 + Math.random() * 4800;
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = "sine";
        o.frequency.setValueAtTime(f0, when);
        o.frequency.exponentialRampToValueAtTime(f0 * 0.72, when + 0.09);
        g.gain.setValueAtTime(0.0001, when);
        g.gain.exponentialRampToValueAtTime(0.045 + Math.random() * 0.055, when + 0.006);
        g.gain.exponentialRampToValueAtTime(0.0001, when + 0.1);
        o.connect(g).connect(bus);
        o.start(when); o.stop(when + 0.12);
      }

      // 底衬气声：8.5k → 2.8k 往下扫
      const len = Math.floor(audioCtx.sampleRate * 0.7);
      const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
      const n = audioCtx.createBufferSource(); n.buffer = buf;
      const bp = audioCtx.createBiquadFilter();
      bp.type = "bandpass"; bp.Q.value = 2.2;
      bp.frequency.setValueAtTime(8500, t0);
      bp.frequency.exponentialRampToValueAtTime(2800, t0 + 0.68);
      const ng = audioCtx.createGain();
      ng.gain.setValueAtTime(0.03, t0);
      ng.gain.exponentialRampToValueAtTime(0.08, t0 + 0.18);
      ng.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.7);
      n.connect(bp).connect(ng).connect(bus);
      n.start(t0); n.stop(t0 + 0.72);
    }

    // ---------- 派对音乐 ----------
    // WebAudio 合成的电子鼓点（底鼓/军鼓/踩镲/贝斯线），BPM 和跳舞编排同源 → 天然卡拍。
    // 零素材零版权。lookahead 调度防漂移；录音时自动压低（不然 ASR 听到的全是动次打次）。
    let party = null, musicGain = null;
    const PARTY_BPM = 118;

    function startMusic(bpm) {
      stopMusic();
      audioCtx = audioCtx || new AudioContext();
      audioCtx.resume();
      musicGain = audioCtx.createGain();
      musicGain.gain.value = 0.9;
      musicGain.connect(audioCtx.destination);
      const spb = 60 / bpm;
      party = { bpm, next: audioCtx.currentTime + 0.1, bar: 0, timer: 0 };
      const ROOTS = [110, 87.3, 65.4, 98];          // Am F C G 循环
      const bass8 = [0, 0, 12, 0, 7, 0, 12, 7];     // 半音偏移的八分音符律动
      const scheduleBar = (t0, bar) => {
        const root = ROOTS[bar % 4];
        for (let b = 0; b < 4; b++) {
          const t = t0 + b * spb;
          // 底鼓：正弦快速下坠
          const k = audioCtx.createOscillator(), kg = audioCtx.createGain();
          k.frequency.setValueAtTime(150, t);
          k.frequency.exponentialRampToValueAtTime(45, t + 0.1);
          kg.gain.setValueAtTime(0.9, t);
          kg.gain.exponentialRampToValueAtTime(0.001, t + 0.13);
          k.connect(kg).connect(musicGain); k.start(t); k.stop(t + 0.15);
          // 踩镲：反拍高频噪声
          const hl = Math.floor(audioCtx.sampleRate * 0.04);
          const hb = audioCtx.createBuffer(1, hl, audioCtx.sampleRate);
          const hd = hb.getChannelData(0);
          for (let i = 0; i < hl; i++) hd[i] = Math.random() * 2 - 1;
          const h = audioCtx.createBufferSource(); h.buffer = hb;
          const hp = audioCtx.createBiquadFilter(); hp.type = "highpass"; hp.frequency.value = 8000;
          const hg = audioCtx.createGain();
          hg.gain.setValueAtTime(0.14, t + spb / 2);
          hg.gain.exponentialRampToValueAtTime(0.001, t + spb / 2 + 0.04);
          h.connect(hp).connect(hg).connect(musicGain); h.start(t + spb / 2); h.stop(t + spb / 2 + 0.05);
          // 军鼓：2、4 拍
          if (b === 1 || b === 3) {
            const sl = Math.floor(audioCtx.sampleRate * 0.09);
            const sb = audioCtx.createBuffer(1, sl, audioCtx.sampleRate);
            const sd = sb.getChannelData(0);
            for (let i = 0; i < sl; i++) sd[i] = Math.random() * 2 - 1;
            const sn = audioCtx.createBufferSource(); sn.buffer = sb;
            const sf = audioCtx.createBiquadFilter(); sf.type = "bandpass"; sf.frequency.value = 1900; sf.Q.value = 0.8;
            const sg = audioCtx.createGain();
            sg.gain.setValueAtTime(0.35, t);
            sg.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
            sn.connect(sf).connect(sg).connect(musicGain); sn.start(t); sn.stop(t + 0.1);
          }
          // 贝斯：八分音符锯齿波 + 低通
          for (const half of [0, 1]) {
            const idx = b * 2 + half, semi = bass8[idx];
            const bt = t + half * spb / 2;
            const bo = audioCtx.createOscillator(), bg2 = audioCtx.createGain();
            bo.type = "sawtooth";
            bo.frequency.setValueAtTime(root * Math.pow(2, semi / 12), bt);
            const bf = audioCtx.createBiquadFilter(); bf.type = "lowpass"; bf.frequency.value = 500;
            bg2.gain.setValueAtTime(0.13, bt);
            bg2.gain.exponentialRampToValueAtTime(0.001, bt + spb * 0.42);
            bo.connect(bf).connect(bg2).connect(musicGain); bo.start(bt); bo.stop(bt + spb * 0.45);
          }
        }
      };
      (function pumpMusic() {
        if (!party) return;
        while (party.next < audioCtx.currentTime + 0.6) {
          scheduleBar(party.next, party.bar++);
          party.next += spb * 4;
        }
        party.timer = setTimeout(pumpMusic, 200);
      })();
    }

    function stopMusic() {
      if (!party) return;
      clearTimeout(party.timer);
      party = null;
      if (musicGain) {   // 淡出收场，不咔哒
        try {
          musicGain.gain.setValueAtTime(musicGain.gain.value, audioCtx.currentTime);
          musicGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
          const g = musicGain;
          setTimeout(() => { try { g.disconnect(); } catch {} }, 600);
        } catch {}
        musicGain = null;
      }
    }
    function duckMusic(on) {
      if (!musicGain) return;
      try { musicGain.gain.linearRampToValueAtTime(on ? 0.06 : 0.9, audioCtx.currentTime + 0.2); } catch {}
    }

    // ---------- 唱歌表演 ----------
    // 《雪莉星球》主题曲:自制节拍伴奏(WebAudio 合成,无版权) + 她自己的声音逐句念唱 +
    // 全程跳舞 + 口型跟唱(speak 的口型管线天然生效),唱完谢幕自动收场。
    const SONG = {
      bpm: 96,
      lines: [
        "我从雪莉星球来～穿过网线到你身边",
        "屏幕是我的天窗,代码是大河奔流",
        "你敲键盘像地震,我在桌面蹦蹦跳",
        "小虫子我来抓,坏心情我赶跑",
        "主人主人别熬夜,月亮都在打哈欠",
        "陪我唱歌好不好,啦啦啦啦啦～",
      ],
    };
    let singing = false;
    async function singShow() {
      if (singing || !present) return;
      singing = true;
      dlog("sing start");
      try {
        startMusic(SONG.bpm);
        if (musicGain) musicGain.gain.value = 0.45;   // 伴奏给人声让位,但要听得见节拍
        setDance(true, SONG.bpm);
        await new Promise((r) => setTimeout(r, (60 / SONG.bpm) * 4 * 1000));   // 前奏一小节
        for (const line of SONG.lines) {
          if (!singing || !present) return;
          await speak(line);                              // speak 播完才返回 → 一句句对上拍子
          await new Promise((r) => setTimeout(r, 260));   // 换气
        }
        if (singing && present) { playMove("spin"); await speak("耶——谢谢收看!"); }
      } catch (e) { console.warn("[sing]", e); }
      finally {
        singing = false;
        setDance(false);
        stopMusic();
        dlog("sing end");
      }
    }
    function stopSing() {
      singing = false;
      setDance(false);
      stopMusic();
      try { stopSpeaking(); } catch {}
    }

    // ---------- 动作暗号 ----------
    // 大脑在回复里夹标记（读出来之前剥掉），雪莉据此真的做动作。
    const ACTION_TAGS = {
      "[跳舞]": () => { startMusic(PARTY_BPM); setDance(true, PARTY_BPM); },
      "[停舞]": () => { setDance(false); stopMusic(); },
      "[唱歌]": () => { singShow(); },
      "[停唱]": () => { stopSing(); },
      "[转圈]": () => playMove("spin"),
      "[飞入]": () => windowFlight(),
      "[甩飞]": () => flingOut(2300, -450),
    };

    // 雪莉的大脑 = Sherlly（cicy-code 里能真操作电脑的 agent）。
    // 语音识别出的话经 /agent 桥转给 Sherlly，取它的答复读出来。
    // 「看屏幕」不再由客户端做关键词判断/注入上下文——那是她自己的能力:
    // 需要时她自己 curl 服务器的 /peek(主进程截 mac 屏 + GLM-4V 描述)。零提示词。

    // 把大脑的一段文本收拾干净并念出来:剥动作暗号并执行、去 markdown/表格、超长截到句边界。
    // 返回 Promise,播完才回——流式队列靠它一句接一句不打架。
    async function speakReply(raw) {
      let reply = (raw || "").trim();
      if (!reply) return;
      for (const [tag, act] of Object.entries(ACTION_TAGS)) {
        if (reply.includes(tag)) {
          reply = reply.split(tag).join("");
          try { act(); } catch (err) { console.error("[action]", tag, err); }
        }
      }
      reply = reply
        .replace(/```[\s\S]*?```/g, "")
        .replace(/^\s*\|.*\|\s*$/gm, (r) => r.replace(/\|/g, "，").replace(/[-:\s]{3,}/g, ""))
        .replace(/^[-*•>#]+\s*/gm, "")
        .replace(/[#*`_~|]/g, "")
        .replace(/\n{2,}/g, "。").replace(/\n/g, "，")
        .replace(/[，。]{2,}/g, (m) => m[m.length - 1]).trim();
      if (reply.length > 200) {
        const cut = reply.slice(0, 200);
        const lastEnd = Math.max(cut.lastIndexOf("。"), cut.lastIndexOf("！"), cut.lastIndexOf("？"));
        reply = lastEnd > 40 ? cut.slice(0, lastEnd + 1) : cut + "。";
      }
      if (reply) await speak(reply);
    }

    // 说话排队:跟播的 say 段落一句接一句念(speak 会掐掉上一句,不排队就互相打断)
    const sayQ = [];
    let sayBusy = false;
    async function enqueueSay(text) {
      sayQ.push(text);
      if (sayBusy) return;
      sayBusy = true;
      while (sayQ.length) { try { await speakReply(sayQ.shift()); } catch {} }
      sayBusy = false;
    }

    async function chatReply(userText) {
      // 发问不等答:把话送进雪莉就完事。她说的**所有话**(不管谁问的)由服务器的
      // 全局跟播器统一广播 say 回来,executor 里 speakReply 排队念——一个出声通道。
      try {
        const r = await fetch("/agent-send", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text: userText }),
        });
        if (!r.ok) throw new Error(await r.text());
      } catch (e) {
        speak("呜，连不上大脑。");
        console.error("[chat]", e);
      }
    }

    window.petVoice = { toggle: voiceToggle, say: chatReply };

    // 手机版底部语音按钮:按住录音、松手发送、**上滑取消**(微信手感)。
    // 来电/手势导航打断(touchcancel)一律按取消处理,不把半截话发出去。
    // 首次触摸也顺便解锁 WebAudio(手机浏览器要用户手势才让出声/录音)。
    (function wireVoiceBtn() {
      const btn = document.getElementById("voiceBtn");
      if (!btn) return;
      const hint = btn.querySelector(".hint");
      const unlock = () => { try { audioCtx = audioCtx || new AudioContext(); audioCtx.resume(); } catch {} };
      const CANCEL_DY = 70;   // 上滑超过这个距离进入取消区
      let y0 = 0, canceling = false;
      const reset = () => { pttHolding = false; canceling = false;
        btn.classList.remove("rec", "cancel"); hint.textContent = "按 住 说 话"; };
      // voiceFinish/voiceCancel 从任何路径收尾时(看门狗/失焦/打断)都要把按钮变回蓝色——
      // 否则录音早停了,按钮还卡在红色「松手发送」上。
      window.__voiceBtnReset = reset;
      // pttHolding 必须置真——否则 app.ticker 看门狗(rec.byHold && !pttHolding)会下一帧就把录音掐掉。
      const start = (e) => { e.preventDefault(); unlock();
        y0 = e.touches ? e.touches[0].clientY : e.clientY;
        canceling = false; pttHolding = true;
        btn.classList.add("rec"); hint.textContent = "松手发送 · 上滑取消";
        try { voiceBegin(true); } catch {} };
      const move = (e) => {
        if (!pttHolding) return;
        const y = e.touches ? e.touches[0].clientY : e.clientY;
        const c = y0 - y > CANCEL_DY;
        if (c !== canceling) {
          canceling = c;
          btn.classList.toggle("cancel", c);
          hint.textContent = c ? "松 开 取 消" : "松手发送 · 上滑取消";
        }
      };
      const end = (e) => { if (e) e.preventDefault(); if (!pttHolding) return;
        const wasCancel = canceling; reset();
        try { wasCancel ? voiceCancel() : voiceFinish(); } catch {} };
      const abort = () => { if (!pttHolding) return; reset(); try { voiceCancel(); } catch {} };
      btn.addEventListener("contextmenu", (e) => e.preventDefault());   // 长按不弹系统菜单
      btn.addEventListener("touchstart", start, { passive: false });
      btn.addEventListener("touchmove", move, { passive: false });
      btn.addEventListener("touchend", end, { passive: false });
      btn.addEventListener("touchcancel", abort, { passive: false });
      btn.addEventListener("mousedown", start);
      window.addEventListener("mousemove", move);
      window.addEventListener("mouseup", end);
    })();

    // 场控角标(右上角 🎬,不抢戏):点开才见菜单——第一行是当前状态(她在哪个 client),
    // 下面按在线 client 动态生成「去某台」;她不在这页时只给一个「召回」。点完自动收起。
    const DEV_META = { mac: ["💻", "电脑"], windows: ["🪟", "Windows"], linux: ["🐧", "Linux"], phone: ["📱", "手机"] };
    const clientLabel = (c) => {
      const [ic, name] = DEV_META[c.platform || c.id] || ["🛰️", c.platform || c.id];
      return { ic, name, full: `${ic} ${name}·${c.id}` };
    };
    async function reflectLoc() {
      const menu = document.getElementById("stageMenu");
      if (!menu || DEVICE !== "phone") return;
      let data = null;
      try { data = await (await fetch("/clients")).json(); } catch { return; }
      const clients = data.clients || [];
      const here = clients.find((c) => c.present);
      // 版本自更新:pet.html 改版后,常驻页面自己 reload 拿新代码(30s 防抖防循环)。
      if (checkVer(data.v)) return;
      applySharedCfg(data.cfg);   // 形象/音色/语速追平(不阻塞位置对齐)
      // SSE 广播是尽力而为——隧道断线重连的间隙里 leave/arrive 会整条丢
      // (「去了mac手机还在」「召回了手机不出现」都是这么来的)。
      // 服务器 presence 是唯一真相,每轮轮询强制对齐:该走没走→走,该来没来→来。
      if (present && data.presence && data.presence !== CLIENT_ID) leave();
      else if (!present && data.presence === CLIENT_ID) { arrive(); return; }
      // 自愈:她挂在一个已下线的同平台 client 上(比如 WebView 刷新换了 id)——
      // 自动把她接到我这来,不用人手点召回。开机 claim 只跑一次会输给"旧连接还没断"的竞态,
      // 这里每轮轮询都补一刀,断连一超时她就自己飞回来。
      if (!here && !present && data.platform === PLATFORM) {
        try {
          const pr = await (await fetch(`/presence?claim=${encodeURIComponent(CLIENT_ID)}&platform=${encodeURIComponent(PLATFORM)}`)).json();
          if (pr && pr.client === CLIENT_ID) { arrive(); return; }
        } catch {}
      }
      const stTxt = here ? `她在 ${clientLabel(here).full}` : `她在 ${data.presence || "未知"}(离线)`;
      // 她不在这页 → 屏幕正中亮出状态卡(在哪 + 召回);在 → 收起
      const away = document.getElementById("awayCard");
      if (away) {
        away.classList.toggle("show", !present);
        document.getElementById("awayTxt").textContent =
          here ? `她此刻在 ${clientLabel(here).full}` : "信号断了,点下面接她回来";
      }
      let html = `<div class="st">${stTxt} · 我是 ${CLIENT_ID}</div>`;
      if (!present) {
        html += `<button class="primary" data-goto="${CLIENT_ID}">🪄 召回到这里</button>`;
      } else {
        for (const c of clients.filter((c) => c.id !== CLIENT_ID)) {
          const { ic, name } = clientLabel(c);
          html += `<button data-goto="${c.id}">${ic} 去${name}·${c.id}</button>`;
        }
      }
      menu.innerHTML = html;
      menu.querySelectorAll("button[data-goto]").forEach((b) => {
        b.onclick = () => { b.disabled = true; kickSync();
          fetch("/control", { method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ cmd: "goto", arg: b.dataset.goto }) }).catch(() => {});
          document.getElementById("stageCtl").classList.remove("open"); };
      });
    }
    // 共享配置(形象/音色/语速)对齐:换形象的广播也可能在隧道重连间隙丢——
    // 轮询时拿服务器的唯一真相追平,哪台落后了几秒内自动换过来。
    async function applySharedCfg(pc) {
      if (!pc) return;
      if (pc.voice && pc.voice !== cfg.voice) {
        cfg.voice = pc.voice;
        if (/_uranus_bigtts$/.test(cfg.voice)) cfg.engine = "doubao";
        else if (/^zh-CN-/.test(cfg.voice)) cfg.engine = "edge";
      }
      if (pc.rate && pc.rate !== cfg.rate) cfg.rate = pc.rate;
      if (pc.model && pc.model !== cfg.model) {
        dlog(`cfg-sync model ${cfg.model} -> ${pc.model}`);
        cfg.model = pc.model;                     // 先记下再加载:加载慢时下一轮轮询不会重复触发
        try { await loadModel(cfg.model); dlog(`cfg-sync loadModel ok`); }
        catch (e) { dlog(`cfg-sync loadModel FAIL ${e.message || e}`); }
      }
      try { localStorage.setItem("pet_config", JSON.stringify({ model: cfg.model, engine: cfg.engine, voice: cfg.voice, rate: cfg.rate, pitch: cfg.pitch })); } catch {}
    }

    // 版本自更新(手机/桌面通用):服务器把 pet.html 的 mtime 随轮询下发,
    // 页面发现自己旧了就 reload(30s 防抖防循环)。返回 true = 正在重载,调用方别再干活。
    function checkVer(v) {
      if (!v) return false;
      if (!window.__pageV) { window.__pageV = v; return false; }
      if (v === window.__pageV) return false;
      const last = +sessionStorage.getItem("sherlly.rl") || 0;
      if (Date.now() - last <= 30000) return false;
      try { sessionStorage.setItem("sherlly.rl", String(Date.now())); } catch {}
      location.reload();
      return true;
    }

    // 点了召回/去某台之后的 12s 内轮询提速到 1s 一次——广播丢了也能秒级对齐,
    // 不用干等 6s 才见她动。
    let fastUntil = 0;
    function kickSync() { fastUntil = Date.now() + 12000; }
    if (DEVICE === "phone") {
      setInterval(reflectLoc, 3000);   // 兜底轮询(主通道是 WS 毫秒级;这只是保险,3s 足够密)
      setInterval(() => { if (Date.now() < fastUntil) reflectLoc(); }, 1000);
      const ctl = document.getElementById("stageCtl");
      document.getElementById("stageToggle").onclick = () => {
        ctl.classList.toggle("open");
        if (ctl.classList.contains("open")) reflectLoc();   // 打开瞬间刷一次最新状态
      };
      // 正中状态卡上的召回:一键把她接到这个 client
      document.getElementById("awayBack").onclick = (e) => {
        e.target.disabled = true;
        setTimeout(() => { e.target.disabled = false; }, 2500);
        kickSync();
        fetch("/control", { method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ cmd: "goto", arg: CLIENT_ID }) }).catch(() => {});
      };
    } else {
      // 桌面同样以服务器为真相兜底:广播丢了/服务器重启,8s 内自动对齐(含无主过继+配置追平)
      setInterval(async () => {
        try {
          const pr = await (await fetch(`/presence?claim=${encodeURIComponent(CLIENT_ID)}&platform=${encodeURIComponent(PLATFORM)}`)).json();
          if (checkVer(pr.v)) return;   // 桌面页也要自动换血——否则旧代码常驻答题
          applySharedCfg(pr.cfg);
          if (present && pr.client && pr.client !== CLIENT_ID) leave();
          else if (!present && pr.client === CLIENT_ID) arrive();
        } catch {}
      }, 5000);
    }

    // superfly 音效：飞行段长哨声，落地闷响+弹簧，第二跳补一声小闷响
    function superflySfx() {
      audioCtx = audioCtx || new AudioContext();
      audioCtx.resume();
      const t0 = audioCtx.currentTime, out = audioCtx.destination;
      const tone = (type, freqs, gains) => {   // freqs/gains: [[t,v],...] 相对 t0
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = type;
        freqs.forEach(([t, v], i) => i ? o.frequency.exponentialRampToValueAtTime(v, t0 + t)
                                       : o.frequency.setValueAtTime(v, t0 + t));
        gains.forEach(([t, v], i) => i ? g.gain.exponentialRampToValueAtTime(v, t0 + t)
                                       : g.gain.setValueAtTime(v, t0 + t));
        o.connect(g).connect(out);
        const last = gains[gains.length - 1][0];
        o.start(t0 + freqs[0][0]); o.stop(t0 + last + 0.05);
      };
      // 螺旋接近：音高盘旋上升 + 颤音，音量由远及近渐大（对齐 SPIRAL_MS=2.4s）
      const swirl = audioCtx.createOscillator();
      swirl.type = "sine";
      const N = 80, curve = new Float32Array(N);
      for (let i = 0; i < N; i++) {
        const t = i / (N - 1);
        curve[i] = 300 * Math.pow(3.8, t) * (1 + 0.1 * Math.sin(2 * Math.PI * 5 * t * 2.4));
      }
      swirl.frequency.setValueCurveAtTime(curve, t0, 2.4);
      const sg = audioCtx.createGain();
      sg.gain.setValueAtTime(0.07, t0);
      sg.gain.exponentialRampToValueAtTime(0.5, t0 + 2.2);
      sg.gain.exponentialRampToValueAtTime(0.0001, t0 + 2.45);
      swirl.connect(sg).connect(out);
      swirl.start(t0); swirl.stop(t0 + 2.5);
      // 到位「啵」+ 轻弹簧
      tone("sine", [[2.4, 260], [2.5, 80]], [[2.4, 0.0001], [2.42, 0.7], [2.58, 0.0001]]);
      tone("triangle", [[2.4, 430], [2.48, 150], [2.58, 280], [2.78, 110]],
                       [[2.4, 0.0001], [2.43, 0.4], [2.82, 0.0001]]);
    }

    // transform 动画每帧重算（参数动画走 beforeModelUpdate，见 loadModel）
    function applyMoveTransform(now) {
      if (!model) return;
      if (!move.name) {
        model.scale.set(baseScale);
        model.position.set(basePos.x, basePos.y);
        model.rotation = 0;
        return;
      }
      const p = (now - move.t0) / move.dur;
      if (p >= 1) {                       // 结束 → 复位
        move.name = null;
        model.scale.set(baseScale);
        model.position.set(basePos.x, basePos.y);
        model.rotation = 0;
        bus.postMessage({ type: "moveState", name: null });
        return;
      }
      const tf = MOVES[move.name].tf ? MOVES[move.name].tf(p) : {};
      const sx = tf.sx !== undefined ? tf.sx : 1;
      model.scale.x = baseScale * sx * (tf.sxAbs ?? 1);
      model.scale.y = baseScale * (tf.sy ?? 1);
      model.position.set(basePos.x + (tf.dx ?? 0), basePos.y + (tf.dy ?? 0));
      model.rotation = tf.rot ?? 0;
    }

    app.ticker.add(() => applyMoveTransform(performance.now()));

    // 编舞：一小节两拍左右摇 + 上下点头，头和身体反相（这样才像在扭，而不是整体平移）
    function choreograph(now) {
      const beat = ((now - dance.t0) / 1000) * (dance.bpm / 60);
      const sway = Math.sin(Math.PI * beat);          // 一拍一次左右
      const bob = Math.sin(2 * Math.PI * beat);       // 一拍两次上下

      put("bodyX", 0.75 * sway);
      put("bodyZ", 0.55 * sway);
      put("bodyY", 0.30 * Math.abs(bob));
      put("headZ", -0.50 * sway);                     // 反相 → 脖子有「甩」的感觉
      put("headX", 0.40 * sway);
      put("headY", 0.25 * Math.abs(bob) - 0.10);
      put("eyeX", 0.60 * sway);
      put("hair", 0.60 * sway);
      put("armL", 0.55 * Math.sin(Math.PI * beat + 0.7));
      put("armR", -0.55 * Math.sin(Math.PI * beat + 0.7));
      put("earL", 0.7 * bob);
      put("earR", -0.7 * bob);
    }

    // 加载是异步的（中间有 await），必须防并发。快速连点两个角色时会这样翻车：
    //   点 A → 销毁旧模型、model=null、await from(A)
    //   点 B → 此时 model 已是 null，没东西可销毁 → await from(B)
    //   B 先回来 → addChild(B)，model=B
    //   A 后回来 → addChild(A)，model=A   ← B 还在台上！两个模型重合，
    //                                       而且 model 只指向 A，B 永远清不掉。
    // 解法：发号（loadSeq）。await 回来后发现号过期了，就把刚加载好的那个直接销毁。
    // 另外舞台用 removeChildren() 硬清，不依赖 model 变量 —— 竞态下它可能已经指不到
    // 台上那个了。
    let loadSeq = 0;

    async function loadModel(url) {
      const seq = ++loadSeq;
      stopSpeaking();
      setDance(false);
      move.name = null;

      if (model) {
        model.destroy({ children: true });
        model = null;
      }
      app.stage.removeChildren();     // 兜底：不管 model 指向谁，台上一律清空
      slots = {};

      const loaded = await PIXI.live2d.Live2DModel.from(url);

      if (seq !== loadSeq) {          // 被后来的切换超车了 → 这个已经没人要了
        loaded.destroy({ children: true });
        return;
      }

      model = loaded;
      window.__model = model;       // 漫游用:arrive/leave 切换可见性
      model.visible = present;      // 开局若 ?away 则先藏着,等召唤飞入
      app.stage.addChild(model);
      model.anchor.set(0.5, 0.5);
      fit();

      // 点击身体触发动作、点头切表情
      model.on("hit", (areas) => {
        dlog("hit " + areas.join(","));
        tapAct(areas.some((a) => a.toLowerCase().includes("head")));
      });

      const core = model.internalModel.coreModel;
      resolveParams(core);
      reportCaps();   // 换了模型 → 把新的表情/动作能力报给设置页（情绪系统据此重配）

      // 口型参数因模型而异：优先用模型 model3.json 里自己声明的 LipSync 组
      // （Mao 是 ParamA，Hiyori 是 ParamMouthOpenY）——写死一个名字就会有模型不动嘴。
      let lipIds = ["ParamMouthOpenY"];
      try {
        const st = model.internalModel.settings;
        const groups = (st && (st.groups || (st.json && st.json.Groups))) || [];
        const lg = groups.find((x) => (x.Name || x.name) === "LipSync");
        const ids = lg && (lg.Ids || lg.ids);
        if (ids && ids.length) lipIds = ids;
      } catch {}

      // 手动参数写在管线最末，压过动作和物理。挂 afterMotionUpdate 是不行的：动作
      // 之后还有 eyeBlink / focus / breath / physics / pose 会继续写参数，把我们
