      // 写的值冲掉。顺序：先舞蹈（管身体），再口型（管嘴）—— 嘴归说话独占。
      model.internalModel.on("beforeModelUpdate", () => {
        if (!model) return;

        if (dance.on) choreograph(performance.now());

        // 动作的参数部分（transform 部分在 app.ticker 里）。放在舞蹈之后 → 动作期间
        // 由动作说了算，跳完自动交还给舞蹈。
        if (move.name) {
          const p = (performance.now() - move.t0) / move.dur;
          if (p < 1 && MOVES[move.name].param) MOVES[move.name].param(p, put);
        }

        if (lip.active) {
          const raw = core._model && core._model.parameters;
          if (raw) {
            for (const id of lipIds) {
              const i = Array.prototype.indexOf.call(raw.ids, id);
              if (i >= 0) {
                const v = raw.minimumValues[i] + (raw.maximumValues[i] - raw.minimumValues[i]) * lip.value;
                core.setParameterValueByIndex(i, v);
              }
            }
          } else if (typeof core.setParamFloat === "function") {
            for (const id of lipIds) core.setParamFloat(id, lip.value);
          }
        }
      });
    }

    window.addEventListener("resize", fit);

    // 首次加载可能撞上时序竞态（依赖脚本/字体/首帧未就绪）——失败自动重试，
    // 不然 .then 吞掉错误就永远空场（「形象出不来」）。
    (async function bootModel() {
      // 她是一个角色:同一形象、同一声音、同一时刻只在一台。加载前先问服务器唯一真相——
      // 用共享的形象/音色(全设备一致),并按「她此刻在哪台」决定本机显示还是藏起来。
      try {
        // ?claim=:如果她"在"的那个 client 已下线且平台和我相同,服务器把她过继给我——
        // 否则桌面 App 一重启(新 client id)她就查无此人,永远不现身。
        const [pc, pr] = await Promise.all([
          fetch("/petcfg").then((r) => r.json()).catch(() => ({})),
          fetch(`/presence?claim=${encodeURIComponent(CLIENT_ID)}&platform=${encodeURIComponent(PLATFORM)}`)
            .then((r) => r.json()).catch(() => ({})),
        ]);
        if (pc && pc.model) cfg.model = pc.model;
        if (pc && pc.voice) { cfg.voice = pc.voice; if (/_uranus_bigtts$/.test(cfg.voice)) cfg.engine = "doubao"; else if (/^zh-CN-/.test(cfg.voice)) cfg.engine = "edge"; }
        if (pc && pc.rate) cfg.rate = pc.rate;
        if (pr && pr.client) present = (pr.client === CLIENT_ID);   // 不在这个 client 就先藏着,等被 goto 召唤
      } catch {}
      for (let attempt = 1; attempt <= 4; attempt++) {
        try {
          await loadModel(cfg.model);
          if (model) break;
        } catch (e) { console.error("[boot] loadModel try", attempt, e); }
        await new Promise((r) => setTimeout(r, 400 * attempt));
      }
      if (!model) { console.error("[boot] 模型多次加载失败"); return; }
      bus.postMessage({ type: "ready" });
      // 手机:收起 loading(她不在也收,顶部位置条随时能召回);桌面:啥都不做,保持原样。
      if (DEVICE === "phone") {
        const ld = document.getElementById("loading");
        if (ld) setTimeout(() => ld.classList.add("hidden"), present ? 200 : 900);
        reflectLoc();
      }
      if (present && params.get("entrance")) setTimeout(() => windowFlight(), 500);   // 只有她在这台才入场
      if (present && params.get("say")) setTimeout(() => speak(params.get("say")), 800);   // 自测口型:?say=文字
      window.__lipPeek = () => ({ active: lip.active, value: +lip.value.toFixed(3) });
    })();

    // 设置页发来的指令
    bus.addEventListener("message", async (e) => {
      const m = e.data || {};
      if (m.type === "config") {
        const next = m.cfg || {};
        cfg.engine = next.engine ?? cfg.engine;
        cfg.voice = next.voice ?? cfg.voice;
        if (next.model && next.model !== cfg.model) {
          cfg.model = next.model;
          await loadModel(cfg.model);   // 换角色，实时
        }
      } else if (m.type === "speak") {
        speak(m.text);
      } else if (m.type === "stop") {
        stopSpeaking();
      } else if (m.type === "motion") {
        randomMotion();
      } else if (m.type === "expression") {
        model?.expression();
      } else if (m.type === "dance") {
        setDance(m.on, m.bpm);
      } else if (m.type === "move") {
        playMove(m.name);
      } else if (m.type === "listMoves") {
        bus.postMessage({
          type: "moves",
          list: Object.entries(MOVES).map(([k, v]) => ({ id: k, label: v.label })),
        });
        reportCaps();   // 设置页问动作时，顺带把表情/动作能力也补报一次
      } else if (m.type === "effect") {
        // 设置页「拍摄特效」按钮（和全局快捷键 Alt+R/M/X 走同一套逻辑）
        const say = (text) => bus.postMessage({ type: "scriptState", text });
        if (m.name === "flyin") windowFlight();
        else if (m.name === "fling") flingOut(2300, -450);
        else if (m.name === "hide") window.petScript.reset().then(() => say("已藏好，等入场（▶ 或 Alt+M）"));
        else if (m.name === "reset") window.petScript.reset().then(() => say("剧本已重来，已藏好"));
        else if (m.name === "next") window.petScript.next().then((r) => {
          say(r === "end" ? "剧本演完了（↩ 重来）" : r === "back" ? "叫回来了" : "台词 " + r);
        });
      }
    });

    // ---------- 接 Live2DPet 的「大脑」 ----------
    // 大脑跑在设置窗口里，通过主进程 IPC 把结果推过来。我们的宠物窗口挂着人家的
    // preload，所以这些回调白拿 —— 气泡、表情、动作、情绪全是它们原来就有的能力。
    if (api) {
      api.onShowChatMessage?.((text) => { if (text) bubble(text, true); });
      api.onChatBubbleMessage?.((text) => { if (text) bubble(text, true); });
      // 情绪系统选中的表情/动作，经主进程 triggerExpression / triggerMotion 推来
      api.onPlayExpression?.((name) => { try { model?.expression(name); } catch {} });
      api.onRevertExpression?.(() => revertExpr());
      api.onPlayMotion?.((group, index) => {
        // group 可能是「我们自编的动作」(spin/jump…)，也可能是模型自带的动作组
        try {
          if (MOVES[group]) playMove(group);
          else model?.motion(group, index || 0);
        } catch {}
      });
      api.onTalkingStateChanged?.((talking) => { if (!talking) bubble("", false); });

      // 情绪值：鼠标悬停时半速加成（原作者的设定）。互动也上报给大脑做上下文。
      window.addEventListener("pointerenter", () => api.reportHoverState?.(true));
      window.addEventListener("pointerleave", () => api.reportHoverState?.(false));
    }

    // 点身体 = 一次互动，报给大脑（它会在 prompt 里说「你刚才戳了我 N 次」）
    window.addEventListener("mousedown", (e) => {
      if (e.button === 0) api?.reportHit?.({ type: "click", area: "body" });
    });

    // 把当前模型「能做什么表情、有哪些动作」报给设置页 —— 情绪系统要靠这个才知道
    // 该让 AI 从哪些情绪里挑。每个模型不一样（Haru 有 8 个表情，Hiyori 一个没有，
    // 只能拿动作凑），所以每次换模型都要重报。
    function reportCaps() {
      if (!model) return;
      let expressions = [], motions = {};
      try {
        const s = model.internalModel.settings || {};
        // Cubism 4：settings.expressions = [{Name, File}]；Cubism 2 一般没有
        const exps = s.expressions || s.Expressions || [];
        expressions = exps.map((e) => e.Name || e.name).filter(Boolean);
        // 动作组：{group: [..]}，我们只需要组名和条数
        const mm = model.internalModel.motionManager;
        const defs = mm?.definitions || s.motions || s.Motions || {};
        for (const g of Object.keys(defs)) motions[g] = (defs[g] || []).length || 1;
      } catch {}
      // 再把我们自编的动作库（转圈/跳/挥手…）也作为「动作情绪」提供 —— 这样即使模型
      // 没有任何表情，AI 也能靠动作把情绪演出来。
      const custom = Object.entries(MOVES).map(([id, v]) => ({ id, label: v.label }));
      bus.postMessage({ type: "caps", model: cfg.model, expressions, motions, custom });
    }

    function revertExpr() {
      try {
        const em = model?.internalModel?.motionManager?.expressionManager;
        if (em?.resetExpression) em.resetExpression();
      } catch {}
    }

    function setDance(on, bpm) {
      if (bpm) dance.bpm = bpm;
      if (on && !dance.on) dance.t0 = performance.now();
      dance.on = !!on;
      // 停下来时把身体归位，不然会僵在最后一个姿势上
      if (!on && model) {
        for (const s of Object.values(slots)) s.set(s.def);
      }
      bus.postMessage({ type: "danceState", on: dance.on, bpm: dance.bpm, roles: Object.keys(slots) });
    }

    function fit() {
      if (!model) return;
      if (DEVICE === "phone") {
        // 手机:人要站在语音条上沿一点点——以语音键顶边为"地面",模型贴地放,
        // 高度撑满地面以上的空间(横向透明边出血没关系,按宽度算她太小气)。
        const vb = document.getElementById("voiceBtn");
        const floor = (vb && getComputedStyle(vb).display !== "none")
          ? vb.getBoundingClientRect().top - 10 : window.innerHeight * 0.92;
        baseScale = (floor / model.internalModel.height) * 0.98;
        basePos = { x: window.innerWidth / 2, y: floor - (model.internalModel.height * baseScale) / 2 };
      } else {
        // 桌面:留 12% 余量——转圈/跳跃会把模型甩出去一点,贴边会被窗口裁掉
        baseScale = Math.min(window.innerWidth / model.internalModel.width,
                             window.innerHeight / model.internalModel.height) * 0.88;
        basePos = { x: window.innerWidth / 2, y: window.innerHeight / 2 + 10 };
      }
      model.scale.set(baseScale);
      model.position.set(basePos.x, basePos.y);
    }

    // 点按 → 她自带的反应。直接绑定,不依赖 pixi 的 hit 插件(那条链路在真机上时灵时不灵)。
    // tapAct 做统一出口 + 500ms 去重(pixi hit 偶尔也会到,别双触发)。
    let lastTapAct = 0;
    function tapAct(isHead) {
      const now = performance.now();
      if (now - lastTapAct < 500) return;
      lastTapAct = now;
      let exprN = 0;
      try { exprN = (model.internalModel.settings.expressions || []).length; } catch {}
      // 点头=换表情(模型真有表情才换,没有就播动作);点身体=她自带的 TapBody 动作
      if (isHead && exprN) model.expression();
      else randomMotion();
    }
    (function wireTap() {
      let t0 = 0, x0 = 0, y0 = 0;
      const pt = (e) => (e.touches && e.touches[0]) || (e.changedTouches && e.changedTouches[0]) || e;
      window.addEventListener("pointerdown", (e) => { const p = pt(e); t0 = performance.now(); x0 = p.clientX; y0 = p.clientY; }, true);
      window.addEventListener("pointerup", (e) => {
        const p = pt(e);
        if (performance.now() - t0 > 400) return;                       // 按太久=长按/拖,不算点
        if (Math.hypot(p.clientX - x0, p.clientY - y0) > 12) return;    // 移动了=拖动,不算点
        if (!present || !model || !model.visible) return;               // 她不在,点空气
        if (e.target && /BUTTON|INPUT|A/.test(e.target.tagName)) return; // 点的是按钮不是她
        const b = model.getBounds();
        if (p.clientX < b.x || p.clientX > b.x + b.width || p.clientY < b.y || p.clientY > b.y + b.height) return;
        const isHead = p.clientY < b.y + b.height * 0.3;                // 上 30% 当头
        dlog("tap " + (isHead ? "head" : "body"));
        tapAct(isHead);
      }, true);
    })();

    function randomMotion() {
      const mm = model.internalModel.motionManager;
      const groups = Object.keys(mm.definitions || {});
      if (!groups.length) return;
      const tap = groups.find((g) => /tap|body/i.test(g)) || groups[0];
      model.motion(tap);
    }

    // ---------- 拖动整个窗口 ----------
    // 窗口是 frameless 的，没有标题栏可拖。用 Live2DPet preload 暴露的
    // getCursorPosition / getWindowBounds / setWindowPosition 自己实现：
    // 按下时记住「光标 - 窗口左上角」的偏移，移动时保持这个偏移。
    // 「按住角色说话」已拆除(2026-07-19):说话统一走手机语音条,角色不再是话筒——
    // 按下只区分:动了 >8px = 拖动(可甩飞);快速点一下 = 普通点按(动作/表情)。
    let dragging = false, offX = 0, offY = 0;
    let trail = [];   // 拖动轨迹（判定「甩出去」用的速度采样）
    let pressArmed = false, pressX = 0, pressY = 0, pressT0 = 0, pttHolding = false;

    window.addEventListener("pointerdown", async (e) => {
      if (e.button !== 0 || !api) return;
      // 指针捕获：松手发生在窗口外也能收到 pointerup
      try { document.body.setPointerCapture(e.pointerId); } catch {}
      pressT0 = performance.now();
      pressArmed = true;
      const [cur, b] = await Promise.all([api.getCursorPosition(), api.getWindowBounds()]);
      offX = cur.x - b.x;
      offY = cur.y - b.y;
      pressX = cur.x; pressY = cur.y;
      trail = [];
    });

    // allowFling=false 用于兜底路径（失焦等）——只收尾，不触发甩飞
    function endPress(allowFling) {
      pressArmed = false;
      const wasDragging = dragging;
      dragging = false;
      if (allowFling && wasDragging) {
        // 甩出判定：取最近 ~120ms 的轨迹算速度，够快就顺着方向飞出屏幕
        const now = performance.now();
        const seg = trail.filter((s) => now - s.t < 120);
        if (seg.length >= 2) {
          const a = seg[0], z = seg[seg.length - 1], dt = (z.t - a.t) / 1000;
          if (dt > 0) {
            const vx = (z.x - a.x) / dt, vy = (z.y - a.y) / dt;
            if (Math.hypot(vx, vy) > 1300) flingOut(vx, vy);
          }
        }
      }
      trail = [];
    }

    window.addEventListener("pointerup", (e) => {
      try { document.body.releasePointerCapture(e.pointerId); } catch {}
      endPress(true);
    });
    window.addEventListener("pointercancel", () => endPress(false));
    // 双保险：光标回到窗口上但左键已松（捕获失效的场景）/ 窗口失焦
    window.addEventListener("pointermove", (e) => {
      if ((pttHolding || pressArmed || dragging) && (e.buttons & 1) === 0) endPress(false);
    });
    window.addEventListener("blur", () => endPress(false));

    // 用 rAF 拉，而不是监听 mousemove —— 鼠标一旦跑出窗口（拖快了就会），
    // 渲染进程就收不到 mousemove 了，窗口会「掉队」。轮询光标位置没这个问题。
    (function pump() {
      if ((dragging || pressArmed) && api) {
        api.getCursorPosition().then((cur) => {
          if (pressArmed && Math.hypot(cur.x - pressX, cur.y - pressY) > 8) {
            pressArmed = false;          // 动了 → 是拖动
            dragging = true;
          }
          if (!dragging) return;
          api.setWindowPosition(Math.round(cur.x - offX), Math.round(cur.y - offY));
          trail.push({ t: performance.now(), x: cur.x, y: cur.y });
          if (trail.length > 12) trail.shift();
        });
      }
      requestAnimationFrame(pump);
    })();

    // 甩出屏幕：惯性延续松手时的速度，Mao 边惨叫边翻滚着飞出去。
    // 想叫回来按 Option+M（下一次会走螺旋入场，不消耗剧本台词）。
    let maoGone = false;
    async function flingOut(vx, vy) {
      if (!api) return;
      const b = await api.getWindowBounds();
      const sw = (window.screen && window.screen.width) || 1680;
      const sh = (window.screen && window.screen.height) || 1050;
      const speed = Math.hypot(vx, vy), k = Math.min(2.2, Math.max(1, 2000 / speed));
      vx *= k; vy *= k;                         // 保底出场速度，甩轻了也送到底
      maoGone = true;   // 一开甩就立标记——飞行途中按「叫回」也要能生效
      playMove("tumble");
      // 消失音效已按用户要求移除（原有「哇啊啊」尖叫 + flingSfx 啪的一声）
      let x = b.x, y = b.y;
      const t0 = performance.now(); let last = t0;
      await new Promise((done) => {
        (function step() {
          const now = performance.now(), dt = (now - last) / 1000; last = now;
          x += vx * dt; y += vy * dt;
          api.setWindowPosition(Math.round(x), Math.round(y));
          const out = x > sw + 30 || x + b.width < -30 || y > sh + 30 || y + b.height < -30;
          if (out || now - t0 > 1200) { done(); return; }
          requestAnimationFrame(step);
        })();
      });
    }

    // 甩飞时的呼啸声：短促的噪声嗖 + 音高快速下坠的「哇」
    function flingSfx() {
      audioCtx = audioCtx || new AudioContext();
      audioCtx.resume();
      const t0 = audioCtx.currentTime, out = audioCtx.destination;
      const len = Math.floor(audioCtx.sampleRate * 0.5);
      const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
      const noise = audioCtx.createBufferSource();
      noise.buffer = buf;
      const bp = audioCtx.createBiquadFilter();
      bp.type = "bandpass"; bp.Q.value = 1;
      bp.frequency.setValueAtTime(2400, t0);
      bp.frequency.exponentialRampToValueAtTime(500, t0 + 0.5);
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.55, t0);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.5);
      noise.connect(bp).connect(g).connect(out);
      noise.start(t0); noise.stop(t0 + 0.55);
    }

    // 右键菜单交给宿主（退出/设置都在里面）
    window.addEventListener("contextmenu", (e) => {
      e.preventDefault();
      api?.showPetContextMenu?.();
    });

    // ---------- 说话 ----------（状态在文件开头声明，见那里的注释）

    // 读音订正表：文字照原样写，送 TTS 前替换成正确读音。
    // 角色名 Sherlly,中文雪莉——TTS 碰到英文拼写会念成字母,统一替换成「雪莉」。
    const PRONOUNCE = [[/Sherlly/gi, "雪莉"], [/CiCy/gi, "雪莉"]];

    // 流式播放：豆包 PCM 边收边排队播（首字快，无需等整句合成）。
    // 用一条运行光标 gaplessly 把小块接起来；口型由共享 analyser 实时驱动。
    // streamStop 已提到文件顶部的早期声明块（loadModel 会先用到）
    async function speakStream(text, fx) {
      const spoken = PRONOUNCE.reduce((t, [re, to]) => t.replace(re, to), text);
      const rate = fx === "whisper" ? "-12%" : (cfg.rate || "");   // 耳语：放慢，凑近说
      const url = `/tts-stream?text=${encodeURIComponent(spoken)}`
        + `&voice=${encodeURIComponent(cfg.voice)}&rate=${encodeURIComponent(rate)}`;
      const ctrl = new AbortController();
      let stopped = false;
      const sources = [];
      const gain = audioCtx.createGain();
      const analyser = audioCtx.createAnalyser();
      analyser.fftSize = 512;
      gain.connect(analyser); analyser.connect(audioCtx.destination);
      if (fx === "whisper") {
        // 太空回声：一条 0.26s 反馈延迟当湿声，音量整体收小——像贴着天窗玻璃说的悄悄话
        gain.gain.value = 0.8;
        const dly = audioCtx.createDelay(1.0); dly.delayTime.value = 0.26;
        const fb = audioCtx.createGain(); fb.gain.value = 0.42;
        const wet = audioCtx.createGain(); wet.gain.value = 0.38;
        analyser.connect(dly); dly.connect(fb); fb.connect(dly);
        dly.connect(wet); wet.connect(audioCtx.destination);
      }
      streamStop = () => {
        stopped = true; ctrl.abort();
        for (const s of sources) { try { s.stop(); } catch {} }
        lip.active = false; lip.value = 0;
        try { bgmDuck(false); } catch {}
      };
      const SR = 24000;
      let cursor = audioCtx.currentTime + 0.08;   // 起播缓冲，避免第一块欠载
      let leftover = new Uint8Array(0);
      const schedulePCM = (bytes) => {
        // 拼上一块的余数，取偶数字节（Int16 对齐）
        const merged = new Uint8Array(leftover.length + bytes.length);
        merged.set(leftover); merged.set(bytes, leftover.length);
        const usable = merged.length - (merged.length % 2);
        leftover = merged.slice(usable);
        if (usable < 2) return;
        const n = usable / 2;
        const i16 = new Int16Array(merged.buffer, 0, n);
        const buf = audioCtx.createBuffer(1, n, SR);
        const f32 = buf.getChannelData(0);
        for (let i = 0; i < n; i++) f32[i] = i16[i] / 32768;
        const s = audioCtx.createBufferSource();
        s.buffer = buf; s.connect(gain);
        const at = Math.max(cursor, audioCtx.currentTime);
        s.start(at); cursor = at + buf.duration;
        sources.push(s);
      };
      lip.active = true;
      try { bgmDuck(true); } catch {}
      bubble(text, true);
      const buf = new Uint8Array(analyser.fftSize);
      const tick = () => {
        if (stopped) return;
        analyser.getByteTimeDomainData(buf);
        let sum = 0;
        for (let i = 0; i < buf.length; i++) { const v = (buf[i] - 128) / 128; sum += v * v; }
        const rms = Math.sqrt(sum / buf.length);
        lip.value += (Math.min(1, rms * 3.2) - lip.value) * 0.5;
        rafId = requestAnimationFrame(tick);
      };
      tick();
      const reqAt = performance.now();
      try {
        const res = await fetch(url, { signal: ctrl.signal });
        if (!res.ok) throw new Error(await res.text());
        const reader = res.body.getReader();
        for (;;) {
          const { done, value } = await reader.read();
          if (done || stopped) break;
          schedulePCM(value);
        }
        bus.postMessage({ type: "spoke", ok: true, cache: "stream", ms: Math.round(performance.now() - reqAt) });
      } catch (e) {
        if (!stopped) bus.postMessage({ type: "spoke", ok: false, error: String(e.message || e) });
      }
      // 播完（光标时间到）收口型；等到真正播完才返回——剧本对手戏靠这个对拍子
      const endAt = Math.max(0, (cursor - audioCtx.currentTime) * 1000) + (fx === "whisper" ? 900 : 120);
      await new Promise((r) => setTimeout(r, endAt));
      if (!stopped) {
        if (streamStop) { streamStop = null; }
        lip.active = false; lip.value = 0; bubble("", false);
        try { bgmDuck(false); } catch {}
      }
    }

    async function speak(text, fx) {
      stopSpeaking();
      if (!text || !text.trim()) return;
      // 她是一个角色一种声音:只有她"在"的设备开口。不在场的页面无论谁调 speak
      // (本地按钮/漏网广播/旧代码路径)都一律静音——扬声器跟人走。
      if (!present) return;

      audioCtx = audioCtx || new AudioContext();
      await audioCtx.resume();

      if (cfg.engine === "doubao") return speakStream(text, fx);   // 豆包走流式

      const spoken = PRONOUNCE.reduce((t, [re, to]) => t.replace(re, to), text);
      const reqAt = performance.now();
      let buffer, cache = "miss";
      try {
        const url = `/tts?text=${encodeURIComponent(spoken)}`
          + `&engine=${encodeURIComponent(cfg.engine)}`
          + `&voice=${encodeURIComponent(cfg.voice)}`
          + `&rate=${encodeURIComponent(cfg.rate || "")}`
          + `&pitch=${encodeURIComponent(cfg.pitch || "")}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(await res.text() || res.status);
        cache = res.headers.get("X-TTS-Cache") || "miss";
        buffer = await audioCtx.decodeAudioData(await res.arrayBuffer());
      } catch (e) {
        bus.postMessage({ type: "spoke", ok: false, error: String(e.message || e) });
        return;
      }
      bus.postMessage({ type: "spoke", ok: true, cache, ms: Math.round(performance.now() - reqAt) });

      const env = envelope(buffer);
      srcNode = audioCtx.createBufferSource();
      srcNode.buffer = buffer;
      srcNode.connect(audioCtx.destination);
      srcNode.onended = stopSpeaking;

      const t0 = audioCtx.currentTime;
      srcNode.start();
      lip.active = true;
      bubble(text, true);

      const tick = () => {
        const i = Math.floor((audioCtx.currentTime - t0) / HOP);
        const target = i >= 0 && i < env.length ? env[i] : 0;
        lip.value += (target - lip.value) * 0.5;
        rafId = requestAnimationFrame(tick);
      };
      tick();
    }

    function envelope(buf) {
      const d = buf.getChannelData(0);
      const step = Math.max(1, Math.floor(buf.sampleRate * HOP));
      const env = [];
      for (let i = 0; i < d.length; i += step) {
        let s = 0;
        const end = Math.min(i + step, d.length);
        for (let j = i; j < end; j++) s += d[j] * d[j];
        env.push(Math.sqrt(s / (end - i)));
      }
      const peak = Math.max(...env) || 1;
      return env.map((v) => Math.min(1, (v / peak) * 1.4));
    }

    function stopSpeaking() {
      cancelAnimationFrame(rafId);
      if (streamStop) { streamStop(); streamStop = null; }   // 中止流式播放
      if (srcNode) {
        srcNode.onended = null;
        try { srcNode.stop(); } catch {}
        try { srcNode.disconnect(); } catch {}
        srcNode = null;
      }
      lip.active = false;
      lip.value = 0;
      bubble("", false);
    }

    // 气泡优先走宿主的独立气泡窗口（Live2DPet 原作者做的 pet-chat-bubble.html）——
    // 它是一个单独的透明窗口，浮在宠物上方，**不会被宠物窗口 340x420 的边界裁掉**。
    // 我们自己画在窗口里的那个气泡，长句子会被切。没有 preload 时（纯浏览器）才回落。
    function bubble(text, on) {
      if (api?.showPetChat) {
        if (on && text) api.showPetChat(text, 8000);
        else api.closeChatBubble?.();
        return;
      }
      const b = $("bubble");
      if (on) {
        // 用户手动往回翻时不打扰;否则跟着她说的进度自动滚到底
        const follow = b.scrollHeight - b.scrollTop - b.clientHeight < 40;
        b.textContent = text;
        if (follow) b.scrollTop = b.scrollHeight;
      }
      b.classList.toggle("on", !!on);
    }

    // 外部驱动用：pet.speak("…") / pet.motion()
    window.pet = { speak, motion: () => randomMotion(), stop: stopSpeaking, flyIn: () => windowFlight(),
                   flingOut: () => flingOut(2300, -450), chirp: () => dataChirp(), get model() { return model; } };

    // ---------- 遥控执行器（手机 remote/config → /control → 这里执行）----------
    // 无论桌面还是手机上打开的 pet.html 都挂载：说话/换装/跳舞/口型都在“看着她的
    // 那台设备”上就地发生（手机上就手机放声+手机对口型）。只有“飞出屏幕/片头全屏”这
    // 类真窗口控制才需要桌面宿主(api),没有就静默跳过——手机端天然降级。
    {
      // SSE 自愈:隧道里的长连接会"僵而不死"(server 觉得在,页面收不到)。服务器每 20s
      // 发一条心跳事件;45s 没收到任何消息 = 僵死,自己重建连接;重建/回到前台立即全量对齐。
      // 这样配置/位置变更平时走 SSE **秒级到达**,轮询只是最后兜底。
      let es = null, esLast = 0;
      // 控制通道走 WebSocket(不是 SSE):hub 代理会缓冲 SSE,手机上永远打不开;
      // WS 穿隧道已被 /asr 验证——广播毫秒到,这才是"秒同步"的正体。
      const CTL_QS = "client=" + encodeURIComponent(CLIENT_ID) + "&platform=" + encodeURIComponent(PLATFORM);
      function connectSSE() {
        try { es && es.close(); } catch {}
        const proto = location.protocol === "https:" ? "wss" : "ws";
        const w = new WebSocket(`${proto}://${location.host}/control-ws?${CTL_QS}`);
        es = w;
        esLast = Date.now();
        w.onopen = () => { esLast = Date.now(); dlog("ws open"); if (DEVICE === "phone" && typeof reflectLoc === "function") reflectLoc(); };
        w.onmessage = (ev) => { esLast = Date.now(); handleCtl(ev); };
        w.onclose = () => { setTimeout(() => { if (es === w) connectSSE(); }, 2000); };   // 断线 2s 内重连
      }
      setInterval(() => { if (Date.now() - esLast > 45000) connectSSE(); }, 10000);
      document.addEventListener("visibilitychange", () => {
        if (document.hidden) return;
        if (Date.now() - esLast > 25000) connectSSE();          // 后台被冻过 → 立刻换新连接
        if (DEVICE === "phone" && typeof reflectLoc === "function") reflectLoc();   // 回前台马上对齐
      });
      const handleCtl = async (ev) => {
        let m = {};
        try { m = JSON.parse(ev.data); } catch { return; }
        if (m.cmd === "ka") return;   // 心跳,只为证明连接活着
        const arg = m.arg;
        try {
          // —— 漫游接力:服务器把 goto 拆成 leave→(等飞走)→arrive 两段广播,只对目标设备生效 ——
          if (m.cmd === "leave")  { if (String(arg) === CLIENT_ID) leave();  return; }
          if (m.cmd === "arrive") { if (String(arg) === CLIENT_ID) arrive(); return; }
          // 她不在这台时,只听 goto/换装/持久化指令;发声/演出类忽略(在别的设备上)
          const localAct = ["notebook","dance","stopdance","sing","stopsing","spin","stop","say","ask","testvoice",
                            "titlecard","demo","next","reset","fling","comeback"].includes(m.cmd);
          if (localAct && !present) return;

          switch (m.cmd) {
            // —— 需要桌面真窗口控制,手机上没有 api 就跳过 ——
            case "titlecard": api?.playTitleCard?.(); break;                     // 片头→坠机 一镜到底
            case "demo":      if (api) window.petScript.demo(); break;
            case "next":      if (api) window.petScript.next(); break;
            case "reset":     if (api) window.petScript.reset(); break;
            case "fling":     flingOut(2300, -450); break;                       // 画布内也能演,保留
            case "comeback":  maoGone = false; windowFlight("哼！刚才是谁把人家甩出去的！", landingSpot()); break;
            // —— 设备无关:手机/桌面都就地执行 ——
            case "notebook":  window.petNotebook.tell(); break;
            case "dance":     startMusic(PARTY_BPM); setDance(true, PARTY_BPM); break;
            case "stopdance": setDance(false); stopMusic(); break;
            case "sing":      singShow(); break;
            case "stopsing":  stopSing(); break;
            case "spin":      playMove("spin"); break;
            case "stop":      sayQ.length = 0; stopSing(); stopSpeaking(); break;
            case "say":       if (arg) enqueueSay(String(arg)); break;
            case "ask":       if (arg) chatReply(String(arg)); break;
            case "model":     if (arg && arg !== cfg.model) { dlog(`sse model -> ${arg}`); cfg.model = String(arg); persistCfg(); try { await loadModel(cfg.model); dlog("sse loadModel ok"); } catch (e) { dlog(`sse loadModel FAIL ${e.message || e}`); throw e; } } break;
            case "voice":     if (arg) { cfg.voice = String(arg); if (/_uranus_bigtts$/.test(cfg.voice)) cfg.engine = "doubao"; else if (/^zh-CN-/.test(cfg.voice)) cfg.engine = "edge"; persistCfg(); } break;
            case "rate":      if (arg != null) { cfg.rate = String(arg); persistCfg(); } break;
            case "testvoice": speak(arg ? String(arg) : "你好呀守门人，我是雪莉，这是我现在的声音～"); break;
            case "reload":    location.reload(); break;   // 远程让所有在线页面换血(发版后一键刷)
          }
        } catch (e) { console.warn("[control]", m.cmd, e); }
      };
      connectSSE();
    }

    // 配置持久化:写回 localStorage(pet.html 下次启动读它);桌面宿主再落盘 config.json;
    // 并上报给 server,让手机配置页能回显"当前用的形象/音色"。
    function persistCfg() {
      try { localStorage.setItem("pet_config", JSON.stringify({ model: cfg.model, engine: cfg.engine, voice: cfg.voice, rate: cfg.rate, pitch: cfg.pitch })); } catch {}
      try { api?.saveConfig && api.saveConfig({ modelName: cfg.model, engine: cfg.engine, voice: cfg.voice, rate: cfg.rate, pitch: cfg.pitch }); } catch {}
      reportCfg();
    }
    function reportCfg() {
      try { fetch("/petcfg", { method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: cfg.model, voice: cfg.voice, rate: cfg.rate, engine: cfg.engine }) }); } catch {}
    }
    // 不在启动时上报——服务器的 petCfg 已是持久化的唯一真相,启动只该「读」它,不该用本机
    // (可能过时的)配置去覆盖。只有用户在本机真的改了配置(persistCfg)才上报。

    // ========== 小本本（喜好知识库手账） ==========
    // 数据是真的：/memories 直读大脑（Sherlly）的持久记忆目录——recognizer 每轮自动往里记。
    // 展示由独立大开本窗口 notebook.html 负责（主进程 toggle-notebook）；这里只管配音：
    // 翻纸声 + 念最重要的一条。手机遥控发 notebook → 桌面这边翻本本并念。
    function nbPaperSfx() {   // 翻纸沙沙声：短促高通噪声两下
      audioCtx = audioCtx || new AudioContext(); audioCtx.resume();
      const t0 = audioCtx.currentTime, out = audioCtx.destination;
      [0, 0.12].forEach((dt) => {
        const len = Math.floor(audioCtx.sampleRate * 0.09);
        const nb = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
        const d = nb.getChannelData(0);
        for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
        const s = audioCtx.createBufferSource(); s.buffer = nb;
        const hp = audioCtx.createBiquadFilter(); hp.type = "highpass"; hp.frequency.value = 2600;
        const g = audioCtx.createGain(); g.gain.value = 0.18;
        s.connect(hp); hp.connect(g); g.connect(out); s.start(t0 + dt);
      });
    }

    window.petNotebook = {
      // 念最重要一条（大开本窗口打开时配的嘴）
      async say() {
        nbPaperSfx();
        let es = [];
        try { es = (await (await fetch("/memories")).json()).entries || []; } catch {}
        if (!es.length) { speak("小本本还空着呢……多陪我聊聊嘛！"); return "empty"; }
        const top = es[0];
        speak(`翻翻小本本……${top.title}：${top.content.split(/[。！!；;\n]/)[0]}。哼哼，我都记着呢！`);
        return top.mem_id;
      },
      // 翻本本：开/关大开本窗口，开时念一条
      async tell() {
        if (!api?.toggleNotebook) return "no-host";
        const opened = await api.toggleNotebook();
        if (opened) return this.say();
        stopSpeaking();
        return "closed";
      },
    };
  </script>
</body>
