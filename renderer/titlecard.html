<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>雪莉星球 · 片头(实时版)</title>
<style>
  /* 实时片头:不渲染成 MP4,直接在桌面全屏现场播——拍到的就是真实表演。
     全部 CSS 动画,零外部依赖;vmin 排版,任何屏幕比例都能站住。 */
  html, body { margin:0; height:100%; overflow:hidden; background:#05070f; cursor:none;
               font-family:"Kaiti SC","STKaiti","PingFang SC",sans-serif; color:#fff; }
  .bg { position:fixed; inset:0;
        background:radial-gradient(ellipse 140% 60% at 50% 118%, #1a4fd0 0%, #0a1c50 34%, #05070f 68%); }
  .stars { position:fixed; inset:0; opacity:0;
           background-image:radial-gradient(2px 2px at 12% 18%, #fff, transparent),
                            radial-gradient(1.5px 1.5px at 78% 12%, #cfe4ff, transparent),
                            radial-gradient(2px 2px at 62% 34%, #fff, transparent),
                            radial-gradient(1.5px 1.5px at 30% 44%, #9fc6ff, transparent),
                            radial-gradient(2px 2px at 88% 52%, #fff, transparent),
                            radial-gradient(1.5px 1.5px at 8% 64%, #cfe4ff, transparent);
           animation:fadein 1.2s ease .2s both; }
  .horizon { position:fixed; left:-12vw; right:-12vw; bottom:-34vh; height:60vh;
             border-radius:50% 50% 0 0 / 100% 100% 0 0; background:#04060c;
             box-shadow:0 -6px 42px 6px rgba(90,160,255,.85);
             animation:rise 1.6s cubic-bezier(.2,.7,.3,1) .1s both; }
  .content { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center;
             justify-content:center; gap:2.2vmin; text-align:center; }
  .series { font-size:6vmin; letter-spacing:1.4vmin; color:#bfe0ff;
            animation:dropin .7s cubic-bezier(.2,.8,.3,1) .9s both; }
  .rule { width:20vmin; height:.55vmin; background:#8cdcff; border-radius:.3vmin;
          transform-origin:center; animation:growx .5s ease 1.2s both; }
  .title { font-size:21vmin; font-weight:700; letter-spacing:2.4vmin; margin:.6vmin 0;
           text-shadow:0 0 6vmin rgba(120,190,255,.55);
           animation:pop .9s cubic-bezier(.34,1.56,.44,1) 1.4s both; }
  .ep { font-size:4vmin; color:#86a8d8; letter-spacing:.8vmin; animation:fadein .6s ease 2s both; }
  .hook { font-size:4.6vmin; color:#cdd9ef; animation:dropup .7s ease 2.4s both; }
  body.out { animation:fadeout .6s ease both; }
  @keyframes fadein  { from { opacity:0 } to { opacity:1 } }
  @keyframes fadeout { from { opacity:1 } to { opacity:0 } }
  @keyframes rise    { from { transform:translateY(30vh) } to { transform:translateY(0) } }
  @keyframes dropin  { from { transform:translateY(-4vmin); opacity:0 } to { transform:translateY(0); opacity:1 } }
  @keyframes dropup  { from { transform:translateY(3.4vmin); opacity:0 } to { transform:translateY(0); opacity:1 } }
  @keyframes growx   { from { transform:scaleX(0) } to { transform:scaleX(1) } }
  @keyframes pop     { from { transform:scale(.6); opacity:0 } to { transform:scale(1); opacity:1 } }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="stars"></div>
  <div class="horizon"></div>
  <div class="content">
    <div class="series">雪莉星球</div>
    <div class="rule"></div>
    <div class="title">出生</div>
    <div class="ep">第 01 集</div>
    <div class="hook">一颗星球，捡到一个天外来客</div>
  </div>
  <script>
    // 5.4s 开始整体淡出,6.05s 关窗(主进程收到 closed 后无缝接坠机预演);点一下=跳过
    setTimeout(() => document.body.classList.add("out"), 5400);
    setTimeout(() => window.close(), 6050);
    document.addEventListener("click", () => window.close());
  </script>
</body>
</html>
